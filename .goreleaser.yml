version: 2

builds:
  - binary: gh-optivem
    main: .
    ldflags:
      - -s -w
      - -X github.com/optivem/gh-optivem/internal/version.Version={{.Tag}}
      - -X github.com/optivem/gh-optivem/internal/version.StarterRef={{.Env.STARTER_SHA}}
      - -X github.com/optivem/gh-optivem/internal/version.StarterTag={{.Env.STARTER_TAG}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}-{{ .Arch }}"
    format: binary

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  footer: |
    ---
    Bundled with optivem/starter @ {{ if .Env.STARTER_TAG }}{{ .Env.STARTER_TAG }} ({{ .Env.STARTER_SHA }}){{ else }}{{ .Env.STARTER_SHA }}{{ end }}
