version: 2

builds:
  - binary: gh-optivem
    main: .
    ldflags:
      - -s -w
      - -X github.com/optivem/gh-optivem/internal/kernel/version.Version={{.Tag}}
      - -X github.com/optivem/gh-optivem/internal/kernel/version.ShopRef={{.Env.SHOP_SHA}}
      - -X github.com/optivem/gh-optivem/internal/kernel/version.ShopTag={{.Env.SHOP_TAG}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}-{{ .Arch }}"
    format: binary

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  prerelease: auto
  footer: |
    ---
    Bundled with optivem/shop @ {{ if .Env.SHOP_TAG }}{{ .Env.SHOP_TAG }} ({{ .Env.SHOP_SHA }}){{ else }}{{ .Env.SHOP_SHA }}{{ end }}
