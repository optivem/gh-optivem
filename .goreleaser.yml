version: 2

builds:
  - binary: gh-optivem
    main: .
    ldflags:
      - -s -w
      - -X github.com/optivem/gh-optivem/internal/version.Version={{.Tag}}
      - -X github.com/optivem/gh-optivem/internal/version.ShopRef={{.Env.SHOP_SHA}}
      - -X github.com/optivem/gh-optivem/internal/version.ShopTag={{.Env.SHOP_TAG}}
      # Windows-only: link MinGW runtime statically so end users on stock
      # Windows don't need libwinpthread-1.dll etc. on PATH. zig cc + Go's
      # external linker honor -extldflags=-static for windows-gnu targets.
      - '{{ if eq .Os "windows" }}-extldflags=-static{{ end }}'
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-linux-gnu
      - goos: linux
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-linux-gnu
      - goos: darwin
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-macos-none
      - goos: darwin
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-macos-none
      - goos: windows
        goarch: amd64
        env:
          - CC=zig cc -target x86_64-windows-gnu
      - goos: windows
        goarch: arm64
        env:
          - CC=zig cc -target aarch64-windows-gnu

archives:
  - name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}-{{ .Arch }}"
    format: binary

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  prerelease: auto
  footer: |
    ---
    Bundled with optivem/shop @ {{ if .Env.SHOP_TAG }}{{ .Env.SHOP_TAG }} ({{ .Env.SHOP_SHA }}){{ else }}{{ .Env.SHOP_SHA }}{{ end }}
