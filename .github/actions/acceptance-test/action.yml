name: Acceptance Test
description: Run a single acceptance test for a given configuration

inputs:
  arch:
    description: 'Architecture (multitier or monolith)'
    required: true
  repo-strategy:
    description: 'Repo strategy (monorepo or multirepo)'
    required: true
  lang:
    description: 'Language (typescript, dotnet, java)'
    required: true
  test-lang:
    description: 'Test language (typescript, dotnet, java)'
    required: true
  verify-level:
    description: 'Verification level for system tests'
    required: true
  exclude-legacy:
    description: 'Exclude legacy stage verification'
    required: true
  skip-local-tests:
    description: 'Skip the "Verify local testing" step (Run-SystemTests.ps1). Maps to the CLI --skip-local-tests flag.'
    required: false
    default: 'false'
  shop-tag:
    description: 'optivem/shop meta-v* release tag to pin during the test. Empty = HEAD.'
    required: false
    default: ''
  retain-repos:
    description: 'Retain scaffolded test repos (skip cleanup) even on success. Sets TEST_NO_CLEANUP=1.'
    required: false
    default: 'false'
  jitter-max-seconds:
    description: 'Upper bound (seconds) for the random start-jitter that staggers matrix jobs. Keep at 120 for the large acceptance matrix; lower for small matrices (e.g. smoke) where rate limits are not a concern.'
    required: false
    default: '120'
  warn-on-local-failure:
    description: 'Treat "Verify local testing" (Run-SystemTests.ps1) failures as a warning instead of fatal, and auto-file a GitHub issue with the failure log. Used by the smoke matrix where a Windows-runner Docker flake should not block downstream stages.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # Stagger parallel matrix jobs so the repo-create / secret-set bursts don't
    # all hit GitHub's content-creation secondary rate limit (~80 writes/min)
    # in the same window.
    - name: Jitter start
      shell: bash
      env:
        JITTER_MAX: ${{ inputs.jitter-max-seconds }}
      run: sleep $((RANDOM % (JITTER_MAX + 1)))

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # Set up language toolchains for the scaffolded project. Needed on
    # windows-latest (Windows Server 2025) where Gradle toolchain
    # auto-detection doesn't find a pre-installed Java 21. Ubuntu runners
    # also benefit from explicit versions so the CI matches optivem/shop's
    # own pipelines. Each toolchain is set up only when that language is
    # actually used (as system lang or test lang).
    - name: Setup Java
      if: inputs.lang == 'java' || inputs.test-lang == 'java'
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: temurin

    - name: Setup .NET
      if: inputs.lang == 'dotnet' || inputs.test-lang == 'dotnet'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Setup Node
      if: inputs.lang == 'typescript' || inputs.test-lang == 'typescript'
      uses: actions/setup-node@v6
      with:
        node-version: 22.x

    # Cache package-registry downloads so repeated scaffolding runs survive
    # transient upstream outages (Maven Central 502, npm/NuGet timeouts).
    # The scaffolded project lives in a fresh /tmp dir per job — but the
    # runner's user-level caches (~/.gradle, ~/.npm, ~/.nuget) persist
    # between jobs via actions/cache, so already-resolved artifacts bypass
    # the registry entirely on cache hit.
    - name: Cache package-registry downloads
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.npm
          ~/.nuget/packages
        key: pkg-registry-${{ runner.os }}-${{ inputs.lang }}-${{ inputs.test-lang }}-${{ github.sha }}
        restore-keys: |
          pkg-registry-${{ runner.os }}-${{ inputs.lang }}-${{ inputs.test-lang }}-
          pkg-registry-${{ runner.os }}-

    # Switch Docker to the Linux engine on Windows runners. The scaffolded
    # project's docker-compose pulls Linux-only images (postgres, wiremock);
    # without this, Docker on windows-latest defaults to Windows containers
    # and fails with "no matching manifest for windows/amd64".
    - name: Switch Docker to Linux engine (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: '& "$Env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine'

    - name: Configure git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global url."https://x-access-token:${{ env.VERIFY_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Compute test name
      id: test
      shell: bash
      run: |
        LANG="${{ inputs.lang }}"
        if [ "$LANG" = "typescript" ]; then LANG="ts"; fi

        if [ "${{ inputs.arch }}" = "monolith" ]; then
          NAME="TestValidMonolithConfigurations/${{ inputs.arch }}_${{ inputs.repo-strategy }}_${LANG}_${{ inputs.test-lang }}"
        else
          NAME="TestValidMultitierConfigurations/${{ inputs.arch }}_${{ inputs.repo-strategy }}_${LANG}_react_${{ inputs.test-lang }}"
        fi
        echo "name=$NAME" >> "$GITHUB_OUTPUT"

    - name: Print configuration
      shell: bash
      run: |
        echo "Verify level: ${{ inputs.verify-level }}"
        echo "Exclude legacy: ${{ inputs.exclude-legacy }}"
        echo "Shop tag: ${{ inputs.shop-tag }}"
        echo "Retain repos: ${{ inputs.retain-repos }}"

    - name: System test
      id: test-run
      shell: bash
      run: |
        set +e
        go test -tags=system ./internal/config/ -v -timeout 2h -run "${{ steps.test.outputs.name }}" 2>&1 | tee test.log
        EXIT_CODE=${PIPESTATUS[0]}
        if tail -30 test.log | grep -qi "rate limit"; then
          echo "result=rate-limited" >> "$GITHUB_OUTPUT"
          exit 1
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        else
          echo "result=passed" >> "$GITHUB_OUTPUT"
          exit 0
        fi
      env:
        TEST_VERIFY_LEVEL: ${{ inputs.verify-level }}
        TEST_EXCLUDE_LEGACY: ${{ inputs.exclude-legacy }}
        TEST_SKIP_LOCAL_TESTS: ${{ inputs.skip-local-tests }}
        TEST_SHOP_TAG: ${{ inputs.shop-tag }}
        TEST_NO_CLEANUP: ${{ inputs.retain-repos == 'true' && '1' || '' }}
        # The scaffolded CLI honors these when it runs Run-SystemTests.ps1 —
        # failures become warnings + a log file instead of a fatal, so the
        # pipeline stages can still run and CI can auto-file a ticket below.
        GH_LOCAL_TEST_WARN_ONLY: ${{ inputs.warn-on-local-failure == 'true' && '1' || '' }}
        GH_LOCAL_TEST_LOG_DIR: ${{ runner.temp }}/local-test-failures

    - name: Rate limit marker
      if: failure() && steps.test-run.outputs.result == 'rate-limited'
      shell: bash
      run: echo "This job was rate-limited"

    # Auto-file a ticket for any local-test failure captured under
    # $GH_LOCAL_TEST_LOG_DIR, or for a pipeline (non-local) failure of the
    # System test step. The reason line discriminates the two cases so the
    # triager can tell a Windows-runner Docker flake from a real regression.
    - name: Auto-file ticket for local / pipeline failures
      id: auto-ticket
      if: ${{ !cancelled() && inputs.warn-on-local-failure == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ env.WORKFLOW_TOKEN }}
        LOG_DIR: ${{ runner.temp }}/local-test-failures
        STEP_OUTCOME: ${{ steps.test-run.outcome }}
        MATRIX_KEY: "${{ runner.os }} ${{ inputs.arch }}/${{ inputs.repo-strategy }}/${{ inputs.lang }}->${{ inputs.test-lang }}"
        RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        ISSUE_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        has_local_markers=false
        if [ -d "$LOG_DIR" ] && [ -n "$(ls -A "$LOG_DIR" 2>/dev/null)" ]; then
          has_local_markers=true
        fi

        if [ "$STEP_OUTCOME" != "failure" ] && [ "$has_local_markers" != "true" ]; then
          echo "No failures to report."
          exit 0
        fi

        if [ "$STEP_OUTCOME" = "failure" ]; then
          reason="Pipeline failed (the workflow verification step returned non-zero)."
          kind="pipeline-failure"
        else
          reason="Local tests failed even though the pipeline passed — likely a runner-local environment issue (e.g. Docker engine mode, missing toolchain)."
          kind="local-only-failure"
        fi

        title="[auto] ${kind}: ${MATRIX_KEY}"
        body_file="$(mktemp)"
        {
          echo "**Reason:** ${reason}"
          echo ""
          echo "**Matrix:** ${MATRIX_KEY}"
          echo "**Workflow run:** ${RUN_URL}"
          echo "**System-test step outcome:** ${STEP_OUTCOME}"
          echo ""
          if [ "$has_local_markers" = "true" ]; then
            echo "### Local test failure logs"
            echo ""
            for log in "$LOG_DIR"/*.log; do
              [ -f "$log" ] || continue
              echo "<details><summary>$(basename "$log")</summary>"
              echo ""
              echo '```'
              cat "$log"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
            done
          else
            echo "_No local-test marker files — pipeline failed outside the Verify-local-testing step._"
          fi
        } > "$body_file"

        existing=$(gh issue list --repo "$ISSUE_REPO" --state open \
          --search "\"$title\" in:title" --json number --jq '.[0].number // ""' || echo "")
        if [ -n "$existing" ]; then
          gh issue comment "$existing" --repo "$ISSUE_REPO" --body-file "$body_file"
          echo "Commented on existing issue #$existing"
        else
          gh issue create --repo "$ISSUE_REPO" --title "$title" --body-file "$body_file"
        fi

    - name: Upload local-test failure logs
      if: ${{ !cancelled() && inputs.warn-on-local-failure == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: local-test-failures-${{ runner.os }}-${{ inputs.arch }}-${{ inputs.repo-strategy }}-${{ inputs.lang }}-${{ inputs.test-lang }}
        path: ${{ runner.temp }}/local-test-failures/
        if-no-files-found: ignore
