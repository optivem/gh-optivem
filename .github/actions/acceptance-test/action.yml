name: Acceptance Test
description: Run a single acceptance test for a given configuration

inputs:
  arch:
    description: 'Architecture (multitier or monolith)'
    required: true
  repo-strategy:
    description: 'Repo strategy (monorepo or multirepo)'
    required: true
  lang:
    description: 'Language (typescript, dotnet, java)'
    required: true
  test-lang:
    description: 'Test language (typescript, dotnet, java)'
    required: true
  verify-level:
    description: 'Verification level for system tests'
    required: true
  no-legacy:
    description: 'Exclude legacy stage verification'
    required: true
  no-local-tests:
    description: 'Skip the "Verify local testing" step (the runner-package-driven local system tests). Maps to the CLI --no-local-tests flag.'
    required: false
    default: 'false'
  no-local-sonar:
    description: 'Skip the "Verify local SonarCloud scan" step (per-component run-sonar.sh). Maps to the CLI --no-local-sonar flag.'
    required: false
    default: 'false'
  shop-tag:
    description: 'optivem/shop ref to pin during the test (meta-v* tag, SHA, or branch — e.g. "main" for HEAD). Empty = CLI resolves to the latest meta-v* release.'
    required: false
    default: ''
  retain-repos:
    description: 'Retain scaffolded test repos (skip cleanup) even on success. Sets TEST_NO_CLEANUP=1.'
    required: false
    default: 'false'
  jitter-max-seconds:
    description: 'Upper bound (seconds) for the random start-jitter that staggers matrix jobs. Keep at 120 for the large acceptance matrix; lower for small matrices (e.g. smoke) where rate limits are not a concern.'
    required: false
    default: '120'

runs:
  using: composite
  steps:
    # Stagger parallel matrix jobs so the repo-create / secret-set bursts don't
    # all hit GitHub's content-creation secondary rate limit (~80 writes/min)
    # in the same window.
    - name: Jitter start
      shell: bash
      env:
        JITTER_MAX: ${{ inputs.jitter-max-seconds }}
      run: sleep $((RANDOM % (JITTER_MAX + 1)))

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: false

    # Set up language toolchains for the scaffolded project. Needed on
    # windows-latest (Windows Server 2025) where Gradle toolchain
    # auto-detection doesn't find a pre-installed Java 21. Ubuntu runners
    # also benefit from explicit versions so the CI matches optivem/shop's
    # own pipelines. Each toolchain is set up only when that language is
    # actually used (as system lang or test lang).
    - name: Setup Java
      if: inputs.lang == 'java' || inputs.test-lang == 'java'
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: temurin

    - name: Setup .NET
      if: inputs.lang == 'dotnet' || inputs.test-lang == 'dotnet'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Setup Node
      if: inputs.lang == 'typescript' || inputs.test-lang == 'typescript'
      uses: actions/setup-node@v6
      with:
        node-version: 22.x

    # Install actionlint for the scaffolder's "Verify scaffolded workflows"
    # step (steps.VerifyScaffoldWorkflows). Pinned to an exact version that
    # MUST match shop's .github/workflows/lint-workflows.yml — a floating @v1
    # let the two linters drift apart, so shop went green while this scaffold
    # verify went red on the same files (the if-cond rule landed post-1.7.7).
    # Use `go install` so the binary lands in $(go env GOPATH)/bin on both
    # Linux and Windows runners — Go is already set up by the previous
    # step, and GOPATH/bin is on PATH.
    - name: Install actionlint
      shell: bash
      run: |
        set -euo pipefail
        # Commit hash for tag v1.7.12 — pin to a commit, not a mutable tag (SonarCloud go:S8545).
        go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca
        actionlint --version

    # Cache package-registry downloads so repeated scaffolding runs survive
    # transient upstream outages (Maven Central 502, npm/NuGet timeouts).
    # The scaffolded project lives in a fresh /tmp dir per job — but the
    # runner's user-level caches (~/.gradle, ~/.npm, ~/.nuget) persist
    # between jobs via actions/cache, so already-resolved artifacts bypass
    # the registry entirely on cache hit.
    - name: Cache package-registry downloads
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.npm
          ~/.nuget/packages
        key: pkg-registry-${{ runner.os }}-${{ inputs.lang }}-${{ inputs.test-lang }}-${{ github.sha }}
        restore-keys: |
          pkg-registry-${{ runner.os }}-${{ inputs.lang }}-${{ inputs.test-lang }}-
          pkg-registry-${{ runner.os }}-

    # Note: Windows hosted runners (windows-2025) no longer ship Docker
    # Desktop, so the scaffolded project's docker-compose-based local tests
    # cannot run on them. Callers must set no-local-tests: true on Windows;
    # the pipeline workflow enforces this for the smoke matrix.

    - name: Configure git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global url."https://x-access-token:${{ env.VERIFY_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Compute test name
      id: test
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
        REPO_STRATEGY: ${{ inputs.repo-strategy }}
        LANG_INPUT: ${{ inputs.lang }}
        TEST_LANG: ${{ inputs.test-lang }}
      run: |
        LANG="$LANG_INPUT"
        if [ "$LANG" = "typescript" ]; then LANG="ts"; fi

        if [ "$ARCH" = "monolith" ]; then
          NAME="TestValidMonolithConfigurations/${ARCH}_${REPO_STRATEGY}_${LANG}_${TEST_LANG}"
        else
          # Multitier subtests are named <arch>_<repo-strategy>_<backendLang>_ts_<testLang>
          # (the frontend lang is always "typescript" in the test matrix, normalized to "ts")
          # — see TestValidMultitierConfigurations in internal/config/config_system_test.go.
          NAME="TestValidMultitierConfigurations/${ARCH}_${REPO_STRATEGY}_${LANG}_ts_${TEST_LANG}"
        fi
        echo "name=$NAME" >> "$GITHUB_OUTPUT"

    - name: Print configuration
      shell: bash
      env:
        VERIFY_LEVEL: ${{ inputs.verify-level }}
        NO_LEGACY: ${{ inputs.no-legacy }}
        SHOP_TAG: ${{ inputs.shop-tag }}
        RETAIN_REPOS: ${{ inputs.retain-repos }}
      run: |
        echo "Verify level: $VERIFY_LEVEL"
        echo "No legacy: $NO_LEGACY"
        echo "Shop tag: $SHOP_TAG"
        echo "Retain repos: $RETAIN_REPOS"

    - name: System test
      id: test-run
      shell: bash
      run: |
        set +e
        go test -tags=system ./internal/config/ -v -timeout 2h -run "${{ steps.test.outputs.name }}" 2>&1 | tee test.log
        EXIT_CODE=${PIPESTATUS[0]}
        # `go test -run <pattern>` exits 0 with "[no tests to run]" when the
        # pattern matches no subtest — a silent pass. Catch it explicitly so
        # a typo'd -run filter (or a renamed subtest) can't hide regressions.
        if grep -q "\[no tests to run\]" test.log; then
          echo "result=no-tests-matched" >> "$GITHUB_OUTPUT"
          echo "::error::go test -run '${{ steps.test.outputs.name }}' matched no subtest"
          exit 1
        elif tail -30 test.log | grep -qi "rate limit"; then
          echo "result=rate-limited" >> "$GITHUB_OUTPUT"
          exit 1
        elif [ $EXIT_CODE -ne 0 ]; then
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        else
          echo "result=passed" >> "$GITHUB_OUTPUT"
          exit 0
        fi
      env:
        TEST_VERIFY_LEVEL: ${{ inputs.verify-level }}
        TEST_NO_LEGACY: ${{ inputs.no-legacy }}
        TEST_NO_LOCAL_TESTS: ${{ inputs.no-local-tests }}
        TEST_NO_LOCAL_SONAR: ${{ inputs.no-local-sonar }}
        TEST_SHOP_TAG: ${{ inputs.shop-tag }}
        TEST_NO_CLEANUP: ${{ inputs.retain-repos == 'true' && '1' || '' }}

    - name: Rate limit marker
      if: failure() && steps.test-run.outputs.result == 'rate-limited'
      shell: bash
      run: echo "This job was rate-limited"
