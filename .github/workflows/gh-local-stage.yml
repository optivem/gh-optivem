name: gh Local Stage

on:
  workflow_dispatch:

jobs:
  shop-local-monolith-java:
    name: Stage 1 — shop/prerelease-pipeline-monolith-java (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-monolith-java.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  shop-local-monolith-dotnet:
    name: Stage 1 — shop/prerelease-pipeline-monolith-dotnet (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-monolith-dotnet.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  shop-local-monolith-typescript:
    name: Stage 1 — shop/prerelease-pipeline-monolith-typescript (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-monolith-typescript.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  shop-local-multitier-java:
    name: Stage 1 — shop/prerelease-pipeline-multitier-java (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-multitier-java.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  shop-local-multitier-dotnet:
    name: Stage 1 — shop/prerelease-pipeline-multitier-dotnet (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-multitier-dotnet.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  shop-local-multitier-typescript:
    name: Stage 1 — shop/prerelease-pipeline-multitier-typescript (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: prerelease-pipeline-multitier-typescript.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  gh-local:
    name: Stage 2 — acceptance-stage (verify-level=local)
    needs:
      - shop-local-monolith-java
      - shop-local-monolith-dotnet
      - shop-local-monolith-typescript
      - shop-local-multitier-java
      - shop-local-multitier-dotnet
      - shop-local-multitier-typescript
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait-for-github-workflow@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: gh-acceptance-stage.yml
          inputs: '{"verify-level": "local"}'
          poll-interval: '600'
