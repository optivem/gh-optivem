name: Release Stage

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve-shop:
    name: Resolve Verified Shop
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/statuses" \
            --jq '[.[] | select(.context=="verified-shop-sha" and .state=="success")][0].description')
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::No verified-shop-sha status on this commit. Run acceptance-stage-full first."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          TAG=$(gh api repos/optivem/shop/tags --paginate \
            --jq ".[] | select(.commit.sha==\"$SHA\") | .name" | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Verified shop: ${TAG:-<no tag>} ($SHA)" >> "$GITHUB_STEP_SUMMARY"

  release-stage:
    name: Release Stage
    needs: resolve-shop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOP_SHA: ${{ needs.resolve-shop.outputs.sha }}
          SHOP_TAG: ${{ needs.resolve-shop.outputs.tag }}

  installation-test:
    name: Installation Test
    needs: release-stage
    uses: ./.github/workflows/installation-test.yml
    secrets: inherit
