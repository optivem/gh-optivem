name: gh-release-stage

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RC version to promote (e.g., v1.3.2-rc.1). Empty = latest RC.'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      rc-version: ${{ steps.rc.outputs.version }}
      rc-sha: ${{ steps.rc.outputs.sha }}
      release-version: ${{ steps.gen.outputs.version }}
      shop-sha: ${{ steps.shop-sha.outputs.description }}
      shop-tag: ${{ steps.shop-tag.outputs.description }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            WORKFLOW_TOKEN
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - id: rc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          source .github/scripts/gh-retry.sh
          source .github/scripts/gh-rate-limit.sh
          if [ -n "$INPUT_VERSION" ]; then
            RC="$INPUT_VERSION"
          else
            wait_for_rate_limit
            RC=$(gh_retry api "repos/${{ github.repository }}/releases" --paginate \
              --jq '[.[] | select(.prerelease==true) | .tag_name] | map(select(test("-rc\\.[0-9]+$"))) | .[0]')
            if [ -z "$RC" ] || [ "$RC" = "null" ]; then
              echo "::error::No RC prerelease found. Run acceptance-stage with verify-level=release first."
              exit 1
            fi
          fi
          wait_for_rate_limit
          SHA=$(gh_retry api "repos/${{ github.repository }}/git/ref/tags/$RC" --jq '.object.sha')
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Could not resolve commit SHA for tag $RC"
            exit 1
          fi
          echo "version=$RC" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "RC: $RC ($SHA)" >> "$GITHUB_STEP_SUMMARY"

      - name: Check RC Exists
        uses: optivem/actions/validate-tag-exists@v1
        with:
          tag: ${{ steps.rc.outputs.version }}

      - id: gen
        uses: optivem/actions/compose-release-version@v1
        with:
          prerelease-version: ${{ steps.rc.outputs.version }}

      - name: Check Release Version Already Released
        id: check-release-tag
        uses: optivem/actions/check-tag-exists@v1
        with:
          tag: ${{ steps.gen.outputs.version }}

      - name: Ensure Release Version Unreleased
        if: steps.check-release-tag.outputs.exists == 'true'
        shell: bash
        env:
          TAG: ${{ steps.gen.outputs.version }}
        run: |
          BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/gh-bump-patch-version.yml"
          RC_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/gh-acceptance-stage.yml"
          {
            echo "## Version already released"
            echo ""
            echo "\`$TAG\` already exists as a final release. To ship a new version:"
            echo ""
            echo "1. Bump VERSION — run [\`gh-bump-patch-version.yml\`](${BUMP_URL})."
            echo "2. Create a new RC — run [\`gh-acceptance-stage.yml\`](${RC_URL})."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Version $TAG is already released. See job summary for next steps."
          exit 1

      - id: shop-sha
        uses: optivem/actions/get-commit-status@v1
        with:
          commit-sha: ${{ steps.rc.outputs.sha }}
          context: acceptance-stage

      - name: Ensure Shop SHA Resolved
        if: steps.shop-sha.outputs.description == ''
        shell: bash
        env:
          RC_SHA: ${{ steps.rc.outputs.sha }}
        run: |
          echo "::error::No acceptance-stage commit status found on $RC_SHA. Run acceptance-stage with verify-level=release first."
          exit 1

      - id: shop-tag
        uses: optivem/actions/get-commit-status@v1
        with:
          commit-sha: ${{ steps.rc.outputs.sha }}
          context: shop-tag

      - name: Ensure Shop Tag Resolved
        if: steps.shop-tag.outputs.description == ''
        shell: bash
        env:
          RC_SHA: ${{ steps.rc.outputs.sha }}
        run: |
          echo "::error::No shop-tag commit status found on $RC_SHA. Run acceptance-stage with verify-level=release first."
          exit 1

  run:
    name: Run
    needs: check
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RC commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.rc-sha }}
          fetch-depth: 0

      - name: Publish Release Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ needs.check.outputs.release-version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Run GoReleaser
        # GORELEASER_CURRENT_TAG forces goreleaser to target the release tag. Without this,
        # goreleaser runs `git describe`, which is ambiguous when both v1.3.3 and
        # v1.3.3-rc.43 point at the promoted commit and may pick the RC tag.
        # Set here (not in the composite action) because the composite is loaded from the
        # RC commit, while this workflow file is loaded from main — env on the step
        # propagates into the composite's child steps.
        env:
          GORELEASER_CURRENT_TAG: ${{ needs.check.outputs.release-version }}
        uses: ./.github/actions/run-goreleaser
        with:
          shop-sha: ${{ needs.check.outputs.shop-sha }}
          shop-tag: ${{ needs.check.outputs.shop-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  bump-patch-version:
    name: Bump Patch Version
    needs: [check, run]
    uses: ./.github/workflows/gh-bump-patch-version.yml
    secrets: inherit

  post-release-stage:
    name: Post-Release Stage
    needs: run
    uses: ./.github/workflows/gh-post-release-stage.yml
    secrets: inherit
