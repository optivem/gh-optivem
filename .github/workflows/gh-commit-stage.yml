name: gh-commit-stage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  commit-stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      # Pinned to the exact version used by the two other install sites
      # (.github/workflows/_gh-acceptance-pipeline.yml and
      # .github/actions/acceptance-test/action.yml) so all three linters stay
      # in lockstep — a floating @v1 let install sites drift and surface
      # different rule sets on the same files. `go install` lands the binary in
      # $(go env GOPATH)/bin, which is on PATH; Go is already set up above.
      - name: Install actionlint
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          actionlint --version

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # actionlint (no args) auto-discovers .github/workflows/*.yml and checks
      # YAML syntax, ${{ }} expressions, action inputs, reusable-workflow
      # inputs:/secrets:/outputs: references, needs: cycles, and shellcheck in
      # run: blocks — failing fast here, before the slow test/Sonar steps.
      # NOTE: actionlint does NOT model GitHub's reusable-workflow
      # permission-inheritance rule (the class that broke gh-release-stage in
      # run 28207902796). That is still only caught by GitHub server-side on
      # trigger — this step is not a substitute for dispatching the workflow.
      - name: Lint workflows
        run: actionlint

      - name: Unit tests
        run: go test ./... -v

      # CLI scanner (official sonar-scanner-cli image) wrapped in the canonical
      # retry action. The whole `docker run` — image pull and analysis — sits
      # inside the retry envelope, so a transient pull or analysis failure
      # retries the entire command (4 attempts, 5s/15s/45s backoff). This
      # replaces the bare SonarSource/sonarqube-scan-action@v7 composite, whose
      # internal scanner-CLI download from binaries.sonarsource.com 403'd
      # outside any retry layer. SONAR_TOKEN comes from the job-level env.
      - name: Run Code Analysis
        if: github.ref == 'refs/heads/main' && env.SONAR_TOKEN != ''
        uses: optivem/actions/retry@v1
        with:
          command: >
            docker run --rm
            -e SONAR_TOKEN
            -e SONAR_HOST_URL=https://sonarcloud.io
            -v "${{ github.workspace }}:/usr/src"
            sonarsource/sonar-scanner-cli
            -Dsonar.projectKey=optivem_gh-optivem
            -Dsonar.projectName=gh-optivem
            -Dsonar.organization=optivem
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/testdata/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
