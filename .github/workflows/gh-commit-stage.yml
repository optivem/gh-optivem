name: gh-commit-stage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v

      - name: Run Code Analysis
        if: github.ref == 'refs/heads/main' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=optivem_gh-optivem
            -Dsonar.projectName=gh-optivem
            -Dsonar.organization=optivem
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
