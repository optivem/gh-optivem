name: Acceptance Stage

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  acceptance-stage:
    name: Acceptance Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: System tests
        run: go test -tags=system ./... -v
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
