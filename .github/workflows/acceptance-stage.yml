name: Acceptance Stage

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  run:
    name: Run
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout starter repo
        uses: actions/checkout@v4
        with:
          repository: optivem/starter
          path: starter

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: System tests (representative subset)
        run: bash scripts/test-system.sh
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OPTIVEM_STARTER_PATH: ${{ github.workspace }}/starter

      # Full suite (all 36 combinations) — uncomment to run:
      # - name: System tests (full)
      #   run: go test -tags=system ./... -v -timeout 24h
      #   env:
      #     TEST_OWNER: ${{ vars.TEST_OWNER }}
