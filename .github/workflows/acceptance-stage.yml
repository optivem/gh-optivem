name: Acceptance Stage

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 03:00 UTC
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: [monolith, multitier]
        repo-strategy: [monorepo, multirepo]
        lang: [java, dotnet, typescript]
        test-lang: [java, dotnet, typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.VERIFY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Compute test name
        id: test
        run: |
          LANG="${{ matrix.lang }}"
          if [ "$LANG" = "typescript" ]; then LANG="ts"; fi

          if [ "${{ matrix.arch }}" = "monolith" ]; then
            NAME="TestValidMonolithConfigurations/${{ matrix.arch }}_${{ matrix.repo-strategy }}_${LANG}_${{ matrix.test-lang }}"
          else
            NAME="TestValidMultitierConfigurations/${{ matrix.arch }}_${{ matrix.repo-strategy }}_${LANG}_react_${{ matrix.test-lang }}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: System test
        id: test-run
        run: |
          set +e
          OUTPUT=$(go test -tags=system ./internal/config/ -v -timeout 2h -run "${{ steps.test.outputs.name }}" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "rate limit"; then
            echo "result=rate-limited" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=passed" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  summary:
    name: Summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });

            const results = { passed: [], failed: [], rateLimited: [], cancelled: [] };

            for (const job of jobs.data.jobs) {
              if (job.name === 'Check' || job.name === 'Summary') continue;
              const name = job.name;
              if (job.conclusion === 'success') results.passed.push(name);
              else if (job.conclusion === 'cancelled') results.cancelled.push(name);
              else {
                // Check step outputs to distinguish rate-limit from real failure
                const step = job.steps?.find(s => s.name === 'System test');
                if (step?.conclusion === 'failure') {
                  // Parse job name for log output
                  const logLines = [];
                  try {
                    const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      job_id: job.id,
                    });
                    const text = typeof logs.data === 'string' ? logs.data : '';
                    if (text.includes('rate limit') || text.includes('Rate limit')) {
                      results.rateLimited.push(name);
                      continue;
                    }
                  } catch {}
                }
                results.failed.push(name);
              }
            }

            let summary = '## Acceptance Stage Results\n\n';
            const total = results.passed.length + results.failed.length + results.rateLimited.length + results.cancelled.length;
            summary += `**${results.passed.length}/${total} passed**\n\n`;

            if (results.failed.length > 0) {
              summary += '### Failed\n';
              results.failed.forEach(n => summary += `- ${n}\n`);
              summary += '\n';
            }
            if (results.rateLimited.length > 0) {
              summary += '### Rate Limited (not a real failure)\n';
              results.rateLimited.forEach(n => summary += `- ${n}\n`);
              summary += '\n';
            }
            if (results.cancelled.length > 0) {
              summary += '### Cancelled\n';
              results.cancelled.forEach(n => summary += `- ${n}\n`);
              summary += '\n';
            }
            if (results.passed.length > 0) {
              summary += '### Passed\n';
              results.passed.forEach(n => summary += `- ${n}\n`);
            }

            core.summary.addRaw(summary);
            await core.summary.write();

            if (results.failed.length > 0) {
              core.setFailed(`${results.failed.length} job(s) failed`);
            } else if (results.rateLimited.length > 0) {
              core.setFailed(`${results.rateLimited.length} job(s) hit rate limit — retry needed`);
            }
