name: Acceptance Stage
run-name: Acceptance Stage — ${{ github.event_name == 'workflow_dispatch' && inputs.verify-level || github.event.schedule == '0 3 * * *' && 'release' || 'local' }}

on:
  workflow_dispatch:
    inputs:
      verify-level:
        description: 'Verification level for system tests'
        required: false
        default: 'local'
        type: choice
        options:
          - none
          - local
          - commit
          - acceptance
          - release
      shop-ref:
        description: 'optivem/shop ref (branch, tag, or SHA) to test against. Empty = main HEAD.'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 3 * * *'    # Daily at 03:00 UTC — verify-level=release
    - cron: '0 */2 * * *'  # Every 2 hours — verify-level=local

permissions:
  contents: read
  statuses: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  resolve:
    name: Resolve
    runs-on: ubuntu-latest
    outputs:
      verify-level: ${{ steps.level.outputs.verify-level }}
      shop-sha: ${{ (steps.level.outputs.verify-level == 'release' || inputs.shop-ref != '') && steps.shop-commit.outputs.sha || '' }}
      should-run: ${{ steps.should-run.outputs.should-run }}
    steps:
      - id: level
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
              LEVEL="release"
            else
              LEVEL="local"
            fi
          else
            LEVEL="${{ inputs.verify-level }}"
          fi
          echo "verify-level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "### Workflow Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| verify-level | $LEVEL |" >> "$GITHUB_STEP_SUMMARY"

      - id: shop-commit
        uses: optivem/actions/resolve-commit@v1
        with:
          repo: optivem/shop
          ref: ${{ inputs.shop-ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: should-run
        uses: optivem/actions/should-run-acceptance-stage@v1
        with:
          last-updated-at: ${{ steps.shop-commit.outputs.timestamp }}
          workflow-name: ${{ github.workflow }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: [check, resolve]
    if: needs.resolve.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        arch: [multitier, monolith]
        repo-strategy: [monorepo, multirepo]
        lang: [typescript, dotnet, java]
        test-lang: [typescript, dotnet, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: ${{ needs.resolve.outputs.verify-level }}
          exclude-legacy: 'false'
          shop-ref: ${{ needs.resolve.outputs.shop-sha }}

  record-verified-sha:
    name: Record Verified Shop SHA
    needs: [resolve, run]
    if: success() && needs.resolve.outputs.verify-level == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Write commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.resolve.outputs.shop-sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context=verified-shop-sha \
            -f description="$SHA" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Recorded verified-shop-sha=$SHA on commit ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summary
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./scripts/summarize-acceptance.js');
            await script({ github, context, core });
