name: Acceptance Stage

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 03:00 UTC
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        arch: [multitier, monolith]
        repo-strategy: [monorepo, multirepo]
        lang: [typescript, dotnet, java]
        test-lang: [typescript, dotnet, java]
    steps:
      - name: Checkout latest code
        run: git clone --depth=1 https://x-access-token:${{ secrets.VERIFY_TOKEN }}@github.com/optivem/gh-optivem.git .

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.VERIFY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Compute test name
        id: test
        run: |
          LANG="${{ matrix.lang }}"
          if [ "$LANG" = "typescript" ]; then LANG="ts"; fi

          if [ "${{ matrix.arch }}" = "monolith" ]; then
            NAME="TestValidMonolithConfigurations/${{ matrix.arch }}_${{ matrix.repo-strategy }}_${LANG}_${{ matrix.test-lang }}"
          else
            NAME="TestValidMultitierConfigurations/${{ matrix.arch }}_${{ matrix.repo-strategy }}_${LANG}_react_${{ matrix.test-lang }}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: System test
        id: test-run
        run: |
          set +e
          OUTPUT=$(go test -tags=system ./internal/config/ -v -timeout 2h -run "${{ steps.test.outputs.name }}" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | tail -30 | grep -qi "rate limit"; then
            echo "result=rate-limited" >> "$GITHUB_OUTPUT"
            exit 1
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "result=passed" >> "$GITHUB_OUTPUT"
          fi
        env:
          TEST_VERIFY_LEVEL: acceptance
          TEST_EXCLUDE_LEGACY: "true"
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Rate limit marker
        if: failure() && steps.test-run.outputs.result == 'rate-limited'
        run: echo "This job was rate-limited"

  summary:
    name: Summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./scripts/summarize-acceptance.js');
            await script({ github, context, core });
