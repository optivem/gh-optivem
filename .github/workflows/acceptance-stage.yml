name: Acceptance Stage

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  acceptance-stage:
    name: Acceptance Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: System tests (representative subset)
        run: bash scripts/test-system.sh
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Full suite (all 36 combinations) — uncomment to run:
      # - name: System tests (full)
      #   run: go test -tags=system ./... -v -timeout 24h
      #   env:
      #     TEST_OWNER: ${{ vars.TEST_OWNER }}
