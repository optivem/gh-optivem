name: Commit Stage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v
