name: gh-acceptance-stage

run-name: >-
  gh Acceptance Stage${{ inputs.debug-shop-head && ' [debug-shop-head]' || '' }}${{ inputs.debug-skip-tests && ' [debug-skip-tests]' || '' }}

on:
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      smoke-mode:
        description: 'Smoke matrix size'
        required: false
        type: choice
        options: [none, single, full]
        default: full
      acceptance-mode:
        description: 'Acceptance matrix size'
        required: false
        type: choice
        options: [none, single, minimal, condensed, full]
        default: condensed
      shop-tag:
        description: 'optivem/shop meta-v* release tag to test against (empty = latest)'
        required: false
        type: string
        default: ''
      debug-shop-head:
        description: 'Run against optivem/shop HEAD (latest main) instead of the latest meta-v* release tag. No RC prerelease is created. Mutually exclusive with shop-tag. Troubleshooting use only.'
        required: false
        type: boolean
        default: false
      debug-skip-tests:
        description: 'Bypass ALL test phases (smoke + acceptance matrix) and create the RC prerelease directly. The version-not-already-released check still runs. smoke-mode and acceptance-mode are ignored when this is true.'
        required: false
        type: boolean
        default: false

# Shared concurrency group with gh-acceptance-dry-run so dry-runs and real runs
# serialize rather than stepping on each other.
concurrency:
  group: gh-acceptance-stage
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_gh-acceptance-pipeline.yml
    secrets: inherit
    with:
      verify-level: release
      smoke-verify-level: release
      smoke-mode: ${{ inputs.smoke-mode }}
      acceptance-mode: ${{ inputs.acceptance-mode }}
      shop-tag: ${{ inputs.shop-tag }}
      debug-shop-head: ${{ inputs.debug-shop-head }}
      retain-repos: false
      skip-prerelease: ${{ inputs.debug-shop-head }}
      debug-skip-tests: ${{ inputs.debug-skip-tests == null && false || inputs.debug-skip-tests }}
