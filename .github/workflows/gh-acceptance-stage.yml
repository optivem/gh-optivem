name: gh Acceptance Stage
run-name: gh Acceptance Stage — ${{ github.event_name == 'workflow_dispatch' && inputs.verify-level || github.event.schedule == '0 */6 * * *' && 'release' || 'local' }}

on:
  workflow_dispatch:
    inputs:
      verify-level:
        description: 'Verification level for system tests'
        required: false
        default: 'local'
        type: choice
        options:
          - none
          - local
          - commit
          - acceptance
          - release
      shop-ref:
        description: 'optivem/shop meta-v* release tag to test against. Empty = latest meta-v* release. Must be a published meta-v* release (not main, not a non-meta tag).'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — verify-level=release
    # - cron: '0 * * * *'    # Every hour — verify-level=local

permissions:
  contents: write
  statuses: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      verify-level: ${{ steps.level.outputs.verify-level }}
      shop-sha: ${{ (steps.level.outputs.verify-level == 'release' || inputs.shop-ref != '') && steps.shop-commit.outputs.sha || '' }}
      should-run: ${{ steps.should-run.outputs.should-run }}
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - id: level
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              LEVEL="release"
            else
              LEVEL="local"
            fi
          else
            LEVEL="${{ inputs.verify-level }}"
          fi
          echo "verify-level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "### Workflow Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| verify-level | $LEVEL |" >> "$GITHUB_STEP_SUMMARY"

      - id: shop-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LEVEL="${{ steps.level.outputs.verify-level }}"
          INPUT_REF="${{ inputs.shop-ref }}"

          if [ -z "$INPUT_REF" ]; then
            TAG=$(gh api "repos/optivem/shop/releases?per_page=100" \
              --jq '[.[] | select(.tag_name | startswith("meta-v"))] | sort_by(.created_at) | last | .tag_name' 2>/dev/null)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::No meta-v* release found in optivem/shop — blank shop-ref requires a published meta-v* release. Run shop's meta-acceptance-stage (and publish its tag as a release) first, or pass an explicit shop-ref."
              exit 1
            fi
            REF="$TAG"
            echo "Using latest meta-v* release from optivem/shop: $REF" >> "$GITHUB_STEP_SUMMARY"
          else
            if [ "$INPUT_REF" = "main" ] || [ "$INPUT_REF" = "refs/heads/main" ]; then
              echo "::error::shop-ref 'main' is not allowed — pass a published meta-v* release tag."
              exit 1
            fi
            case "$INPUT_REF" in
              meta-v*) ;;
              *) echo "::error::shop-ref '$INPUT_REF' must start with 'meta-v' — only meta-v* release tags are accepted."; exit 1 ;;
            esac
            if ! gh api "repos/optivem/shop/releases/tags/$INPUT_REF" >/dev/null 2>&1; then
              echo "::error::shop-ref '$INPUT_REF' is not a published release tag — acceptance requires a published meta-v* release."
              exit 1
            fi
            REF="$INPUT_REF"
            echo "Using input shop-ref (meta-v* release): $REF" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - id: shop-commit
        uses: optivem/actions/resolve-commit@v1
        with:
          repo: optivem/shop
          ref: ${{ steps.shop-ref.outputs.ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: should-run
        uses: optivem/actions/should-run-acceptance-stage@v1
        with:
          last-updated-at: ${{ steps.shop-commit.outputs.timestamp }}
          workflow-name: ${{ github.workflow }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        arch: [multitier, monolith]
        repo-strategy: [monorepo, multirepo]
        lang: [typescript, dotnet, java]
        test-lang: [typescript, dotnet, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: ${{ needs.check.outputs.verify-level }}
          exclude-legacy: 'false'
          shop-ref: ${{ needs.check.outputs.shop-sha }}

  promote-to-rc:
    name: Promote to RC
    needs: [check, run]
    if: success() && needs.check.outputs.verify-level == 'release'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Record Verified Shop SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.check.outputs.shop-sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context=verified-shop-sha \
            -f description="$SHA" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Recorded verified-shop-sha=$SHA on commit ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read target version
        id: target
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate RC Version
        id: gen
        uses: optivem/actions/generate-prerelease-version@v1
        with:
          target-version: ${{ steps.target.outputs.version }}

      - name: Resolve Shop Tag
        id: shop-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.check.outputs.shop-sha }}
        run: |
          TAG=$(gh api repos/optivem/shop/tags --paginate \
            --jq ".[] | select(.commit.sha==\"$SHA\") | .name" | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push RC tag
        env:
          RC: ${{ steps.gen.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RC" "${{ github.sha }}"
          git push origin "$RC"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run GoReleaser (RC)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOP_SHA: ${{ needs.check.outputs.shop-sha }}
          SHOP_TAG: ${{ steps.shop-tag.outputs.tag }}

  summary:
    name: Summary
    needs: [run, promote-to-rc]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summary
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./scripts/summarize-acceptance.js');
            await script({ github, context, core });
