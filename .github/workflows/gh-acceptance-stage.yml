name: gh-acceptance-stage
run-name: gh Acceptance Stage — ${{ github.event_name == 'workflow_dispatch' && inputs.verify-level || github.event.schedule == '0 */6 * * *' && 'release' || 'local' }}

on:
  workflow_dispatch:
    inputs:
      verify-level:
        description: 'Verification level for system tests'
        required: false
        default: 'release'
        type: choice
        options:
          - none
          - local
          - commit
          - acceptance
          - release
      matrix-mode:
        description: 'Matrix size: minimal (8 combos — TS tests dotnet/java), condensed (12 off-diagonal polyglot combos — single-language combos are already covered by optivem/shop), or full (all 36 combos).'
        required: false
        default: 'condensed'
        type: choice
        options:
          - minimal
          - condensed
          - full
      shop-tag:
        description: 'optivem/shop meta-v* release tag to test against. Empty = latest meta-v* release. Must be a published meta-v* release (not main, not a non-meta tag).'
        required: false
        default: ''
        type: string
      retain-repos:
        description: 'Retain scaffolded test repos (skip cleanup) even on success. Useful for post-run debugging.'
        required: false
        default: false
        type: boolean
      force-prerelease:
        description: 'Skip the acceptance-test matrix and go straight to Create Prerelease. Requires verify-level=release. Use when the shop-tag has already been verified manually or when recovering from a stuck release.'
        required: false
        default: false
        type: boolean
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours — verify-level=release
  #   - cron: '0 * * * *'    # Every hour — verify-level=local

permissions:
  contents: write
  statuses: write

concurrency:
  group: gh-acceptance-stage
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      shop-release-exists: ${{ steps.check-shop.outputs.exists }}
    steps:
      - name: Check optivem/shop has meta-v* release
        id: check-shop
        uses: optivem/actions/check-tag-pattern-exists@v1
        with:
          repository: optivem/shop
          tag-pattern: meta-v*

  check:
    name: Check
    needs: preflight
    if: needs.preflight.outputs.shop-release-exists == 'true'
    runs-on: ubuntu-latest
    outputs:
      verify-level: ${{ steps.level.outputs.verify-level }}
      shop-tag: ${{ steps.shop-tag.outputs.tag }}
      shop-sha: ${{ (steps.level.outputs.verify-level == 'release' || inputs.shop-tag != '') && steps.shop-sha.outputs.sha || '' }}
      should-run: ${{ steps.prior-status.outputs.exists != 'true' }}
      retain-repos: ${{ github.event_name == 'workflow_dispatch' && inputs.retain-repos && 'true' || 'false' }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Ensure Environment Variables Defined
        uses: optivem/actions/validate-env-vars-defined@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
            WORKFLOW_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - id: level
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              LEVEL="release"
            else
              LEVEL="local"
            fi
          else
            LEVEL="${{ inputs.verify-level }}"
          fi
          echo "verify-level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "### Workflow Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| verify-level | $LEVEL |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "| retain-repos | ${{ inputs.retain-repos }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| force-prerelease | ${{ inputs.force-prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate force-prerelease
        if: github.event_name == 'workflow_dispatch' && inputs.force-prerelease && steps.level.outputs.verify-level != 'release'
        shell: bash
        env:
          LEVEL: ${{ steps.level.outputs.verify-level }}
        run: |
          echo "::error::force-prerelease=true requires verify-level=release (got: $LEVEL). Without verify-level=release, there is nothing to do after skipping the matrix."
          exit 1

      - name: Checkout
        if: steps.level.outputs.verify-level == 'release'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version not already released
        if: steps.level.outputs.verify-level == 'release'
        shell: bash
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < VERSION)
          tag="v${version}"
          if git tag -l "$tag" | grep -qx "$tag"; then
            BUMP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/gh-auto-bump-patch.yml"
            {
              echo "## Version already released"
              echo ""
              echo "The following tag already exists as a final release:"
              echo ""
              echo "- \`${tag}\` (from VERSION)"
              echo ""
              echo "Run the [gh-auto-bump-patch workflow](${BUMP_URL}) to bump the VERSION file, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Version already released: ${tag}. Run the gh-auto-bump-patch workflow to bump the VERSION file, then re-run this workflow: ${BUMP_URL}"
            exit 1
          fi
          echo "Version tag ${tag} has not been released yet — OK to proceed."

      - name: Validate shop-tag prefix
        if: inputs.shop-tag != ''
        shell: bash
        env:
          TAG: ${{ inputs.shop-tag }}
        run: |
          if [[ "$TAG" != meta-v* ]]; then
            echo "::error::shop-tag '$TAG' must start with 'meta-v' — only meta-v* release tags are accepted."
            exit 1
          fi

      - name: Ensure explicit shop-tag exists
        if: inputs.shop-tag != ''
        uses: optivem/actions/validate-tag-exists@v1
        with:
          repository: optivem/shop
          tag: ${{ inputs.shop-tag }}

      - name: Resolve latest meta-v* shop tag
        id: shop-tag-latest
        if: inputs.shop-tag == ''
        uses: optivem/actions/resolve-latest-prerelease-tag@v1
        with:
          repository: optivem/shop
          tag-prefix: meta-v

      - id: shop-tag
        shell: bash
        env:
          EXPLICIT: ${{ inputs.shop-tag }}
          LATEST: ${{ steps.shop-tag-latest.outputs.tag }}
        run: |
          TAG="${EXPLICIT:-$LATEST}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - id: shop-sha
        uses: optivem/actions/resolve-commit@v1
        with:
          repository: optivem/shop
          ref: ${{ steps.shop-tag.outputs.tag }}

      - id: prior-status
        uses: optivem/actions/check-commit-status-exists@v1
        with:
          commit-sha: ${{ steps.shop-sha.outputs.sha }}
          status-context: acceptance-stage

      # Build the run-job matrix based on matrix-mode.
      # minimal = 8 combos: TS is always the test-lang, exercised against dotnet
      #   and java as system-lang (× 2 arch × 2 repo-strategy). Cheapest smoke
      #   check — does not cover dotnet or java as test-lang.
      # condensed = 12 off-diagonal polyglot combos (covers every lang as both
      #   system-lang and test-lang per arch × repo-strategy via a Latin square:
      #   ts→dotnet, dotnet→java, java→ts). Diagonal (lang == test-lang) is already
      #   exercised continuously against real shop code in optivem/shop's own
      #   {monolith,multitier}-{ts,dotnet,java}-acceptance-stage workflows.
      # full = all 36 combos (2 arch × 2 repo-strategy × 3 lang × 3 test-lang).
      - id: matrix
        shell: bash
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.matrix-mode || 'condensed' }}
        run: |
          ARCHS='["monolith","multitier"]'
          REPOS='["monorepo","multirepo"]'
          LANGS='["typescript","dotnet","java"]'

          MINIMAL_PAIRS='[
            {"lang":"dotnet","test-lang":"typescript"},
            {"lang":"java","test-lang":"typescript"}
          ]'

          CONDENSED_PAIRS='[
            {"lang":"typescript","test-lang":"dotnet"},
            {"lang":"dotnet","test-lang":"java"},
            {"lang":"java","test-lang":"typescript"}
          ]'

          FULL_PAIRS=$(jq -c -n --argjson l "$LANGS" \
            '[$l[] as $a | $l[] as $b | {lang: $a, "test-lang": $b}]')

          case "$MODE" in
            minimal)  PAIRS="$MINIMAL_PAIRS" ;;
            full)     PAIRS="$FULL_PAIRS" ;;
            *)        PAIRS="$CONDENSED_PAIRS" ;;
          esac

          MATRIX=$(jq -c -n \
            --argjson archs "$ARCHS" \
            --argjson repos "$REPOS" \
            --argjson pairs "$PAIRS" \
            '{include: [$archs[] as $a | $repos[] as $r | $pairs[] as $p |
              {arch: $a, "repo-strategy": $r} + $p
            ]}')

          COUNT=$(jq '.include | length' <<< "$MATRIX")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "| matrix-mode | $MODE ($COUNT combos) |" >> "$GITHUB_STEP_SUMMARY"

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: check
    if: needs.check.outputs.should-run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force-prerelease)
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
    strategy:
      fail-fast: true
      max-parallel: 12
      matrix: ${{ fromJSON(needs.check.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: ${{ needs.check.outputs.verify-level }}
          exclude-legacy: 'false'
          shop-tag: ${{ needs.check.outputs.shop-tag }}
          retain-repos: ${{ needs.check.outputs.retain-repos }}

  create-prerelease:
    name: Create Prerelease
    needs: [check, run]
    # !failure() && !cancelled() (not success()) so run can be skipped via force-prerelease.
    if: >-
      ${{ !failure() && !cancelled() &&
      needs.check.result == 'success' &&
      needs.check.outputs.verify-level == 'release' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Record Acceptance-Stage Passed
        uses: optivem/actions/create-commit-status@v1
        with:
          context: acceptance-stage
          description: ${{ needs.check.outputs.shop-sha }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read target version
        id: target
        uses: optivem/actions/read-base-version@v1

      - name: Generate RC Version
        id: gen
        uses: optivem/actions/compose-prerelease-version@v1
        with:
          base-version: ${{ steps.target.outputs.base-version }}
          suffix: rc
          build-number: ${{ github.run_number }}

      - name: Resolve Shop Tag
        id: shop-tag
        uses: optivem/actions/resolve-latest-tag-from-sha@v1
        with:
          repository: optivem/shop
          commit-sha: ${{ needs.check.outputs.shop-sha }}
          pattern: '*'

      - name: Publish RC Tag
        uses: optivem/actions/publish-tag@v1
        with:
          tag: ${{ steps.gen.outputs.version }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Run GoReleaser (RC)
        uses: ./.github/actions/run-goreleaser
        with:
          shop-sha: ${{ needs.check.outputs.shop-sha }}
          shop-tag: ${{ steps.shop-tag.outputs.tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Fire-and-forget: after the RC prerelease is fully published (tag + GoReleaser),
  # promote it by dispatching gh-release-stage. We wait for create-prerelease to
  # finish rather than using an on:push:tags trigger because create-prerelease's
  # GoReleaser step would otherwise race with gh-release-stage's own GoReleaser
  # and bump-version push-to-main.
  # Needs a PAT (WORKFLOW_TOKEN) — GITHUB_TOKEN cannot start downstream workflow runs.
  trigger-gh-release-stage:
    name: Trigger gh-release-stage
    needs: create-prerelease
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch gh-release-stage
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RC_VERSION: ${{ needs.create-prerelease.outputs.version }}
        run: |
          set -euo pipefail
          echo "Dispatching gh-release-stage.yml with version=${RC_VERSION}"
          gh workflow run gh-release-stage.yml -f version="${RC_VERSION}"
          {
            echo "## Dispatched gh-release-stage"
            echo ""
            echo "- version: \`${RC_VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Summary
    needs: [run, create-prerelease]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summary
        uses: ./.github/actions/summarize-acceptance-stage
