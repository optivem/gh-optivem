name: gh-acceptance-stage

run-name: >-
  gh Acceptance Stage — ${{ github.event.schedule == '0 * * * *' && 'local' || 'release' }}

on:
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours — verify-level=release
  #   - cron: '0 * * * *'    # Every hour — verify-level=local
  workflow_dispatch:
    inputs:
      verify-level:
        description: 'Verification level (none, local, commit, acceptance, qa, release)'
        required: false
        type: choice
        options: [none, local, commit, acceptance, qa, release]
        default: release
      smoke-mode:
        description: 'Smoke matrix size'
        required: false
        type: choice
        options: [none, single, full]
        default: full
      acceptance-mode:
        description: 'Acceptance matrix size'
        required: false
        type: choice
        options: [none, single, minimal, condensed, full]
        default: condensed
      shop-tag:
        description: 'optivem/shop meta-v* release tag to test against (empty = latest)'
        required: false
        type: string
        default: ''
      soft-validate:
        description: 'Downgrade leftover-template-ref validation from fatal to warning (for triage; downstream steps may still fail)'
        required: false
        type: boolean
        default: false

# Shared concurrency group with gh-acceptance-dry-run so dry-runs and real runs
# serialize rather than stepping on each other.
concurrency:
  group: gh-acceptance-stage
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/_gh-acceptance-pipeline.yml
    secrets: inherit
    with:
      # When the hourly cron is re-enabled, switch this back to the schedule-aware form:
      #   verify-level: ${{ github.event.schedule == '0 * * * *' && 'local' || inputs.verify-level }}
      # (hourly cron → `local` verify, 6-hour cron + manual dispatch → input-driven, default `release`.)
      verify-level: ${{ inputs.verify-level }}
      smoke-mode: ${{ inputs.smoke-mode }}
      acceptance-mode: ${{ inputs.acceptance-mode }}
      shop-tag: ${{ inputs.shop-tag }}
      shop-head: false
      retain-repos: false
      skip-prerelease: false
      soft-validate: ${{ inputs.soft-validate }}
