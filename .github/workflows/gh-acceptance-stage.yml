name: gh-acceptance-stage
run-name: gh Acceptance Stage — ${{ github.event_name == 'workflow_dispatch' && inputs.verify-level || github.event.schedule == '0 */6 * * *' && 'release' || 'local' }}

on:
  workflow_dispatch:
    inputs:
      verify-level:
        description: 'Verification level for system tests'
        required: false
        default: 'release'
        type: choice
        options:
          - none
          - local
          - commit
          - acceptance
          - release
      shop-tag:
        description: 'optivem/shop meta-v* release tag to test against. Empty = latest meta-v* release. Must be a published meta-v* release (not main, not a non-meta tag).'
        required: false
        default: ''
        type: string
      retain-repos:
        description: 'Retain scaffolded test repos (skip cleanup) even on success. Useful for post-run debugging.'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — verify-level=release
    # - cron: '0 * * * *'    # Every hour — verify-level=local

permissions:
  contents: write
  statuses: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      verify-level: ${{ steps.level.outputs.verify-level }}
      shop-tag: ${{ steps.shop-tag.outputs.tag }}
      shop-sha: ${{ (steps.level.outputs.verify-level == 'release' || inputs.shop-tag != '') && steps.shop-sha.outputs.sha || '' }}
      should-run: ${{ steps.should-run.outputs.changed }}
      retain-repos: ${{ github.event_name == 'workflow_dispatch' && inputs.retain-repos && 'true' || 'false' }}
    steps:
      - name: Validate Config
        uses: optivem/actions/ensure-env-vars-defined@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - id: level
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              LEVEL="release"
            else
              LEVEL="local"
            fi
          else
            LEVEL="${{ inputs.verify-level }}"
          fi
          echo "verify-level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "### Workflow Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| verify-level | $LEVEL |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "| retain-repos | ${{ inputs.retain-repos }} |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - id: shop-tag
        uses: optivem/actions/resolve-github-prerelease-tag@v1
        with:
          repo: optivem/shop
          input-tag: ${{ inputs.shop-tag }}

      - id: shop-sha
        uses: optivem/actions/resolve-commit@v1
        with:
          repo: optivem/shop
          ref: ${{ steps.shop-tag.outputs.tag }}

      - id: should-run
        uses: optivem/actions/has-unverified-github-commit-status@v1
        with:
          subject-sha: ${{ steps.shop-sha.outputs.sha }}
          status-context: verified-shop-sha

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        arch: [multitier, monolith]
        repo-strategy: [monorepo, multirepo]
        lang: [typescript, dotnet, java]
        test-lang: [typescript, dotnet, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: ${{ needs.check.outputs.verify-level }}
          exclude-legacy: 'false'
          shop-tag: ${{ needs.check.outputs.shop-tag }}
          retain-repos: ${{ needs.check.outputs.retain-repos }}

  create-prerelease:
    name: Create Prerelease
    needs: [check, run]
    if: success() && needs.check.outputs.verify-level == 'release'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen.outputs.version }}
    steps:
      - name: Record Verified Shop SHA
        uses: optivem/actions/create-github-commit-status@v1
        with:
          context: verified-shop-sha
          description: ${{ needs.check.outputs.shop-sha }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read target version
        id: target
        uses: optivem/actions/read-target-version@v1

      - name: Generate RC Version
        id: gen
        uses: optivem/actions/generate-prerelease-version@v1
        with:
          target-version: ${{ steps.target.outputs.target-version }}

      - name: Resolve Shop Tag
        id: shop-tag
        uses: optivem/actions/resolve-tag-from-sha@v1
        with:
          repo: optivem/shop
          sha: ${{ needs.check.outputs.shop-sha }}

      - name: Create and push RC tag
        uses: optivem/actions/create-and-push-tag@v1
        with:
          tag: ${{ steps.gen.outputs.version }}
          sha: ${{ github.sha }}

      - name: Run GoReleaser (RC)
        uses: ./.github/actions/run-goreleaser
        with:
          shop-sha: ${{ needs.check.outputs.shop-sha }}
          shop-tag: ${{ steps.shop-tag.outputs.tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Summary
    needs: [run, create-prerelease]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summary
        uses: ./.github/actions/summarize-acceptance-stage
