name: Acceptance Stage Adhoc

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - multitier
          - monolith
      repo-strategy:
        description: 'Repo strategy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - monorepo
          - multirepo
      lang:
        description: 'Language'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - typescript
          - dotnet
          - java
      test-lang:
        description: 'Test language'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - typescript
          - dotnet
          - java
      verify-level:
        description: 'Verification level for system tests'
        required: false
        default: 'precommit'
        type: choice
        options:
          - none
          - precommit
          - commit
          - acceptance
          - release
      exclude-legacy:
        description: 'Exclude legacy stage verification'
        required: false
        default: true
        type: boolean
      fail-fast:
        description: 'Cancel all jobs on first failure'
        required: false
        default: true
        type: boolean

jobs:
  resolve:
    name: Resolve Matrix
    runs-on: ubuntu-latest
    outputs:
      arch: ${{ steps.matrix.outputs.arch }}
      repo-strategy: ${{ steps.matrix.outputs.repo-strategy }}
      lang: ${{ steps.matrix.outputs.lang }}
      test-lang: ${{ steps.matrix.outputs.test-lang }}
    steps:
      - name: Resolve matrix inputs
        id: matrix
        run: |
          resolve() {
            local input="$1"
            local all_values="$2"
            if [ "$input" = "all" ]; then
              echo "$all_values"
            else
              echo "[\"$input\"]"
            fi
          }

          echo "arch=$(resolve '${{ inputs.arch }}' '["multitier", "monolith"]')" >> "$GITHUB_OUTPUT"
          echo "repo-strategy=$(resolve '${{ inputs.repo-strategy }}' '["monorepo", "multirepo"]')" >> "$GITHUB_OUTPUT"
          echo "lang=$(resolve '${{ inputs.lang }}' '["typescript", "dotnet", "java"]')" >> "$GITHUB_OUTPUT"
          echo "test-lang=$(resolve '${{ inputs.test-lang }}' '["typescript", "dotnet", "java"]')" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: [resolve, check]
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      max-parallel: 6
      matrix:
        arch: ${{ fromJSON(needs.resolve.outputs.arch) }}
        repo-strategy: ${{ fromJSON(needs.resolve.outputs.repo-strategy) }}
        lang: ${{ fromJSON(needs.resolve.outputs.lang) }}
        test-lang: ${{ fromJSON(needs.resolve.outputs.test-lang) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: ${{ inputs.verify-level }}
          exclude-legacy: ${{ inputs.exclude-legacy }}

  summary:
    name: Summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./scripts/summarize-acceptance.js');
            await script({ github, context, core });
