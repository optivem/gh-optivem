name: gh Cleanup Orphans

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to clean up"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - before-1h
          - before-2h
          - before-3h
          - before-6h
          - before-12h
          - until-yesterday
          - custom-date
      custom_date:
        description: "Custom cutoff (ISO 8601 date or datetime, e.g. 2026-04-01 or 2026-04-01T12:00:00Z). Only used when mode=custom-date."
        required: false
        default: ""

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve cutoff date
        id: cutoff
        run: |
          case "$MODE" in
            all)
              echo "before=" >> "$GITHUB_OUTPUT"
              ;;
            before-1h|before-2h|before-3h|before-6h|before-12h)
              hours="${MODE#before-}"
              hours="${hours%h}"
              echo "before=$(date -u -d "$hours hours ago" +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
              ;;
            until-yesterday)
              echo "before=$(date -u -d 'today' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
              ;;
            custom-date)
              if [[ -z "$CUSTOM_DATE" ]]; then
                echo "ERROR: mode=custom-date requires custom_date input" >&2
                exit 1
              fi
              echo "before=$CUSTOM_DATE" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: unknown mode '$MODE'" >&2
              exit 1
              ;;
          esac
        env:
          MODE: ${{ github.event.inputs.mode }}
          CUSTOM_DATE: ${{ github.event.inputs.custom_date }}

      - name: Run cleanup
        run: |
          args="--owner $TEST_OWNER --all --delete"
          if [[ -n "$BEFORE_DATE" ]]; then
            args="$args --before $BEFORE_DATE"
          fi
          bash scripts/cleanup-orphans.sh $args
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          BEFORE_DATE: ${{ steps.cutoff.outputs.before }}
