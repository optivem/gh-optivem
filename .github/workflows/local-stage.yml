name: Local Stage

on:
  workflow_dispatch:

jobs:
  shop-local:
    name: Stage 1 — shop/verify-all (level=local)
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: verify-all.yml
          repo: optivem/shop
          inputs: '{"level": "local"}'
          poll-interval: '240'

  gh-local:
    name: Stage 2 — acceptance-stage (verify-level=local)
    needs: shop-local
    runs-on: ubuntu-latest
    steps:
      - uses: optivem/actions/trigger-and-wait@v1
        env:
          GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
        with:
          workflow: acceptance-stage.yml
          inputs: '{"verify-level": "local"}'
          poll-interval: '600'
