name: Extension Upgrade Test

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  install-and-version:
    name: Install and check version
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Install extension
        run: gh extension install optivem/gh-optivem
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify version output
        shell: bash
        run: |
          VERSION_OUTPUT=$(gh optivem --version)
          echo "Version output: $VERSION_OUTPUT"

          # Extract the tag from the latest release
          LATEST_TAG=$(gh api repos/optivem/gh-optivem/releases/latest --jq '.tag_name')
          echo "Latest release tag: $LATEST_TAG"

          if [[ "$VERSION_OUTPUT" != *"$LATEST_TAG"* ]]; then
            echo "FAIL: Version mismatch. Expected '$LATEST_TAG' in output, got '$VERSION_OUTPUT'"
            exit 1
          fi
          echo "OK: Version matches latest release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify extension is listed
        shell: bash
        run: |
          gh extension list | grep optivem
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upgrade-test:
    name: Upgrade from previous version
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Get previous release tag
        id: prev
        shell: bash
        run: |
          # Get the second-latest release tag (the one before current)
          PREV_TAG=$(gh api repos/optivem/gh-optivem/releases --jq '.[1].tag_name // empty')
          if [ -z "$PREV_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No previous release found — skipping upgrade test"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "Previous release: $PREV_TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install previous version
        if: steps.prev.outputs.skip != 'true'
        run: |
          gh extension install optivem/gh-optivem --pin ${{ steps.prev.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify old version
        if: steps.prev.outputs.skip != 'true'
        shell: bash
        run: |
          OLD_VERSION=$(gh optivem --version)
          echo "Installed version: $OLD_VERSION"
          if [[ "$OLD_VERSION" != *"${{ steps.prev.outputs.tag }}"* ]]; then
            echo "FAIL: Expected old version ${{ steps.prev.outputs.tag }}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade to latest
        if: steps.prev.outputs.skip != 'true'
        run: gh extension upgrade optivem
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify upgraded version
        if: steps.prev.outputs.skip != 'true'
        shell: bash
        run: |
          NEW_VERSION=$(gh optivem --version)
          LATEST_TAG=$(gh api repos/optivem/gh-optivem/releases/latest --jq '.tag_name')
          echo "Upgraded version: $NEW_VERSION"
          echo "Latest release: $LATEST_TAG"

          if [[ "$NEW_VERSION" != *"$LATEST_TAG"* ]]; then
            echo "FAIL: Expected $LATEST_TAG after upgrade, got $NEW_VERSION"
            exit 1
          fi
          echo "OK: Upgrade successful"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
