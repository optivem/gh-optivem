name: Acceptance Stage Full

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 03:00 UTC

permissions:
  contents: read
  statuses: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            TEST_OWNER
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            SONAR_TOKEN
            GHCR_TOKEN
        env:
          TEST_OWNER: ${{ vars.TEST_OWNER }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  resolve-shop:
    name: Resolve Shop SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/optivem/shop/commits/main --jq '.sha')
          if [ -z "$SHA" ] || [ ${#SHA} -ne 40 ]; then
            echo "::error::Failed to resolve optivem/shop HEAD SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved shop SHA: $SHA" >> "$GITHUB_STEP_SUMMARY"

  run:
    name: Run (${{ matrix.arch }}, ${{ matrix.repo-strategy }}, ${{ matrix.lang }}, ${{ matrix.test-lang }})
    needs: [check, resolve-shop]
    runs-on: ubuntu-latest
    env:
      VERIFY_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      GH_TOKEN: ${{ secrets.VERIFY_TOKEN }}
      TEST_OWNER: ${{ vars.TEST_OWNER }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        arch: [multitier, monolith]
        repo-strategy: [monorepo, multirepo]
        lang: [typescript, dotnet, java]
        test-lang: [typescript, dotnet, java]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Acceptance Test
        uses: ./.github/actions/acceptance-test
        with:
          arch: ${{ matrix.arch }}
          repo-strategy: ${{ matrix.repo-strategy }}
          lang: ${{ matrix.lang }}
          test-lang: ${{ matrix.test-lang }}
          verify-level: release
          exclude-legacy: 'false'
          shop-ref: ${{ needs.resolve-shop.outputs.sha }}

  record-verified-sha:
    name: Record Verified Shop SHA
    needs: [resolve-shop, run]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Write commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.resolve-shop.outputs.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context=verified-shop-sha \
            -f description="$SHA" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Recorded verified-shop-sha=$SHA on commit ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Summary
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Summary
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./scripts/summarize-acceptance.js');
            await script({ github, context, core });
