# phase-scopes.yaml — ATDD per-phase allowed-paths doctrine (SSoT)
#
# Maps BPMN phase id → list of layer names (Family B path keys from
# canonicalPathKeys() in internal/projectconfig/paths_defaults.go, plus
# system_path from Family A) that the phase's agent may modify.
#
# This file is the SINGLE doctrinal source of per-phase scope. Phase docs
# and the runtime-prompt `scope:` projection both derive from this file
# joined with the project's gh-optivem.yaml `paths:` values.
#
# Build-time tests in internal/atdd/phase_scopes_test.go validate:
#   - every phase id here exists as a node in process-flow.yaml
#   - every writing-agent phase id in process-flow.yaml is either listed
#     here OR explicitly allowlisted in the test (with deferred-plan
#     citation)
#   - every layer name is in canonicalPathKeys() or equals system_path
#   - no duplicate layer references within a phase, all values non-empty
#
# See internal/assets/runtime/shared/scope.md for the scope rule
# consumers must follow.

phases:
  # ---- AT (Acceptance Test) cycle ------------------------------------
  AT_RED_TEST:            [at_test, dsl_port, dsl_core]
  AT_RED_DSL:             [dsl_core, driver_port]
  AT_RED_SYSTEM_DRIVER:   [driver_port, driver_adapter]
  AT_GREEN:               [system_path]
  AT_REFACTOR:            [system_path]

  # ---- CT (Contract Test) cycle --------------------------------------
  CT_RED_TEST:                   [ct_test, dsl_port, dsl_core]
  CT_RED_DSL:                    [dsl_core, external_system_driver_port]
  CT_RED_EXTERNAL_SYSTEM_DRIVER: [external_system_driver_port, external_system_driver_adapter]
  CT_GREEN_EXTERNAL_SYSTEM_STUB: [external_system_driver_adapter]   # bare user_task today; rewires per plans/20260518-1144-atdd-bpmn-orchestration.md item 9 Part B

  # ---- Structural cycles --------------------------------------------
  SYSTEM_INTERFACE_REDESIGN_CYCLE:          [system_path, driver_adapter]
  EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE: [external_system_driver_adapter]
  SYSTEM_IMPLEMENTATION_REFACTORING_CYCLE:  [system_path]

  # ---- Legacy coverage cycle -----------------------------------------
  # Test-side only — legacy phases never modify production code (no system_path entries).
  # Each row reuses its change-cycle counterpart's canonical layer keys verbatim because
  # legacy tests are authored into the same folders as change-cycle tests (per
  # feedback_legacy_tests_no_marker.md). See plans/20260518-1116-legacy-coverage-cycle.md.
  LEGACY_AT_TEST:                   [at_test, dsl_port, dsl_core]
  LEGACY_AT_DSL:                    [dsl_core, driver_port]
  LEGACY_AT_SYSTEM_DRIVER:          [driver_port, driver_adapter]
  LEGACY_CT_TEST:                   [ct_test, dsl_port, dsl_core]
  LEGACY_CT_DSL:                    [dsl_core, external_system_driver_port]
  LEGACY_CT_EXTERNAL_SYSTEM_DRIVER: [external_system_driver_port, external_system_driver_adapter]
  LEGACY_CT_EXTERNAL_SYSTEM_STUB:   [external_system_driver_adapter]
