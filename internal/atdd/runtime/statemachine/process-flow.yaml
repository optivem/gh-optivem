  # ===========================================================================
  # MID — fix-unexpected-passing-tests
  # ===========================================================================
  fix-unexpected-passing-tests:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          task-name: fix-unexpected-passing-tests
          scopes: "at-test,ct-test,dsl-port,dsl-core,driver-port,driver-adapter,external-system-driver-port,external-system-driver-adapter,system-path"

      - id: FIX_PASS_END
