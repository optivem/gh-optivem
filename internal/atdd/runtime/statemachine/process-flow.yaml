          scopes: "driver-port,driver-adapter"

      - id: IMPL_SYS_DA_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_SYS_DA_END}

  # ===========================================================================
  # MID — implement-external-system-driver-adapters
  # ===========================================================================
  implement-external-system-driver-adapters:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
