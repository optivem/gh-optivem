# ATDD Pipeline — Orchestration Process
#
# Single source of truth for cycle-level orchestration. Encodes the AT cycle,
# the CT sub-process, the External System Onboarding sub-process, the shared
# structural cycle (used by the system-interface-redesign and
# system-implementation-refactoring subtypes), the external-system-interface-redesign
# wrapper, and the (TBD) Legacy Acceptance Criteria cycle as named processes of
# typed nodes connected by sequence flows.
#
# Per-phase WRITE/COMMIT mechanics (e.g. the inner compile/run/disable loop of
# AT - RED - TEST) are *not* encoded here — they live in the per-phase docs
# (at-red-test.md, at-red-dsl.md, ...) and stay agent-internal. The YAML
# describes the orchestrator's view: what dispatches next, gated by which flag.
#
# Document shape:
#
#   processes:
#     <process_name>:
#       start: <node_id>            # entry node — must appear in nodes:
#       nodes:                      # ids unique per process (reuse across processes is fine)
#         - id: <node_id>
#           type: <node_type>       # body fields depend on type:
#                                   #   service_task  → action: <name>
#                                   #   user_task     → agent: <name>   (or "human" for a STOP)
#                                   #   gateway       → binding: <name>
#                                   #   call_activity → process: <process_name>   [+ params: <map>]
#                                   #   start_event / end_event → no body
#       sequence_flows:
#         - {from: <id>, to: <id>}                        # unconditional edge
#         - {from: <id>, to: <id>, when: "<predicate>"}   # gateway-guarded edge
#
# Node types (BPMN-shaped vocabulary):
#   start_event    Process entry.
#   end_event      Process terminus.
#   service_task   Mechanical action; the Go runtime auto-executes
#                  actions.<action> with no agent dispatch.
#   user_task      Creative work; the Go runtime dispatches the named agent
#                  and waits for its COMMIT output. A user_task with
#                  `agent: human` is a STOP — no dispatch, just block on
#                  human input.
#   gateway        XOR decision; the Go runtime calls gates.<binding>(ctx)
#                  and follows the outgoing edge whose `when:` predicate
#                  matches the returned value.
#   call_activity  Embedded sub-process; control returns to the parent process's
#                  next sequence flow on completion.
#
# Sequence flows:
#   {from: A, to: B}                       Unconditional.
#   {from: A, to: B, when: "<predicate>"}  Outgoing edge from a gateway.
#                                          Predicates are evaluated against
#                                          the value returned by the gateway's
#                                          `binding:` function.
#
# Optional fields:
#   documentation: Free-text node label; rendered in the Mermaid diagram.
#   role:          `review` or `implement` — annotation only. The Go runtime
#                  doesn't consume it, and the diagram generator no longer
#                  styles by role (it colors by executor: white = service_task,
#                  yellow = user_task agent: human, dark blue = user_task with
#                  any other agent). Kept on existing nodes for documentation.
#   params:        Map of name→value substituted into the called process's nodes
#                  at dispatch time (used by call_activity to parameterise
#                  the shared structural_cycle).
#
# Open gaps preserved as TBDs (do not silently resolve):
#   - ct_green_external_system_stub node: agent set to `ct-green-external-system-stub`;
#     ownership is TBD per the process-audit gap on stubs ownership
#     (see plans/20260429-100633-process-audit.md).

processes:

  # ===========================================================================
  # main
  # Ticket Lifecycle — entry process for `gh optivem implement` (with or
  # without `--issue`). Pulls the next ticket
  # (board / specific_issue → in-progress), then runs intake, runs the
  # legacy acceptance criteria cycle (no-op when the ticket carries no Legacy Acceptance Criteria
  # section), runs the change cycle for the ticket's type, and ends at
  # TICKET STATUS - IN ACCEPTANCE.
  #
  # Each sub-process encapsulates its own gates so main stays linear and
  # gate-free. Splitting them lets each diagram answer one question:
  # "main" shows the ticket's lifecycle, "github_intake" shows the
  # type-specific intake fan-out, "run_legacy_cycle" shows the
  # legacy-acceptance-criteria backfill, and "run_cycle" shows the
  # behavioral-vs-structural change-cycle choice.
  # ===========================================================================
  main:
    start: START
    nodes:
      - id: START
        type: start_event

      - id: PICK_TOP_READY
        type: service_task
        action: pick_top_ready
        documentation: "Pick top Ready ticket"

      - id: MOVE_TICKET_IN_PROGRESS
        type: service_task
        action: move_to_in_progress
        documentation: "Move ticket to In Progress (bottom of lane)"

      - id: INTAKE
        type: call_activity
        process: github_intake

      - id: RUN_LEGACY_CYCLE
        type: call_activity
        process: run_legacy_cycle

      - id: BACKLOG_REFINEMENT
        type: call_activity
        process: backlog_refinement

      - id: RUN_CYCLE
        type: call_activity
        process: run_cycle

      - id: MOVE_TICKET_IN_ACCEPTANCE
        type: service_task
        action: move_to_in_acceptance
        documentation: "Tick checklist + move issue to IN ACCEPTANCE"

      - id: END
        type: end_event

    sequence_flows:
      - {from: START,                to: PICK_TOP_READY,      when: "mode == board"}
      - {from: START,                to: MOVE_TICKET_IN_PROGRESS, when: "mode == specific_issue"}
      - {from: PICK_TOP_READY,       to: MOVE_TICKET_IN_PROGRESS}
      - {from: MOVE_TICKET_IN_PROGRESS,  to: INTAKE}
      - {from: INTAKE,               to: RUN_LEGACY_CYCLE}
      - {from: RUN_LEGACY_CYCLE,     to: BACKLOG_REFINEMENT}
      - {from: BACKLOG_REFINEMENT,   to: RUN_CYCLE}
      - {from: RUN_CYCLE,            to: MOVE_TICKET_IN_ACCEPTANCE}
      - {from: MOVE_TICKET_IN_ACCEPTANCE, to: END}

  # ===========================================================================
  # github_intake
  # Owns the full "understand this GitHub ticket" responsibility: read the
  # ticket type from GitHub's native issue type, surface unrecognised types
  # for human resolution, read the structural subtype from the `subtype:*`
  # label (task tickets only), and parse the body's canonical sections
  # deterministically. No LLM is dispatched — Issue Forms enforce the schema
  # upstream so the parser is unambiguous. Self-contained: main only sees
  # INTAKE start and finish.
  #
  # Named `github_intake` (not just `intake`) because it is GitHub-coupled —
  # it reads the issue's native type, labels, and body via `gh`. A
  # source-agnostic wrapper is deferred until a second source exists.
  # ===========================================================================
  github_intake:
    start: CLASSIFY_TICKET_TYPE
    outputs:
      - ticket_type
      - subtype (tasks)
      - change_type
      - parsed body sections
    nodes:
      - id: CLASSIFY_TICKET_TYPE
        type: service_task
        action: read_ticket_type
        documentation: "Read ticket type"

      - id: GATE_CLASSIFY_CONFIDENT
        type: gateway
        binding: ticket_type_recognized
        documentation: "Ticket type recognized?"

      - id: STOP_CLASSIFY_CONFLICT
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — set issue type / re-run"

      - id: GATE_TICKET_TYPE_INTAKE
        type: gateway
        binding: ticket_type
        documentation: "Ticket type?"

      - id: CLASSIFY_TICKET_SUBTYPE
        type: service_task
        action: read_subtype
        documentation: "Read ticket subtype"

      - id: GATE_SUBTYPE_OK
        type: gateway
        binding: subtype_ok
        documentation: "Subtype label detected?"

      - id: STOP_SUBTYPE_MISSING
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — apply exactly one subtype:* label / re-run"

      - id: READ_TICKET_BODY
        type: service_task
        action: parse_ticket_body
        documentation: "Parse ticket body sections"

      - id: GATE_PARSE_OK
        type: gateway
        binding: parse_ok
        documentation: "Parsed OK?"

      - id: STOP_PARSE_ERROR
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — fix ticket body / re-run"

      - id: REPORT_TICKET_DETAILS
        type: service_task
        action: report_intake_summary
        documentation: "Report intake summary"

      - id: INTAKE_END
        type: end_event

    sequence_flows:
      - {from: CLASSIFY_TICKET_TYPE,    to: GATE_CLASSIFY_CONFIDENT}
      - {from: GATE_CLASSIFY_CONFIDENT, to: GATE_TICKET_TYPE_INTAKE, when: "ticket_type_recognized == true"}
      - {from: GATE_CLASSIFY_CONFIDENT, to: STOP_CLASSIFY_CONFLICT,  when: "ticket_type_recognized == false"}
      - {from: STOP_CLASSIFY_CONFLICT,  to: CLASSIFY_TICKET_TYPE}
      - {from: GATE_TICKET_TYPE_INTAKE, to: READ_TICKET_BODY,              when: "ticket_type == story"}
      - {from: GATE_TICKET_TYPE_INTAKE, to: READ_TICKET_BODY,              when: "ticket_type == bug"}
      - {from: GATE_TICKET_TYPE_INTAKE, to: CLASSIFY_TICKET_SUBTYPE,        when: "ticket_type == task"}
      - {from: CLASSIFY_TICKET_SUBTYPE,        to: GATE_SUBTYPE_OK}
      - {from: GATE_SUBTYPE_OK,         to: READ_TICKET_BODY,              when: "subtype_ok == true"}
      - {from: GATE_SUBTYPE_OK,         to: STOP_SUBTYPE_MISSING,    when: "subtype_ok == false"}
      - {from: STOP_SUBTYPE_MISSING,    to: CLASSIFY_TICKET_SUBTYPE}
      - {from: READ_TICKET_BODY,              to: GATE_PARSE_OK}
      - {from: GATE_PARSE_OK,           to: REPORT_TICKET_DETAILS,   when: "parse_ok == true"}
      - {from: GATE_PARSE_OK,           to: STOP_PARSE_ERROR,        when: "parse_ok == false"}
      - {from: STOP_PARSE_ERROR,        to: READ_TICKET_BODY}
      - {from: REPORT_TICKET_DETAILS,   to: INTAKE_END}

  # ===========================================================================
  # run_legacy_cycle
  # Backfill cycle for tickets that carry a "Legacy Acceptance Criteria" section in
  # their issue body — covers previously-untested behavior before the new
  # change cycle runs. Self-contained: gates internally on presence and
  # no-ops when absent, so main can call it unconditionally.
  # ===========================================================================
  run_legacy_cycle:
    start: GATE_LEGACY_PRESENT
    nodes:
      - id: GATE_LEGACY_PRESENT
        type: gateway
        binding: legacy_acceptance_criteria_section_present
        documentation: "Legacy Acceptance Criteria section present?"

      - id: LEGACY_CYCLE
        type: call_activity
        process: legacy_acceptance_criteria

      - id: RUN_LEGACY_END
        type: end_event

    sequence_flows:
      - {from: GATE_LEGACY_PRESENT, to: LEGACY_CYCLE,    when: "legacy_acceptance_criteria_section_present == true"}
      - {from: GATE_LEGACY_PRESENT, to: RUN_LEGACY_END,  when: "legacy_acceptance_criteria_section_present == false"}
      - {from: LEGACY_CYCLE,        to: RUN_LEGACY_END}

  # ===========================================================================
  # backlog_refinement
  # Refines the ticket's acceptance criteria (legacy + newly-derived) into
  # Gherkin GIVEN-WHEN-THEN form and covers any gaps per the AC-coverage
  # rubric. The refiner is a rewriter (not a reviewer): it mutates the
  # parsed-concepts artifact in place and emits a `refinement_changed`
  # flag. The user confirms the result; if anything changed, an
  # update-ticket step writes the refined sections back to the ticket
  # source. When refinement was a no-op the sub-process discharges
  # without writing.
  #
  # The whole refine pass is opt-in. After the parsed-concepts artifact is
  # materialized, GATE_REFINE_REQUESTED asks the operator y/n whether to
  # invoke refine-acc at all; "no" skips refine-acc, the human confirm
  # step, and update-ticket. This is distinct from CONFIRM_REFINEMENT
  # (which confirms the refiner's output once it has run).
  #
  # Slotted between run_legacy_cycle and run_cycle so the legacy backfill
  # has already run, and the refined ACs feed directly into the execution
  # cycle (at_cycle / da_cycle / sut_cycle) dispatched by run_cycle.
  # ===========================================================================
  backlog_refinement:
    start: MATERIALIZE_PARSED_CONCEPTS
    nodes:
      - id: MATERIALIZE_PARSED_CONCEPTS
        type: service_task
        action: materialize_parsed_concepts
        documentation: "Materialize parsed-concepts artifact for refine-acc / update-ticket"

      - id: GATE_REFINE_REQUESTED
        type: gateway
        binding: refine_requested
        documentation: "Refine acceptance criteria for this ticket?"

      - id: BACKLOG_REFINEMENT
        type: user_task
        agent: refine-acc
        documentation: "Refine acceptance criteria (Gherkin + coverage rubric)"

      - id: CONFIRM_REFINEMENT
        type: user_task
        agent: human
        role: review
        documentation: "Confirm refined acceptance criteria"

      - id: GATE_REFINEMENT_CHANGED
        type: gateway
        binding: refinement_changed
        documentation: "Refinement Changed?"

      - id: UPDATE_TICKET
        type: user_task
        agent: update-ticket
        documentation: "Write refined ACs back to ticket source"

      - id: BR_END
        type: end_event

    sequence_flows:
      - {from: MATERIALIZE_PARSED_CONCEPTS, to: GATE_REFINE_REQUESTED}
      - {from: GATE_REFINE_REQUESTED,   to: BACKLOG_REFINEMENT, when: "refine_requested == true"}
      - {from: GATE_REFINE_REQUESTED,   to: BR_END,             when: "refine_requested == false"}
      - {from: BACKLOG_REFINEMENT,      to: CONFIRM_REFINEMENT}
      - {from: CONFIRM_REFINEMENT,      to: GATE_REFINEMENT_CHANGED}
      - {from: GATE_REFINEMENT_CHANGED, to: UPDATE_TICKET, when: "refinement_changed == true"}
      - {from: GATE_REFINEMENT_CHANGED, to: BR_END,        when: "refinement_changed == false"}
      - {from: UPDATE_TICKET,           to: BR_END}

  # ===========================================================================
  # run_cycle
  # Change cycle for the current ticket — dispatches on `change_type`, the
  # single-axis classification derived during intake from (ticket_type,
  # subtype). Three cycles cover the full space, named after the test-stack
  # layer at which the change is visible:
  #   - behavioral                          → at_cycle  (AT-layer change)
  #   - system-interface-redesign           → da_cycle  (Driver Adapter seam change, system-side)
  #   - external-system-interface-redesign  → da_cycle  (Driver Adapter seam change, external-side)
  #   - system-implementation-refactoring   → sut_cycle (System Under Test internal)
  #
  # change_type derivation lives in the parse_ticket_body action. The value
  # is `behavioral` for story / bug tickets and equals the subtype label for
  # task tickets.
  # ===========================================================================
  run_cycle:
    start: GATE_CHANGE_TYPE
    nodes:
      - id: GATE_CHANGE_TYPE
        type: gateway
        binding: change_type
        documentation: "Change type?"

      - id: AT_CYCLE
        type: call_activity
        process: at_cycle

      - id: DA_CYCLE
        type: call_activity
        process: da_cycle

      - id: SUT_CYCLE
        type: call_activity
        process: sut_cycle

      - id: CYCLE_END
        type: end_event

    sequence_flows:
      - {from: GATE_CHANGE_TYPE, to: AT_CYCLE,  when: "change_type == behavioral"}
      - {from: GATE_CHANGE_TYPE, to: DA_CYCLE,  when: "change_type == system-interface-redesign"}
      - {from: GATE_CHANGE_TYPE, to: DA_CYCLE,  when: "change_type == external-system-interface-redesign"}
      - {from: GATE_CHANGE_TYPE, to: SUT_CYCLE, when: "change_type == system-implementation-refactoring"}
      - {from: AT_CYCLE,  to: CYCLE_END}
      - {from: DA_CYCLE,  to: CYCLE_END}
      - {from: SUT_CYCLE, to: CYCLE_END}

  # ===========================================================================
  # at_cycle
  # AT Cycle — driven by change-driven AC (story / bug).
  # Embeds the CT sub-process when External Driver interfaces change.
  # Embeds at_green_system, then at_refactor_system as the terminal
  # sub-process (post-GREEN housekeeping refactor; no-op if no improvement
  # is seen).
  # ===========================================================================
  at_cycle:
    start: AT_RED_TEST
    nodes:
      - id: AT_RED_TEST
        type: call_activity
        process: red_phase_cycle
        params:
          agent: at-red-test
          phase_label: "AT - RED - TEST"
          phase_id: AT_RED_TEST
          change_type: "AT - RED - TEST"
          compile_action: compile_system_tests
        documentation: "AT - RED - TEST"

      - id: GATE_DSL_AT
        type: gateway
        binding: dsl_interface_changed
        documentation: "DSL Interface Changed?"

      - id: AT_RED_DSL
        type: call_activity
        process: red_phase_cycle
        params:
          agent: at-red-dsl
          phase_label: "AT - RED - DSL"
          phase_id: AT_RED_DSL
          change_type: "AT - RED - DSL"
          compile_action: compile_system_tests
        documentation: "AT - RED - DSL"

      - id: GATE_DSL_FLAGS_PRESENT
        type: gateway
        binding: dsl_flags_present
        documentation: "RED-DSL phase-output flags emitted?"

      - id: STOP_FLAG_UNSET
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — AT - RED - DSL phase-output flags missing; re-run with reminder"

      - id: GATE_EXT_AT
        type: gateway
        binding: external_system_driver_interface_changed
        documentation: "External System Driver Interface Changed?"

      - id: CT_SUBPROCESS
        type: call_activity
        process: ct_subprocess

      - id: GATE_SYS_AT
        type: gateway
        binding: system_driver_interface_changed
        documentation: "System Driver Interface Changed?"

      - id: AT_RED_SYSTEM_DRIVER
        type: call_activity
        process: red_phase_cycle
        params:
          agent: at-red-system-driver
          phase_label: "AT - RED - SYSTEM DRIVER"
          phase_id: AT_RED_SYSTEM_DRIVER
          change_type: "AT - RED - SYSTEM DRIVER"
          compile_action: compile_system_tests
        documentation: "AT - RED - SYSTEM DRIVER"

      - id: VERIFY_AT_DRIVER
        type: service_task
        action: run_tests
        documentation: "Verify: run targeted acceptance tests after driver-adapter change"

      - id: AT_GREEN_SYSTEM
        type: call_activity
        process: at_green_system

      - id: AT_REFACTOR_SYSTEM
        type: call_activity
        process: at_refactor_system

      - id: AT_END
        type: end_event

    sequence_flows:
      - {from: AT_RED_TEST,          to: GATE_DSL_AT}
      - {from: GATE_DSL_AT,          to: AT_GREEN_SYSTEM,        when: "dsl_interface_changed == false"}
      - {from: GATE_DSL_AT,          to: AT_RED_DSL,             when: "dsl_interface_changed == true"}
      - {from: AT_RED_DSL,           to: GATE_DSL_FLAGS_PRESENT}
      - {from: GATE_DSL_FLAGS_PRESENT, to: GATE_EXT_AT,           when: "dsl_flags_present == true"}
      - {from: GATE_DSL_FLAGS_PRESENT, to: STOP_FLAG_UNSET,       when: "dsl_flags_present == false"}
      - {from: STOP_FLAG_UNSET,      to: AT_RED_DSL}
      - {from: GATE_EXT_AT,          to: CT_SUBPROCESS,          when: "external_system_driver_interface_changed == true"}
      - {from: GATE_EXT_AT,          to: GATE_SYS_AT,            when: "external_system_driver_interface_changed == false"}
      - {from: CT_SUBPROCESS,        to: GATE_SYS_AT}
      - {from: GATE_SYS_AT,          to: AT_RED_SYSTEM_DRIVER,   when: "system_driver_interface_changed == true"}
      - {from: GATE_SYS_AT,          to: AT_GREEN_SYSTEM,        when: "system_driver_interface_changed == false"}
      - {from: AT_RED_SYSTEM_DRIVER, to: VERIFY_AT_DRIVER}
      - {from: VERIFY_AT_DRIVER,     to: AT_GREEN_SYSTEM}
      - {from: AT_GREEN_SYSTEM,      to: AT_REFACTOR_SYSTEM}
      - {from: AT_REFACTOR_SYSTEM,   to: AT_END}

  # ===========================================================================
  # at_green_system
  # AT - GREEN - SYSTEM — re-enable disabled tests, then write the channel-
  # agnostic implementation through the shared green_phase_cycle in a
  # single call_activity, human review, and a fully mechanical COMMIT /
  # TICK / MOVE-TO-IN-ACCEPTANCE tail. Per the AT/CT split plan, the
  # legacy `atdd-release` agent is replaced by the existing service_task
  # actions commit_phase, tick_checklist, and move_to_in_acceptance.
  # ===========================================================================
  at_green_system:
    start: ENABLE_TESTS
    nodes:
      - id: ENABLE_TESTS
        type: user_task
        agent: enable-tests
        documentation: "Re-enable tests disabled in AT - RED - SYSTEM DRIVER"

      - id: AT_GREEN
        type: call_activity
        process: green_phase_cycle
        params:
          agent: at-green-system
          phase_label: "AT - GREEN - SYSTEM"
          phase_id: AT_GREEN
          rebuild_before_run: "true"
          compile_action: compile_system
        documentation: "AT - GREEN - SYSTEM - WRITE"

      - id: COMMIT
        type: call_activity
        process: commit
        params:
          change_type: "AT - GREEN - SYSTEM"

      - id: TICK
        type: service_task
        action: tick_checklist
        documentation: "Tick acceptance-criteria checklist items"

      - id: MOVE_TICKET_IN_ACCEPTANCE
        type: service_task
        action: move_to_in_acceptance
        documentation: "Move ticket to TICKET STATUS - IN ACCEPTANCE"

      - id: GS_END
        type: end_event

    sequence_flows:
      - {from: ENABLE_TESTS,         to: AT_GREEN}
      - {from: AT_GREEN,             to: COMMIT}
      - {from: COMMIT,               to: TICK}
      - {from: TICK,                 to: MOVE_TICKET_IN_ACCEPTANCE}
      - {from: MOVE_TICKET_IN_ACCEPTANCE, to: GS_END}

  # ===========================================================================
  # at_refactor_system
  # AT - REFACTOR - SYSTEM — post-GREEN housekeeping refactor on production
  # code. Reuses green_phase_cycle for WRITE / compile / run / scope-check
  # plumbing; the refactor agent emits a `refactor_changed` flag that gates
  # the terminal COMMIT — no-op refactors discharge without a commit.
  # Mirrors at_green_system minus the ENABLE_TESTS / TICK /
  # MOVE_TICKET_IN_ACCEPTANCE wrapper (refactor runs with tests already
  # enabled and is post-acceptance, so no ticket transition).
  # ===========================================================================
  at_refactor_system:
    start: AT_REFACTOR
    nodes:
      - id: AT_REFACTOR
        type: call_activity
        process: green_phase_cycle
        params:
          agent: at-refactor-system
          phase_label: "AT - REFACTOR - SYSTEM"
          phase_id: AT_REFACTOR
          rebuild_before_run: "true"
          compile_action: compile_system
        documentation: "AT - REFACTOR - SYSTEM - WRITE"

      - id: GATE_REFACTOR_CHANGED
        type: gateway
        binding: refactor_changed
        documentation: "Refactor Changed?"

      - id: COMMIT
        type: call_activity
        process: commit
        params:
          change_type: "AT - REFACTOR - SYSTEM"

      - id: AR_END
        type: end_event

    sequence_flows:
      - {from: AT_REFACTOR,           to: GATE_REFACTOR_CHANGED}
      - {from: GATE_REFACTOR_CHANGED, to: COMMIT,  when: "refactor_changed == true"}
      - {from: GATE_REFACTOR_CHANGED, to: AR_END,  when: "refactor_changed == false"}
      - {from: COMMIT,                to: AR_END}

  # ===========================================================================
  # ct_subprocess
  # Contract Test Sub-Process — entered when External Driver interfaces
  # change. Calls External System Onboarding first to ensure a Driver and
  # Test Instance exist.
  # ===========================================================================
  ct_subprocess:
    start: ONBOARDING
    nodes:
      - id: ONBOARDING
        type: call_activity
        process: external_system_onboarding

      - id: CT_RED_TEST
        type: call_activity
        process: red_phase_cycle
        params:
          agent: ct-red-test
          phase_label: "CT - RED - TEST"
          phase_id: CT_RED_TEST
          change_type: "CT - RED - TEST"
          verify_real_suite: "<suite-contract-real>"
          compile_action: compile_system_tests
        documentation: "CT - RED - TEST"

      - id: GATE_DSL_CT
        type: gateway
        binding: dsl_interface_changed
        documentation: "DSL Interface Changed?"

      - id: CT_RED_DSL
        type: call_activity
        process: red_phase_cycle
        params:
          agent: ct-red-dsl
          phase_label: "CT - RED - DSL"
          phase_id: CT_RED_DSL
          change_type: "CT - RED - DSL"
          compile_action: compile_system_tests
        documentation: "CT - RED - DSL"

      # TODO: BPMN-owned post_issue_comment service_task for DSL
      # interface change summary — see follow-up plan for wiring.

      - id: GATE_EXT_CT
        type: gateway
        binding: external_system_driver_interface_changed
        documentation: "External System Driver Interface Changed?"

      - id: CT_RED_EXTERNAL_SYSTEM_DRIVER
        type: call_activity
        process: red_phase_cycle
        params:
          agent: ct-red-external-system-driver
          phase_label: "CT - RED - EXTERNAL SYSTEM DRIVER"
          phase_id: CT_RED_EXTERNAL_SYSTEM_DRIVER
          change_type: "CT - RED - EXTERNAL SYSTEM DRIVER"
          compile_action: compile_system_tests
        documentation: "CT - RED - EXTERNAL SYSTEM DRIVER"

      # TODO: BPMN-owned post_issue_comment service_task for Driver
      # interface change summary — see follow-up plan for wiring.

      - id: VERIFY_CT_DRIVER
        type: service_task
        action: run_tests
        documentation: "Verify: run targeted contract tests after external driver-adapter change"

      - id: CT_GREEN_EXTERNAL_SYSTEM_STUB
        # Ownership TBD per process-audit gap on stubs ownership.
        # Placeholder agent name; resolve before the Go runtime ships.
        type: user_task
        agent: ct-green-external-system-stub
        documentation: "CT - GREEN - STUBS"

      - id: CT_END
        type: end_event

    sequence_flows:
      - {from: ONBOARDING,                    to: CT_RED_TEST}
      - {from: CT_RED_TEST,                   to: GATE_DSL_CT}
      - {from: GATE_DSL_CT,                   to: CT_GREEN_EXTERNAL_SYSTEM_STUB, when: "dsl_interface_changed == false"}
      - {from: GATE_DSL_CT,                   to: CT_RED_DSL,                    when: "dsl_interface_changed == true"}
      - {from: CT_RED_DSL,                    to: GATE_EXT_CT}
      - {from: GATE_EXT_CT,                   to: CT_GREEN_EXTERNAL_SYSTEM_STUB, when: "external_system_driver_interface_changed == false"}
      - {from: GATE_EXT_CT,                   to: CT_RED_EXTERNAL_SYSTEM_DRIVER, when: "external_system_driver_interface_changed == true"}
      - {from: CT_RED_EXTERNAL_SYSTEM_DRIVER, to: VERIFY_CT_DRIVER}
      - {from: VERIFY_CT_DRIVER,              to: CT_GREEN_EXTERNAL_SYSTEM_STUB}
      - {from: CT_GREEN_EXTERNAL_SYSTEM_STUB, to: CT_END}

  # ===========================================================================
  # external_system_onboarding
  # One-time-per-external-system prerequisite to CT - RED - TEST. Resolves two
  # orthogonal questions (does a Driver exist? is a Test Instance accessible?)
  # before per-scenario contract testing starts. Returns immediately if the
  # Driver already exists.
  #
  # Implementation steps are currently agent-less (`agent: human`) — there is
  # no dedicated atdd-onboarding agent today; replace once one exists.
  # ===========================================================================
  external_system_onboarding:
    start: GATE_DRIVER_EXISTS
    nodes:
      - id: GATE_DRIVER_EXISTS
        type: gateway
        binding: external_system_driver_exists
        documentation: "External System Driver exists?"

      - id: GATE_INSTANCE_ACCESSIBLE
        type: gateway
        binding: external_system_test_instance_accessible
        documentation: "Test Instance accessible?"

      - id: PROVISION
        type: user_task
        agent: human
        role: implement
        documentation: "Provision dockerized stand-in"

      - id: DEFINE_IFACE
        type: user_task
        agent: human
        role: implement
        documentation: "Define minimal Driver interface"

      - id: IMPL_DRIVER
        type: user_task
        agent: human
        role: implement
        documentation: "Implement Driver impl for Smoke Test"

      - id: WRITE_SMOKE
        type: user_task
        agent: human
        role: implement
        documentation: "Write single Smoke Test"

      - id: RUN_SMOKE
        type: service_task
        action: run_smoke_test
        documentation: "Run Smoke Test"

      - id: GATE_SMOKE_PASS
        type: gateway
        binding: smoke_test_passes
        documentation: "Smoke Test passes?"

      - id: ASK_SUPPORT
        type: user_task
        agent: human
        role: review
        documentation: "Ask user for support and STOP"

      - id: COMMIT
        type: call_activity
        process: commit
        params:
          change_type: "External System Onboarding | <name>"

      - id: ONBOARD_END
        type: end_event

    sequence_flows:
      - {from: GATE_DRIVER_EXISTS,      to: ONBOARD_END,             when: "external_system_driver_exists == true"}
      - {from: GATE_DRIVER_EXISTS,      to: GATE_INSTANCE_ACCESSIBLE, when: "external_system_driver_exists == false"}
      - {from: GATE_INSTANCE_ACCESSIBLE, to: DEFINE_IFACE,            when: "external_system_test_instance_accessible == true"}
      - {from: GATE_INSTANCE_ACCESSIBLE, to: PROVISION,               when: "external_system_test_instance_accessible == false"}
      - {from: PROVISION,               to: DEFINE_IFACE}
      - {from: DEFINE_IFACE,            to: IMPL_DRIVER}
      - {from: IMPL_DRIVER,             to: WRITE_SMOKE}
      - {from: WRITE_SMOKE,             to: RUN_SMOKE}
      - {from: RUN_SMOKE,               to: GATE_SMOKE_PASS}
      - {from: GATE_SMOKE_PASS,         to: ASK_SUPPORT,             when: "smoke_test_passes == false"}
      - {from: GATE_SMOKE_PASS,         to: COMMIT,                  when: "smoke_test_passes == true"}
      - {from: COMMIT,                  to: ONBOARD_END}

  # ===========================================================================
  # structural_cycle
  # Shared by system-api-task, system-ui-task, and task-system-implementation-refactoring via call_activity
  # `params:`. The Go runtime substitutes ${change_type}, ${agent} at
  # dispatch time. COMPILE always runs after APPROVE_CHANGE; TEST scope is
  # picked at CHOOSE_TESTS (y/n then a/s/p — "no" skips the test phase
  # entirely). When tests are selected the cycle hoists a BUILD_SYSTEM →
  # START_SYSTEM pair (gh optivem system build --rebuild + system start
  # --restart) ahead of RUN_TESTS so a fresh image is in the running container
  # before any test command. GATE_TESTS_SELECTED routes the "operator picked
  # skip" path straight to COMMIT, avoiding the rebuild cost when nothing
  # will run anyway. Compile or test RED routes through a human STOP
  # (Enter = dispatch fix-agent, abort = halt the run) and then FIX_COMPILE /
  # FIX_TEST — one shared agent (fix-verify) branching on ${failure_type}.
  # Compile retries from COMPILE; test retries from BUILD_SYSTEM so the
  # fix-agent's edits land in the rebuilt image before the same selected
  # commands re-run (commands persisted in ctx[selected_test_commands]).
  # ===========================================================================
  structural_cycle:
    start: WRITE
    nodes:
      - id: WRITE
        type: user_task
        agent: ${agent}
        documentation: "${change_type} - WRITE"

      - id: APPROVE_CHANGE
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — approve implementation"

      - id: COMPILE
        type: call_activity
        process: compile
        params:
          compile_action: compile_all
          fix_agent: fix-verify
        documentation: "Compile in-scope projects (human-gated on fail)"

      - id: CHOOSE_TESTS
        type: service_task
        action: select_tests
        documentation: "Operator picks scope (all / some suites / specific tests / skip)"

      - id: GATE_TESTS_SELECTED
        type: gateway
        binding: tests_selected
        documentation: "Operator selected tests to run?"

      - id: BUILD_SYSTEM
        type: service_task
        action: build_system
        documentation: "Build system (gh optivem system build --rebuild)"

      - id: START_SYSTEM
        type: service_task
        action: start_system
        documentation: "Start system (gh optivem system start --restart)"

      - id: RUN_TESTS
        type: service_task
        action: run_tests
        documentation: "Run selected tests; classify pass/fail for the verify gate"

      - id: GATE_STRUCT_VERIFY
        type: gateway
        binding: structural_verify_outcome
        documentation: "Test outcome? (ok | red — fix and retry)"

      - id: STOP_TEST_FAIL_REVIEW
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — tests RED, dispatch fix agent?"

      - id: FIX_TEST
        type: user_task
        agent: fix-verify
        params:
          failure_type: test
        documentation: "Dispatch fix agent on test RED — structural cycle expects green"

      - id: COMMIT
        type: call_activity
        process: commit
        params:
          change_type: ${change_type}

      - id: TICK_CHECKLIST
        type: service_task
        action: tick_checklist
        documentation: "Tick checklist items"

      - id: STRUCT_END
        type: end_event

    sequence_flows:
      - {from: WRITE,                     to: APPROVE_CHANGE}
      - {from: APPROVE_CHANGE,            to: COMPILE}
      - {from: COMPILE,                   to: CHOOSE_TESTS}
      - {from: CHOOSE_TESTS,              to: GATE_TESTS_SELECTED}
      - {from: GATE_TESTS_SELECTED,       to: BUILD_SYSTEM,             when: "tests_selected == true"}
      - {from: GATE_TESTS_SELECTED,       to: COMMIT,                   when: "tests_selected == false"}
      - {from: BUILD_SYSTEM,              to: START_SYSTEM}
      - {from: START_SYSTEM,              to: RUN_TESTS}
      - {from: RUN_TESTS,                 to: GATE_STRUCT_VERIFY}
      - {from: GATE_STRUCT_VERIFY,        to: COMMIT,                   when: "structural_verify_outcome == ok"}
      - {from: GATE_STRUCT_VERIFY,        to: STOP_TEST_FAIL_REVIEW,    when: "structural_verify_outcome == red"}
      - {from: STOP_TEST_FAIL_REVIEW,     to: FIX_TEST}
      - {from: FIX_TEST,                  to: BUILD_SYSTEM}
      - {from: COMMIT,                    to: TICK_CHECKLIST}
      - {from: TICK_CHECKLIST,            to: STRUCT_END}

  # ===========================================================================
  # The cycle picks its compile tier from the `compile_action` call-activity
  # param: every red_phase_cycle caller (AT_RED_TEST, AT_RED_DSL,
  # AT_RED_SYSTEM_DRIVER, CT_RED_TEST, CT_RED_DSL, CT_RED_EXTERNAL_SYSTEM_DRIVER) →
  # compile_system_tests, because all RED-phase edits land under
  # system-test/<lang>/ (tests, DSL, and Drivers live in the test tree).
  # green_phase_cycle callers → compile_system, because GREEN edits the
  # production system code. Resolved at dispatch via ${compile_action} on
  # the COMPILE service_task.
  # ===========================================================================
  # red_phase_cycle
  # Shared sub-process for every RED-phase node that splits creative WRITE work
  # (LLM-required) from mechanical compile/run/disable/commit work
  # (deterministic). Mirrors how `structural_cycle` factors creative
  # `WRITE` from its mechanical surroundings.
  #
  # Callers supply via `params:`:
  #   - agent             — the WRITE agent (e.g. at-red-test, at-red-dsl, at-red-system-driver)
  #   - phase_label       — the human-readable phase tag, used in node
  #                         descriptions (e.g. "AT - RED - TEST"). Substituted
  #                         into ${phase_label}.
  #   - change_type       — the COMMIT-message suffix consumed by the existing
  #                         `commit_phase` action (kept for backward
  #                         compatibility with structural_cycle's params
  #                         shape; typically equal to phase_label).
  #   - verify_real_suite — optional. When set (CT_RED_TEST), the orchestrator
  #                         runs the named suite *before* the regular RUN and
  #                         requires every test to PASS — that is the
  #                         "verify against the real external system" step
  #                         from `ct-red-test.md`. AT phases leave it unset;
  #                         the gate routes straight through to RUN.
  #
  # WRITE produces a **compiling** failing test: the agent writes both the
  # acceptance test itself and any DSL prototype stubs the test references
  # that don't yet exist (minimum signature only — no behaviour). The RED
  # state is proven by the runtime test failure (`tests_failed_runtime`),
  # not by compile failure. Compile is therefore *expected* to pass; a
  # compile-fail in RED is now an unexpected agent bug and trips the shared
  # `compile` sub-process's human-gated FIX_COMPILE loop — same as STRUCT
  # and GREEN. The earlier two-step shape (WRITE + WRITE_PROTOTYPES with
  # planned compile-fail between them) is gone; reviewers see the test plus
  # its DSL delta as one unit at STOP_RED_REVIEW.
  #
  # The `tests_failed_runtime == false` branch covers the unexpected state
  # where tests pass — for now route to a human STOP that loops back to
  # WRITE. (Compile-leak is no longer one of the modes — the shared
  # `compile` sub-process catches that explicitly.)
  #
  # Context plumbing TODO: `run_targeted_tests` reads `suite` and
  # `test_names`; the `disable-tests` and `enable-tests` agents (user_task
  # dispatch) read `language`, `ticket_id`, `loop`, `phase` / `prev_phase`,
  # and `disable_targets` via template substitution. Today nothing populates
  # these — see the AT/CT split plan's "context plumbing" follow-up.
  # Compile no longer reads from context: tier choice is encoded in the
  # `compile_action` param forwarded to the shared `compile` sub-process.
  # ===========================================================================
  red_phase_cycle:
    start: WRITE
    nodes:
      - id: WRITE
        type: user_task
        agent: ${agent}
        documentation: "${phase_label} - WRITE"

      # ---- Layer 1: agent-triggered scope exception (plan 20260518-1144 item 6) ----
      # Reads scope_exception_files / scope_exception_reason emitted by the
      # agent's COMMIT output. When the agent signals it cannot stay within
      # `scope:`, route to STOP_SCOPE_VIOLATION before any review / compile /
      # run / disable / commit work happens.
      - id: GATE_SCOPE_EXCEPTION
        type: gateway
        binding: scope_exception_requested
        documentation: "Agent signalled scope exception?"

      - id: STOP_SCOPE_VIOLATION
        type: user_task
        agent: human
        role: review
        # TODO(plan 20260518-1144 item 2): the plan defines four options here —
        # Accept / Rewind to upstream phase / Revert + rerun / Abort. For now
        # the single outflow models "Revert + rerun" (the safe default); a
        # GATE_SCOPE_DECISION binding + branches is a follow-up.
        documentation: "STOP - HUMAN REVIEW — ${phase_label} scope violation (Layer 1 agent-signalled or Layer 2 post-phase diff)"

      - id: STOP_RED_REVIEW
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — ${phase_label} test + DSL stubs"

      - id: COMPILE
        type: call_activity
        process: compile
        params:
          compile_action: ${compile_action}
          fix_agent: ${agent}
        documentation: "Compile ${phase_label} (human-gated on fail)"

      - id: GATE_VERIFY_REAL_REQUIRED
        type: gateway
        binding: verify_real_required
        documentation: "Verify against real suite first?"

      - id: VERIFY_REAL
        type: service_task
        action: verify_real_suite_passes
        documentation: "Verify ${verify_real_suite} passes"

      - id: GATE_VERIFY_REAL_PASS
        type: gateway
        binding: verify_real_pass
        documentation: "Real suite passes?"

      - id: STOP_VERIFY_REAL_FAIL
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — ${phase_label} real-suite contract problem"

      - id: RUN
        type: service_task
        action: run_targeted_tests
        documentation: "Run targeted tests"

      - id: GATE_RUN_FAILED_RUNTIME
        type: gateway
        binding: tests_failed_runtime
        documentation: "Tests fail at runtime (not compile)?"

      - id: STOP_RED_NOT_RUNTIME_FAIL
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — ${phase_label} tests not runtime-failing"

      - id: DISABLE
        type: user_task
        agent: disable-tests
        documentation: "Disable change-driven scenarios"

      # ---- Layer 2: post-phase scripted scope check (plan 20260518-1144 item 5) ----
      # check_phase_scope diffs the working tree against the phase's
      # allowed-paths (phase-scopes.yaml ∘ gh-optivem.yaml paths:) and stamps
      # phase_scope_clean + phase_scope_violating_paths on the Context. Reads
      # phase_id from ctx.Params (set by the call_activity in the parent).
      - id: CHECK_PHASE_SCOPE
        type: service_task
        action: check_phase_scope
        documentation: "Check ${phase_label} scope vs allowed paths"

      - id: GATE_PHASE_SCOPE_CLEAN
        type: gateway
        binding: phase_scope_clean
        documentation: "Phase scope clean?"

      - id: COMMIT
        type: call_activity
        process: commit
        params:
          change_type: ${change_type}

      - id: RED_END
        type: end_event

    sequence_flows:
      - {from: WRITE,                     to: GATE_SCOPE_EXCEPTION}
      - {from: GATE_SCOPE_EXCEPTION,      to: STOP_SCOPE_VIOLATION,      when: "scope_exception_requested == true"}
      - {from: GATE_SCOPE_EXCEPTION,      to: STOP_RED_REVIEW,           when: "scope_exception_requested == false"}
      - {from: STOP_SCOPE_VIOLATION,      to: WRITE}
      - {from: STOP_RED_REVIEW,           to: COMPILE}
      - {from: COMPILE,                   to: GATE_VERIFY_REAL_REQUIRED}
      - {from: GATE_VERIFY_REAL_REQUIRED, to: VERIFY_REAL,               when: "verify_real_required == true"}
      - {from: GATE_VERIFY_REAL_REQUIRED, to: RUN,                       when: "verify_real_required == false"}
      - {from: VERIFY_REAL,               to: GATE_VERIFY_REAL_PASS}
      - {from: GATE_VERIFY_REAL_PASS,     to: RUN,                       when: "verify_real_pass == true"}
      - {from: GATE_VERIFY_REAL_PASS,     to: STOP_VERIFY_REAL_FAIL,     when: "verify_real_pass == false"}
      - {from: STOP_VERIFY_REAL_FAIL,     to: WRITE}
      - {from: RUN,                       to: GATE_RUN_FAILED_RUNTIME}
      - {from: GATE_RUN_FAILED_RUNTIME,   to: DISABLE,                   when: "tests_failed_runtime == true"}
      - {from: GATE_RUN_FAILED_RUNTIME,   to: STOP_RED_NOT_RUNTIME_FAIL, when: "tests_failed_runtime == false"}
      - {from: STOP_RED_NOT_RUNTIME_FAIL, to: WRITE}
      - {from: DISABLE,                   to: CHECK_PHASE_SCOPE}
      - {from: CHECK_PHASE_SCOPE,         to: GATE_PHASE_SCOPE_CLEAN}
      - {from: GATE_PHASE_SCOPE_CLEAN,    to: COMMIT,                    when: "phase_scope_clean == true"}
      - {from: GATE_PHASE_SCOPE_CLEAN,    to: STOP_SCOPE_VIOLATION,      when: "phase_scope_clean == false"}
      - {from: COMMIT,                    to: RED_END}

  # ===========================================================================
  # green_phase_cycle
  # Shared sub-process for GREEN-phase WRITE work that splits creative WRITE
  # (LLM-required) from mechanical compile / run-test verification
  # (deterministic). Mirrors red_phase_cycle's shape but with success-pass
  # semantics: each gate's "wrong" branch routes to a STOP for human review
  # and then loops back to WRITE so the agent can re-dispatch with fresh
  # failure context.
  #
  # Callers supply via `params:`:
  #   - agent              — the WRITE agent (e.g. at-green-system, at-red-test, ct-red-dsl)
  #   - phase_label        — human-readable phase tag, used in node
  #                          descriptions (e.g. "AT - GREEN - SYSTEM (backend)")
  #   - suite              — the test suite passed to run_targeted_tests
  #                          (e.g. "<acceptance-api>", "<acceptance-ui>")
  #   - rebuild_before_run — optional. When "true", run_targeted_tests hoists
  #                          `gh optivem system build --rebuild` + `gh optivem
  #                          system start --restart` out of the per-test loop so
  #                          the freshly-rebuilt implementation under test is
  #                          in the running container before any per-test
  #                          invocation. AT GREEN callers set this; defaults to
  #                          no rebuild.
  #
  # COMMIT does NOT live in green_phase_cycle: AT_GREEN_SYSTEM commits both
  # backend and frontend together at the parent level (the full-stack-as-one-
  # commit convention). The sub-process ends after verifying tests pass; the
  # parent process owns the commit.
  # ===========================================================================
  green_phase_cycle:
    start: WRITE
    nodes:
      - id: WRITE
        type: user_task
        agent: ${agent}
        documentation: "${phase_label} - WRITE"

      # ---- Layer 1: agent-triggered scope exception (plan 20260518-1144 item 6) ----
      # Mirror of the red wrapper: route to STOP_SCOPE_VIOLATION before any
      # compile / run work when the agent signals it cannot stay within scope.
      - id: GATE_SCOPE_EXCEPTION
        type: gateway
        binding: scope_exception_requested
        documentation: "Agent signalled scope exception?"

      - id: STOP_SCOPE_VIOLATION
        type: user_task
        agent: human
        role: review
        # TODO(plan 20260518-1144 item 2): four-option decision gate
        # (Accept / Rewind / Revert+rerun / Abort) deferred; current single
        # outflow to WRITE models "Revert + rerun" (the safe default).
        documentation: "STOP - HUMAN REVIEW — ${phase_label} scope violation (Layer 1 agent-signalled or Layer 2 post-phase diff)"

      - id: COMPILE
        type: call_activity
        process: compile
        params:
          compile_action: ${compile_action}
          fix_agent: ${agent}
        documentation: "Compile ${phase_label} (human-gated on fail)"

      - id: RUN
        type: service_task
        action: run_targeted_tests
        documentation: "Run targeted tests against ${suite}"

      - id: GATE_TESTS_PASS
        type: gateway
        binding: tests_pass
        documentation: "All tests passed?"

      - id: STOP_GREEN_TEST_FAIL
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — ${phase_label} tests failed"

      # ---- Layer 2: post-phase scripted scope check (plan 20260518-1144 item 5) ----
      # Fires after tests pass, before GREEN_END returns control to the parent
      # (which owns COMMIT for the full-stack-as-one-commit convention).
      - id: CHECK_PHASE_SCOPE
        type: service_task
        action: check_phase_scope
        documentation: "Check ${phase_label} scope vs allowed paths"

      - id: GATE_PHASE_SCOPE_CLEAN
        type: gateway
        binding: phase_scope_clean
        documentation: "Phase scope clean?"

      - id: GREEN_END
        type: end_event

    sequence_flows:
      - {from: WRITE,                    to: GATE_SCOPE_EXCEPTION}
      - {from: GATE_SCOPE_EXCEPTION,     to: STOP_SCOPE_VIOLATION,   when: "scope_exception_requested == true"}
      - {from: GATE_SCOPE_EXCEPTION,     to: COMPILE,                when: "scope_exception_requested == false"}
      - {from: STOP_SCOPE_VIOLATION,     to: WRITE}
      - {from: COMPILE,                  to: RUN}
      - {from: RUN,                      to: GATE_TESTS_PASS}
      - {from: GATE_TESTS_PASS,          to: CHECK_PHASE_SCOPE,      when: "tests_pass == true"}
      - {from: GATE_TESTS_PASS,          to: STOP_GREEN_TEST_FAIL,   when: "tests_pass == false"}
      - {from: STOP_GREEN_TEST_FAIL,     to: WRITE}
      - {from: CHECK_PHASE_SCOPE,        to: GATE_PHASE_SCOPE_CLEAN}
      - {from: GATE_PHASE_SCOPE_CLEAN,   to: GREEN_END,              when: "phase_scope_clean == true"}
      - {from: GATE_PHASE_SCOPE_CLEAN,   to: STOP_SCOPE_VIOLATION,   when: "phase_scope_clean == false"}

  # ===========================================================================
  # compile
  # Shared sub-process called wherever code is compiled. Pairs the mechanical
  # COMPILE service task with the GATE + human-review-on-fail by construction —
  # callers cannot run compile without the fail-loop, so every compile failure
  # is human-gated before a fixer is dispatched. Returns only when compile_ok.
  #
  # Callers supply via `params:`:
  #   - compile_action — which compile_* action to invoke (compile_all,
  #                      compile_system, compile_system_tests).
  #   - fix_agent      — agent dispatched when compile fails. Structural
  #                      callers pass fix-verify (branches on
  #                      `failure_type=compile`); RED and GREEN callers pass
  #                      the cycle's own WRITE agent (${agent}), which simply
  #                      retries the write with corrections.
  # ===========================================================================
  compile:
    start: COMPILE
    nodes:
      - id: COMPILE
        type: service_task
        action: ${compile_action}
        documentation: "Compile (${compile_action})"

      - id: GATE_COMPILE_OK
        type: gateway
        binding: compile_ok
        documentation: "Compile passed?"

      - id: STOP_COMPILE_FAIL_REVIEW
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — compile failed, dispatch ${fix_agent}?"

      - id: FIX_COMPILE
        type: user_task
        agent: ${fix_agent}
        params:
          failure_type: compile
        documentation: "FIX compile errors"

      - id: COMPILE_END
        type: end_event

    sequence_flows:
      - {from: COMPILE,                  to: GATE_COMPILE_OK}
      - {from: GATE_COMPILE_OK,          to: COMPILE_END,              when: "compile_ok == true"}
      - {from: GATE_COMPILE_OK,          to: STOP_COMPILE_FAIL_REVIEW, when: "compile_ok == false"}
      - {from: STOP_COMPILE_FAIL_REVIEW, to: FIX_COMPILE}
      - {from: FIX_COMPILE,              to: COMPILE}

  # ===========================================================================
  # commit
  # Shared sub-process called wherever a commit happens. Pairs the human
  # APPROVE_COMMIT gate with the mechanical EXECUTE_COMMIT service task by
  # construction — callers cannot skip approval because they cannot reference
  # EXECUTE_COMMIT directly. Every commit in the orchestration is therefore
  # human-approved.
  #
  # Callers supply via `params:`:
  #   - change_type — the COMMIT-message suffix consumed by the existing
  #                   `commit_phase` action. Mirrors structural_cycle /
  #                   red_phase_cycle's existing param shape.
  # ===========================================================================
  commit:
    start: APPROVE_COMMIT
    nodes:
      - id: APPROVE_COMMIT
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — approve commit?"

      - id: EXECUTE_COMMIT
        type: service_task
        action: commit_phase
        params:
          change_type: ${change_type}
        documentation: "COMMIT: <Ticket> | ${change_type}"

      - id: COMMIT_END
        type: end_event

    sequence_flows:
      - {from: APPROVE_COMMIT, to: EXECUTE_COMMIT}
      - {from: EXECUTE_COMMIT, to: COMMIT_END}

  # ===========================================================================
  # da_cycle
  # Driver Adapter cycle — entered when the change is a structural interface
  # change. Splits on `subtype`, both branches routed through structural_cycle:
  #   - system-interface-redesign: a Driver Adapter we own (API, UI, mobile,
  #     CLI, ...). The WRITE agent reads the ticket body + system to figure
  #     out which driver(s) to modify — the framework no longer pre-classifies
  #     the channel.
  #   - external-system-interface-redesign: an External System Driver Adapter.
  #     Pure adapter rewrite (and its stub); CT and DSL are at higher
  #     abstraction and stay untouched, so test-first contract machinery
  #     (ct_subprocess) is not used here.
  # ===========================================================================
  da_cycle:
    start: GATE_CHANGE_TYPE_DA
    nodes:
      - id: GATE_CHANGE_TYPE_DA
        type: gateway
        binding: change_type
        documentation: "System or external-system interface?"

      - id: SYSTEM_INTERFACE_REDESIGN_CYCLE
        type: call_activity
        process: structural_cycle
        params:
          change_type: "SYSTEM INTERFACE REDESIGN"
          agent: task-system-interface-redesign
          subtype: system-interface-redesign

      - id: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE
        type: call_activity
        process: structural_cycle
        params:
          change_type: "EXTERNAL SYSTEM INTERFACE REDESIGN"
          agent: task-external-system-interface-redesign
          subtype: external-system-interface-redesign

      - id: DA_END
        type: end_event

    sequence_flows:
      - {from: GATE_CHANGE_TYPE_DA,                to: SYSTEM_INTERFACE_REDESIGN_CYCLE,          when: "change_type == system-interface-redesign"}
      - {from: GATE_CHANGE_TYPE_DA,                to: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE, when: "change_type == external-system-interface-redesign"}
      - {from: SYSTEM_INTERFACE_REDESIGN_CYCLE,    to: DA_END}
      - {from: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE, to: DA_END}

  # ===========================================================================
  # sut_cycle
  # System Under Test cycle — structural change with no test-stack artifact
  # changing (no AT, no DA). Routes through structural_cycle with the
  # system-implementation-refactoring task change_type / agent.
  # ===========================================================================
  sut_cycle:
    start: SYSTEM_IMPLEMENTATION_REFACTORING_CYCLE
    nodes:
      - id: SYSTEM_IMPLEMENTATION_REFACTORING_CYCLE
        type: call_activity
        process: structural_cycle
        params:
          change_type: system-implementation-refactoring
          agent: task-system-implementation-refactoring

      - id: SUT_END
        type: end_event

    sequence_flows:
      - {from: SYSTEM_IMPLEMENTATION_REFACTORING_CYCLE, to: SUT_END}

  # ===========================================================================
  # legacy_acceptance_criteria
  # Dispatch wrapper for the legacy coverage cycle — called from
  # run_legacy_cycle when a ticket carries any Legacy Acceptance Criteria.
  # Branches on criterion type (AT vs CT) using two presence booleans so
  # tickets that carry both kinds run both sub-cycles sequentially. The
  # upstream `RUN_LEGACY_CYCLE` caller stays oblivious to the AT/CT split.
  # See plans/20260518-1116-legacy-coverage-cycle.md item 1b.
  # ===========================================================================
  legacy_acceptance_criteria:
    start: GATE_LEGACY_AT_PRESENT
    nodes:
      - id: GATE_LEGACY_AT_PRESENT
        type: gateway
        binding: legacy_at_acceptance_criteria_present
        documentation: "Legacy AT-style acceptance criteria present?"

      - id: LEGACY_AT_CYCLE
        type: call_activity
        process: legacy_at_cycle

      - id: GATE_LEGACY_CT_PRESENT
        type: gateway
        binding: legacy_ct_acceptance_criteria_present
        documentation: "Legacy CT-style acceptance criteria present?"

      - id: LEGACY_CT_CYCLE
        type: call_activity
        process: legacy_ct_cycle

      - id: LEGACY_END
        type: end_event

    sequence_flows:
      - {from: GATE_LEGACY_AT_PRESENT, to: LEGACY_AT_CYCLE,        when: "legacy_at_acceptance_criteria_present == true"}
      - {from: GATE_LEGACY_AT_PRESENT, to: GATE_LEGACY_CT_PRESENT, when: "legacy_at_acceptance_criteria_present == false"}
      - {from: LEGACY_AT_CYCLE,        to: GATE_LEGACY_CT_PRESENT}
      - {from: GATE_LEGACY_CT_PRESENT, to: LEGACY_CT_CYCLE,        when: "legacy_ct_acceptance_criteria_present == true"}
      - {from: GATE_LEGACY_CT_PRESENT, to: LEGACY_END,             when: "legacy_ct_acceptance_criteria_present == false"}
      - {from: LEGACY_CT_CYCLE,        to: LEGACY_END}

  # ===========================================================================
  # legacy_at_cycle
  # Legacy AT coverage cycle — retroactively writes acceptance tests for
  # behaviour that already exists in the SUT. Mirrors the AT change cycle's
  # RED-side phase shape (test → DSL → system driver) with the existing
  # interface-changed flags gating which layers run. Ends with an inverted-RED
  # verify gate: the assembled test is expected to PASS on first run. On
  # fail, route to STOP - HUMAN REVIEW (no loopback) — operator edits the
  # offending layer and re-runs the legacy cycle from scratch.
  # See plans/20260518-1116-legacy-coverage-cycle.md item 1b.
  # ===========================================================================
  legacy_at_cycle:
    start: LEGACY_AT_TEST
    nodes:
      - id: LEGACY_AT_TEST
        type: user_task
        agent: legacy-at-test
        documentation: "LEGACY - AT - TEST"

      - id: GATE_DSL_LEGACY_AT
        type: gateway
        binding: dsl_interface_changed
        documentation: "DSL Interface Changed?"

      - id: LEGACY_AT_DSL
        type: user_task
        agent: legacy-at-dsl
        documentation: "LEGACY - AT - DSL"

      - id: GATE_SYS_LEGACY_AT
        type: gateway
        binding: system_driver_interface_changed
        documentation: "System Driver Interface Changed?"

      - id: LEGACY_AT_SYSTEM_DRIVER
        type: user_task
        agent: legacy-at-system-driver
        documentation: "LEGACY - AT - SYSTEM DRIVER"

      - id: VERIFY_LEGACY_AT
        type: service_task
        action: run_tests
        documentation: "Verify: run assembled legacy AT tests — inverted-RED, expected to PASS on first run"

      - id: GATE_VERIFY_LEGACY_AT
        type: gateway
        binding: legacy_at_verify_outcome
        documentation: "Legacy AT verify outcome? (ok = passed on first run | red = test/DSL/driver wrong)"

      - id: STOP_LEGACY_AT_VERIFY_FAILED
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — legacy AT verify RED; the test/DSL/driver is suspect (SUT is never modified in a legacy cycle). Edit the offending layer and re-run the legacy cycle from scratch."

      - id: LEGACY_AT_END
        type: end_event

    sequence_flows:
      - {from: LEGACY_AT_TEST,            to: GATE_DSL_LEGACY_AT}
      - {from: GATE_DSL_LEGACY_AT,        to: LEGACY_AT_DSL,                 when: "dsl_interface_changed == true"}
      - {from: GATE_DSL_LEGACY_AT,        to: GATE_SYS_LEGACY_AT,            when: "dsl_interface_changed == false"}
      - {from: LEGACY_AT_DSL,             to: GATE_SYS_LEGACY_AT}
      - {from: GATE_SYS_LEGACY_AT,        to: LEGACY_AT_SYSTEM_DRIVER,       when: "system_driver_interface_changed == true"}
      - {from: GATE_SYS_LEGACY_AT,        to: VERIFY_LEGACY_AT,              when: "system_driver_interface_changed == false"}
      - {from: LEGACY_AT_SYSTEM_DRIVER,   to: VERIFY_LEGACY_AT}
      - {from: VERIFY_LEGACY_AT,          to: GATE_VERIFY_LEGACY_AT}
      - {from: GATE_VERIFY_LEGACY_AT,     to: LEGACY_AT_END,                 when: "legacy_at_verify_outcome == ok"}
      - {from: GATE_VERIFY_LEGACY_AT,     to: STOP_LEGACY_AT_VERIFY_FAILED,  when: "legacy_at_verify_outcome == red"}
      - {from: STOP_LEGACY_AT_VERIFY_FAILED, to: LEGACY_AT_END}

  # ===========================================================================
  # legacy_ct_cycle
  # Legacy CT coverage cycle — retroactively writes external-system contract
  # tests for integration behaviour that already exists. Mirrors the CT
  # change cycle's RED-side phase shape (test → DSL → external driver) with
  # the existing interface-changed flags gating which layers run; the
  # external-system stub phase is always run (the stub is test infrastructure,
  # not production code, so authoring it is consistent with legacy's
  # test-side-only rule). Ends with an inverted-RED verify gate.
  # See plans/20260518-1116-legacy-coverage-cycle.md item 1b.
  # ===========================================================================
  legacy_ct_cycle:
    start: LEGACY_CT_TEST
    nodes:
      - id: LEGACY_CT_TEST
        type: user_task
        agent: legacy-ct-test
        documentation: "LEGACY - CT - TEST"

      - id: GATE_DSL_LEGACY_CT
        type: gateway
        binding: dsl_interface_changed
        documentation: "DSL Interface Changed?"

      - id: LEGACY_CT_DSL
        type: user_task
        agent: legacy-ct-dsl
        documentation: "LEGACY - CT - DSL"

      - id: GATE_EXT_LEGACY_CT
        type: gateway
        binding: external_system_driver_interface_changed
        documentation: "External System Driver Interface Changed?"

      - id: LEGACY_CT_EXTERNAL_SYSTEM_DRIVER
        type: user_task
        agent: legacy-ct-external-system-driver
        documentation: "LEGACY - CT - EXTERNAL SYSTEM DRIVER"

      - id: LEGACY_CT_EXTERNAL_SYSTEM_STUB
        type: user_task
        agent: legacy-ct-external-system-stub
        documentation: "LEGACY - CT - EXTERNAL SYSTEM STUB"

      - id: VERIFY_LEGACY_CT
        type: service_task
        action: run_tests
        documentation: "Verify: run assembled legacy CT tests — inverted-RED, expected to PASS on first run"

      - id: GATE_VERIFY_LEGACY_CT
        type: gateway
        binding: legacy_ct_verify_outcome
        documentation: "Legacy CT verify outcome? (ok = passed on first run | red = test/DSL/driver/stub wrong)"

      - id: STOP_LEGACY_CT_VERIFY_FAILED
        type: user_task
        agent: human
        role: review
        documentation: "STOP - HUMAN REVIEW — legacy CT verify RED; the test/DSL/driver/stub is suspect (SUT is never modified in a legacy cycle). Edit the offending layer and re-run the legacy cycle from scratch."

      - id: LEGACY_CT_END
        type: end_event

    sequence_flows:
      - {from: LEGACY_CT_TEST,                   to: GATE_DSL_LEGACY_CT}
      - {from: GATE_DSL_LEGACY_CT,               to: LEGACY_CT_DSL,                       when: "dsl_interface_changed == true"}
      - {from: GATE_DSL_LEGACY_CT,               to: LEGACY_CT_EXTERNAL_SYSTEM_STUB,      when: "dsl_interface_changed == false"}
      - {from: LEGACY_CT_DSL,                    to: GATE_EXT_LEGACY_CT}
      - {from: GATE_EXT_LEGACY_CT,               to: LEGACY_CT_EXTERNAL_SYSTEM_DRIVER,    when: "external_system_driver_interface_changed == true"}
      - {from: GATE_EXT_LEGACY_CT,               to: LEGACY_CT_EXTERNAL_SYSTEM_STUB,      when: "external_system_driver_interface_changed == false"}
      - {from: LEGACY_CT_EXTERNAL_SYSTEM_DRIVER, to: LEGACY_CT_EXTERNAL_SYSTEM_STUB}
      - {from: LEGACY_CT_EXTERNAL_SYSTEM_STUB,   to: VERIFY_LEGACY_CT}
      - {from: VERIFY_LEGACY_CT,                 to: GATE_VERIFY_LEGACY_CT}
      - {from: GATE_VERIFY_LEGACY_CT,            to: LEGACY_CT_END,                       when: "legacy_ct_verify_outcome == ok"}
      - {from: GATE_VERIFY_LEGACY_CT,            to: STOP_LEGACY_CT_VERIFY_FAILED,        when: "legacy_ct_verify_outcome == red"}
      - {from: STOP_LEGACY_CT_VERIFY_FAILED,     to: LEGACY_CT_END}
