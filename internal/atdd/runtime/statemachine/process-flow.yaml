    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_STUBS_END}

  # ===========================================================================
  # MID — disable-tests
  # ===========================================================================
  disable-tests:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          task-name: disable-tests
          scopes: "at-test,ct-test"

      - id: DISABLE_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: DISABLE_END}

  # ===========================================================================
  # MID — enable-tests
  # ===========================================================================
  enable-tests:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
