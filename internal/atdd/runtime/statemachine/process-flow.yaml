          scopes: "external-system-driver-port,external-system-driver-adapter"

      - id: IMPL_EXT_DA_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_EXT_DA_END}

  # ===========================================================================
  # MID — implement-external-system-stubs
  # ===========================================================================
  implement-external-system-stubs:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
