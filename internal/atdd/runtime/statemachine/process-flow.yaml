    sequence-flows:
      - {from: IMPLEMENT_TEST_LAYER, to: IMPL_EXT_DRIVER_END}

  # ===========================================================================
  # HIGH — implement-and-verify-external-system-driver-adapters-contract-tests
  # ===========================================================================
  #
  # Contract-test variant of the external driver-adapter impl. Mirrors the
  # AT-side cascade but with `tests: contract` semantics and the
  # contract-real / contract-stub verify split. Absorbs the pre-refactor
  # diagram #8 (contract-test-sub-process); see design archive
  # (plans/20260525-1057-bpmn-refactor-design.md Cross-check vs existing
  # BPMN, diagram 8).
  #
  # **Orphan in the structural call graph (intentional — known gap).** No
  # other process calls this HIGH today: the brainstorm files
  # (plans/ideas/3-bpmn-refactor-high-level.md +
  # plans/ideas/4-bpmn-refactor-cycle-level.md) define the cascade
  # `change-system-behavior` → `write-and-verify-acceptance-tests` →
  # `implement-and-verify-external-system-driver-adapters` for the AT
  # side, but do **not** show a corresponding call into the CT-side HIGH.
  # Per Q31.a (resolved Option A nested) the intended wiring is that CT
  # runs as a nested sub-process called by the AT-side when the AT layer
  # needs a stub/driver to pass; the exact call site (inside the AT-side
  # adapter HIGH, or as a sibling step in `write-and-verify-acceptance-
  # tests`) is unresolved in the brainstorm and left for Phase D.
  # Encoding here so diagram #8's absorption is visible per the cross-
  # check inventory; the call-site wiring lands in the downstream-
  # alignment plan.
  # ===========================================================================
  implement-and-verify-external-system-driver-adapters-contract-tests:
    start: WRITE_CONTRACT_TESTS
    nodes:
      - id: WRITE_CONTRACT_TESTS
        type: call-activity
        process: write-contract-tests
        params:
          expected-test-result: success

      - id: GATE_DSL_PORT_CHANGED
        type: gateway
        binding: dsl-port-changed
        documentation: "DSL port changed?"

      - id: IMPLEMENT_AND_VERIFY_DSL
        type: call-activity
        process: implement-and-verify-dsl
        params:
          expected-test-result: success
          tests: contract

      - id: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-external-system-driver-adapters

      - id: VERIFY_TESTS_PASS_CONTRACT_REAL
        type: call-activity
        process: verify-tests-pass
        params:
          filter-type: test-type
          filter-value: contract-real

      - id: VERIFY_TESTS_FAIL_CONTRACT_STUB
        type: call-activity
        process: verify-tests-fail
        params:
          filter-type: test-type
          filter-value: contract-stub

      - id: IMPLEMENT_EXTERNAL_SYSTEM_STUBS
        type: call-activity
        process: implement-external-system-stubs

      - id: VERIFY_TESTS_PASS_CONTRACT_STUB
        type: call-activity
        process: verify-tests-pass
        params:
          filter-type: test-type
          filter-value: contract-stub

      - id: IMPL_EXT_DRIVER_CT_END
        type: end-event

    sequence-flows:
      - {from: WRITE_CONTRACT_TESTS,    to: GATE_DSL_PORT_CHANGED}
      - {from: GATE_DSL_PORT_CHANGED,   to: IMPLEMENT_AND_VERIFY_DSL,                     when: "dsl-port-changed == true"}
      - {from: GATE_DSL_PORT_CHANGED,   to: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS,    when: "dsl-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_DSL,                  to: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS, to: VERIFY_TESTS_PASS_CONTRACT_REAL}
      - {from: VERIFY_TESTS_PASS_CONTRACT_REAL,           to: VERIFY_TESTS_FAIL_CONTRACT_STUB}
      - {from: VERIFY_TESTS_FAIL_CONTRACT_STUB,           to: IMPLEMENT_EXTERNAL_SYSTEM_STUBS}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_STUBS,           to: VERIFY_TESTS_PASS_CONTRACT_STUB}
      - {from: VERIFY_TESTS_PASS_CONTRACT_STUB,           to: IMPL_EXT_DRIVER_CT_END}

  # ===========================================================================
  # HIGH — implement-and-verify-system
  # ===========================================================================
  #
  # Parameterised system impl: the caller picks the MID agent task by
  # supplying `agent-action`. Two known callers today —
  # `change-system-behavior` passes `implement-system`,
  # `refactor-system-structure` passes `refactor-system`. The templated
  # `process: ${agent-action}` resolves at dispatch time (runtime support
  # added by Item 2 of this plan).
  # ===========================================================================
  implement-and-verify-system:
    start: CALL_AGENT_ACTION
    nodes:
      - id: CALL_AGENT_ACTION
        type: call-activity
        process: ${agent-action}
        documentation: "agent-action: ${agent-action}"

      - id: BUILD_SYSTEM
        type: call-activity
        process: build-system

      - id: START_SYSTEM
        type: call-activity
        process: start-system

      - id: VERIFY_TESTS_PASS
        type: call-activity
        process: verify-tests-pass

      - id: COMMIT_SYSTEM
        type: call-activity
        process: commit

      - id: IMPL_AND_VERIFY_SYSTEM_END
        type: end-event

    sequence-flows:
      - {from: CALL_AGENT_ACTION, to: BUILD_SYSTEM}
      - {from: BUILD_SYSTEM,      to: START_SYSTEM}
      - {from: START_SYSTEM,      to: VERIFY_TESTS_PASS}
      - {from: VERIFY_TESTS_PASS, to: COMMIT_SYSTEM}
      - {from: COMMIT_SYSTEM,     to: IMPL_AND_VERIFY_SYSTEM_END}

  # ===========================================================================
  # HIGH — refactor-and-verify-tests (Q8 — distinct from implement-and-verify-system)
  # ===========================================================================
  refactor-and-verify-tests:
    start: REFACTOR_TESTS
    nodes:
      - id: REFACTOR_TESTS
        type: call-activity
        process: refactor-tests

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests

      - id: VERIFY_TESTS_PASS
        type: call-activity
        process: verify-tests-pass

      - id: COMMIT_TESTS
        type: call-activity
        process: commit

      - id: REFACTOR_AND_VERIFY_TESTS_END
        type: end-event

    sequence-flows:
      - {from: REFACTOR_TESTS,    to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,     to: VERIFY_TESTS_PASS}
      - {from: VERIFY_TESTS_PASS, to: COMMIT_TESTS}
      - {from: COMMIT_TESTS,      to: REFACTOR_AND_VERIFY_TESTS_END}

  # ===========================================================================
  # HIGH (SHARED) — implement-test-layer
  # ===========================================================================
  #
  # Shared cascade for any test-layer impl that follows the "agent runs,
  # then enable / compile / verify / commit" rhythm. Called by every
  # `implement-and-verify-*-driver-adapters` and by `implement-and-verify-
  # dsl`. Branches on `expected-test-result` (success → verify-tests-pass;
  # failure → verify-tests-fail + disable-tests). Note that `commit` runs
  # unconditionally — the gateway is on the verify shape, not on whether to
  # commit.
  # ===========================================================================
  implement-test-layer:
    start: CALL_AGENT_ACTION
    nodes:
      - id: CALL_AGENT_ACTION
        type: call-activity
        process: ${agent-action}
        documentation: "agent-action: ${agent-action}"

      - id: ENABLE_TESTS
        type: call-activity
        process: enable-tests
        params:
          tests: ${tests}

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests

      - id: GATE_EXPECTED_TEST_RESULT
        type: gateway
        binding: expected-test-result
        documentation: "Expected test result?"

      - id: VERIFY_TESTS_PASS_FILTERED
        type: call-activity
        process: verify-tests-pass
        params:
          filter-type: test-type
          filter-value: ${tests}

      - id: VERIFY_TESTS_FAIL_FILTERED
        type: call-activity
        process: verify-tests-fail
        params:
          filter-type: test-type
          filter-value: ${tests}

      - id: DISABLE_TESTS
        type: call-activity
        process: disable-tests
        params:
          tests: ${tests}

      - id: COMMIT_LAYER
        type: call-activity
        process: commit

      - id: IMPLEMENT_TEST_LAYER_END
        type: end-event

    sequence-flows:
      - {from: CALL_AGENT_ACTION, to: ENABLE_TESTS}
      - {from: ENABLE_TESTS,      to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,     to: GATE_EXPECTED_TEST_RESULT}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_PASS_FILTERED, when: "expected-test-result == success"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_FAIL_FILTERED, when: "expected-test-result == failure"}
      - {from: VERIFY_TESTS_PASS_FILTERED, to: COMMIT_LAYER}
      - {from: VERIFY_TESTS_FAIL_FILTERED, to: DISABLE_TESTS}
      - {from: DISABLE_TESTS,              to: COMMIT_LAYER}
      - {from: COMMIT_LAYER,               to: IMPLEMENT_TEST_LAYER_END}

  # ===========================================================================
  # HIGH (SHARED) — verify-tests-pass
  # ===========================================================================
  #
  # Run tests under `filter-type` / `filter-value`; on FAIL, dispatch
  # `fix-unexpected-failing-tests`. Caller passes filter params (or omits
  # to run all tests).
  # ===========================================================================
  verify-tests-pass:
    start: RUN_TESTS
    nodes:
      - id: RUN_TESTS
        type: call-activity
        process: run-tests
        params:
          filter-type: ${filter-type}
          filter-value: ${filter-value}

      - id: GATE_TESTS_OUTCOME
        type: gateway
        binding: test-outcome
        documentation: "All tests passed?"

      - id: FIX_UNEXPECTED_FAILING_TESTS
        type: call-activity
        process: fix-unexpected-failing-tests

      - id: VERIFY_PASS_END
        type: end-event

    sequence-flows:
      - {from: RUN_TESTS,          to: GATE_TESTS_OUTCOME}
      - {from: GATE_TESTS_OUTCOME, to: VERIFY_PASS_END,              when: "test-outcome == pass"}
      - {from: GATE_TESTS_OUTCOME, to: FIX_UNEXPECTED_FAILING_TESTS, when: "test-outcome == fail"}
      - {from: FIX_UNEXPECTED_FAILING_TESTS, to: VERIFY_PASS_END}

  # ===========================================================================
  # HIGH (SHARED) — verify-tests-fail
  # ===========================================================================
  #
  # Inverted: run tests under filter; on PASS, dispatch
  # `fix-unexpected-passing-tests`.
  # ===========================================================================
  verify-tests-fail:
    start: RUN_TESTS
    nodes:
      - id: RUN_TESTS
        type: call-activity
        process: run-tests
        params:
          filter-type: ${filter-type}
          filter-value: ${filter-value}

      - id: GATE_TESTS_OUTCOME
        type: gateway
        binding: test-outcome
        documentation: "Any tests passed?"

      - id: FIX_UNEXPECTED_PASSING_TESTS
        type: call-activity
        process: fix-unexpected-passing-tests

      - id: VERIFY_FAIL_END
        type: end-event

    sequence-flows:
      - {from: RUN_TESTS,          to: GATE_TESTS_OUTCOME}
      - {from: GATE_TESTS_OUTCOME, to: FIX_UNEXPECTED_PASSING_TESTS, when: "test-outcome == pass"}
      - {from: GATE_TESTS_OUTCOME, to: VERIFY_FAIL_END,              when: "test-outcome == fail"}
      - {from: FIX_UNEXPECTED_PASSING_TESTS, to: VERIFY_FAIL_END}

  # ===========================================================================
  # MID — write-acceptance-tests
  # ===========================================================================
  #
  # Scopes: at-test, dsl-port, dsl-core. Outputs: dsl-port-changed.
  # ===========================================================================
  write-acceptance-tests:
