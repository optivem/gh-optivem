# ATDD Pipeline — Orchestration Flow
#
# Single source of truth for cycle-level orchestration. Encodes the AT cycle,
# the CT sub-process, the External System Onboarding sub-process, the shared
# structural cycle (used by the system-interface-redesign and
# system-implementation-change subtypes), the external-system-interface-redesign
# wrapper, and the (TBD) Legacy Acceptance Criteria cycle as named flows of
# typed nodes connected by sequence flows.
#
# Per-phase WRITE/COMMIT mechanics (e.g. the inner compile/run/disable loop of
# AT - RED - TEST) are *not* encoded here — they live in the per-phase docs
# (at-red-test.md, at-red-dsl.md, ...) and stay agent-internal. The YAML
# describes the orchestrator's view: what dispatches next, gated by which flag.
#
# Document shape:
#
#   flows:
#     <flow_name>:
#       start: <node_id>            # entry node — must appear in nodes:
#       nodes:                      # ids unique per flow (reuse across flows is fine)
#         - id: <node_id>
#           type: <node_type>       # body fields depend on type:
#                                   #   service_task  → action: <name>
#                                   #   user_task     → agent: <name>   (or "human" for a STOP)
#                                   #   gateway       → binding: <name>
#                                   #   call_activity → flow: <flow_name>   [+ params: <map>]
#                                   #   start_event / end_event → no body
#       sequence_flows:
#         - {from: <id>, to: <id>}                        # unconditional edge
#         - {from: <id>, to: <id>, when: "<predicate>"}   # gateway-guarded edge
#
# Node types (BPMN-shaped vocabulary):
#   start_event    Flow entry.
#   end_event      Flow terminus.
#   service_task   Mechanical action; the Go runtime auto-executes
#                  actions.<action> with no agent dispatch.
#   user_task      Creative work; the Go runtime dispatches the named agent
#                  and waits for its COMMIT output. A user_task with
#                  `agent: human` is a STOP — no dispatch, just block on
#                  human input.
#   gateway        XOR decision; the Go runtime calls gates.<binding>(ctx)
#                  and follows the outgoing edge whose `when:` predicate
#                  matches the returned value.
#   call_activity  Embedded sub-flow; control returns to the parent flow's
#                  next sequence flow on completion.
#
# Sequence flows:
#   {from: A, to: B}                       Unconditional.
#   {from: A, to: B, when: "<predicate>"}  Outgoing edge from a gateway.
#                                          Predicates are evaluated against
#                                          the value returned by the gateway's
#                                          `binding:` function.
#
# Optional fields:
#   description:   Free-text node label; rendered in the Mermaid diagram.
#   role:          `review` or `implement` — annotation only. The Go runtime
#                  doesn't consume it, and the diagram generator no longer
#                  styles by role (it colors by executor: white = service_task,
#                  yellow = user_task agent: human, dark blue = user_task with
#                  any other agent). Kept on existing nodes for documentation.
#   params:        Map of name→value substituted into the called flow's nodes
#                  at dispatch time (used by call_activity to parameterise
#                  the shared structural_cycle).
#
# Open gaps preserved as TBDs (do not silently resolve):
#   - legacy_acceptance_criteria flow: single TBD node; full mechanics deferred per
#     glossary.md ("The Legacy Acceptance Criteria Cycle's own internal phases are TBD").
#   - ct_green_stubs node: agent set to `atdd-stubs`; ownership is TBD per the
#     process-audit gap on stubs ownership (see plans/20260429-100633-process-audit.md).

flows:

  # ===========================================================================
  # main
  # Ticket Lifecycle — entry flow for `gh optivem atdd implement-ticket
  # --issue N` and `gh optivem atdd manage-project`. Pulls the next ticket
  # (board / specific_issue → in-progress), then runs intake, runs the
  # legacy acceptance criteria cycle (no-op when the ticket carries no Legacy Acceptance Criteria
  # section), runs the change cycle for the ticket's type, and ends at
  # TICKET STATUS - IN ACCEPTANCE.
  #
  # Each sub-flow encapsulates its own gates so main stays linear and
  # gate-free. Splitting them lets each diagram answer one question:
  # "main" shows the ticket's lifecycle, "intake" shows the type-specific
  # intake fan-out, "run_legacy_cycle" shows the legacy-acceptance-criteria backfill,
  # and "run_cycle" shows the behavioral-vs-structural change-cycle choice.
  # ===========================================================================
  main:
    start: START
    nodes:
      - id: START
        type: start_event

      - id: PICK_TOP_READY
        type: service_task
        action: pick_top_ready
        description: "Pick top Ready ticket"

      - id: MOVE_TO_IN_PROGRESS
        type: service_task
        action: move_to_in_progress
        description: "Move ticket to In Progress (bottom of lane)"

      - id: INTAKE
        type: call_activity
        flow: intake

      - id: RUN_LEGACY_CYCLE
        type: call_activity
        flow: run_legacy_cycle

      - id: RUN_CYCLE
        type: call_activity
        flow: run_cycle

      - id: TICKET_IN_ACCEPTANCE
        type: service_task
        action: move_to_in_acceptance
        description: "Tick checklist + move issue to IN ACCEPTANCE"

      - id: END
        type: end_event

    sequence_flows:
      - {from: START,                to: PICK_TOP_READY,      when: "mode == board"}
      - {from: START,                to: MOVE_TO_IN_PROGRESS, when: "mode == specific_issue"}
      - {from: PICK_TOP_READY,       to: MOVE_TO_IN_PROGRESS}
      - {from: MOVE_TO_IN_PROGRESS,  to: INTAKE}
      - {from: INTAKE,               to: RUN_LEGACY_CYCLE}
      - {from: RUN_LEGACY_CYCLE,     to: RUN_CYCLE}
      - {from: RUN_CYCLE,            to: TICKET_IN_ACCEPTANCE}
      - {from: TICKET_IN_ACCEPTANCE, to: END}

  # ===========================================================================
  # intake
  # Owns the full "understand this ticket" responsibility: classify the
  # ticket type from GitHub's native issue type, surface low-confidence
  # classifications for human resolution, classify the structural subtype
  # from the `subtype:*` label (task tickets only), and parse the body's
  # canonical sections deterministically. No LLM is dispatched — Issue
  # Forms enforce the schema upstream so the parser is unambiguous.
  # Self-contained: main only sees INTAKE start and finish.
  # ===========================================================================
  intake:
    start: CLASSIFY
    nodes:
      - id: CLASSIFY
        type: service_task
        action: classify_ticket
        description: "Auto-classify ticket"

      - id: GATE_CLASSIFY_CONFIDENT
        type: gateway
        binding: classify_confident
        description: "Classification confident?"

      - id: STOP_CLASSIFY_CONFLICT
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — set issue type / re-run"

      - id: GATE_NEEDS_SUBTYPE
        type: gateway
        binding: ticket_type
        description: "Task ticket?"

      - id: CLASSIFY_SUBTYPE
        type: service_task
        action: classify_subtype
        description: "Auto-classify subtype"

      - id: PARSE_BODY
        type: service_task
        action: parse_ticket_body
        description: "Parse ticket body sections"

      - id: GATE_PARSE_OK
        type: gateway
        binding: parse_ok
        description: "Parsed OK?"

      - id: STOP_PARSE_ERROR
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — fix ticket body / re-run"

      - id: INTAKE_END
        type: end_event

    sequence_flows:
      - {from: CLASSIFY,                to: GATE_CLASSIFY_CONFIDENT}
      - {from: GATE_CLASSIFY_CONFIDENT, to: GATE_NEEDS_SUBTYPE,      when: "classify_confident == true"}
      - {from: GATE_CLASSIFY_CONFIDENT, to: STOP_CLASSIFY_CONFLICT,  when: "classify_confident == false"}
      - {from: STOP_CLASSIFY_CONFLICT,  to: GATE_NEEDS_SUBTYPE}
      - {from: GATE_NEEDS_SUBTYPE,      to: CLASSIFY_SUBTYPE,        when: "ticket_type == task"}
      - {from: GATE_NEEDS_SUBTYPE,      to: PARSE_BODY,              when: "ticket_type in [story, bug]"}
      - {from: CLASSIFY_SUBTYPE,        to: PARSE_BODY}
      - {from: PARSE_BODY,              to: GATE_PARSE_OK}
      - {from: GATE_PARSE_OK,           to: INTAKE_END,              when: "parse_ok == true"}
      - {from: GATE_PARSE_OK,           to: STOP_PARSE_ERROR,        when: "parse_ok == false"}
      - {from: STOP_PARSE_ERROR,        to: PARSE_BODY}

  # ===========================================================================
  # run_legacy_cycle
  # Backfill cycle for tickets that carry a "Legacy Acceptance Criteria" section in
  # their issue body — covers previously-untested behavior before the new
  # change cycle runs. Self-contained: gates internally on presence and
  # no-ops when absent, so main can call it unconditionally.
  # ===========================================================================
  run_legacy_cycle:
    start: GATE_LEGACY_PRESENT
    nodes:
      - id: GATE_LEGACY_PRESENT
        type: gateway
        binding: legacy_acceptance_criteria_section_present
        description: "Legacy Acceptance Criteria section present?"

      - id: LEGACY_CYCLE
        type: call_activity
        flow: legacy_acceptance_criteria

      - id: RUN_LEGACY_END
        type: end_event

    sequence_flows:
      - {from: GATE_LEGACY_PRESENT, to: LEGACY_CYCLE,    when: "legacy_acceptance_criteria_section_present == true"}
      - {from: GATE_LEGACY_PRESENT, to: RUN_LEGACY_END,  when: "legacy_acceptance_criteria_section_present == false"}
      - {from: LEGACY_CYCLE,        to: RUN_LEGACY_END}

  # ===========================================================================
  # run_cycle
  # Change cycle for the current ticket — dispatches by ticket_type first
  # (behavioral vs structural) and then, for tasks, by `subtype` (the value
  # carried on the `subtype:*` label). Three cycles cover the full space,
  # named after the test-stack layer at which the change is visible:
  #   - story / bug                            → at_cycle  (AT-layer change)
  #   - task + system-interface-redesign       → da_cycle  (Driver Adapter seam change, system-side)
  #   - task + external-system-interface-redesign → da_cycle (Driver Adapter seam change, external-side)
  #   - task + system-implementation-change    → sut_cycle (System Under Test internal)
  #
  # ticket_type comes from the issue's native GitHub type (Story / Bug / Task
  # — set by the Issue Form's `type:` field). subtype comes from the
  # `subtype:*` label and is undefined for behavioral tickets — the
  # ticket_type gate routes them past the subtype gate.
  # ===========================================================================
  run_cycle:
    start: GATE_TICKET_TYPE
    nodes:
      - id: GATE_TICKET_TYPE
        type: gateway
        binding: ticket_type
        description: "Behavioral or structural?"

      - id: GATE_SUBTYPE
        type: gateway
        binding: subtype
        description: "Cycle by subtype"

      - id: AT_CYCLE
        type: call_activity
        flow: at_cycle

      - id: DA_CYCLE
        type: call_activity
        flow: da_cycle

      - id: SUT_CYCLE
        type: call_activity
        flow: sut_cycle

      - id: CYCLE_END
        type: end_event

    sequence_flows:
      - {from: GATE_TICKET_TYPE, to: AT_CYCLE,     when: "ticket_type in [story, bug]"}
      - {from: GATE_TICKET_TYPE, to: GATE_SUBTYPE, when: "ticket_type == task"}
      - {from: GATE_SUBTYPE,     to: DA_CYCLE,     when: "subtype in [system-interface-redesign, external-system-interface-redesign]"}
      - {from: GATE_SUBTYPE,     to: SUT_CYCLE,    when: "subtype == system-implementation-change"}
      - {from: AT_CYCLE,  to: CYCLE_END}
      - {from: DA_CYCLE,  to: CYCLE_END}
      - {from: SUT_CYCLE, to: CYCLE_END}

  # ===========================================================================
  # at_cycle
  # AT Cycle — driven by change-driven AC (story / bug).
  # Embeds the CT sub-process when External Driver interfaces change.
  # Embeds at_green_system as its terminal sub-flow.
  # ===========================================================================
  at_cycle:
    start: AT_RED_TEST
    nodes:
      - id: AT_RED_TEST
        type: user_task
        agent: atdd-test
        phase_doc: docs/atdd/process/at-red-test.md
        description: "AT - RED - TEST"

      - id: GATE_DSL_AT
        type: gateway
        binding: dsl_interface_changed
        description: "DSL Interface Changed?"

      - id: AT_RED_DSL
        type: user_task
        agent: atdd-dsl
        phase_doc: docs/atdd/process/at-red-dsl.md
        description: "AT - RED - DSL"

      - id: GATE_EXT_AT
        type: gateway
        binding: external_system_driver_interface_changed
        description: "External System Driver Interface Changed?"

      - id: CT_SUBPROCESS
        type: call_activity
        flow: ct_subprocess

      - id: GATE_SYS_AT
        type: gateway
        binding: system_driver_interface_changed
        description: "System Driver Interface Changed?"

      - id: AT_RED_SYSTEM_DRIVER
        type: user_task
        agent: atdd-driver
        phase_doc: docs/atdd/process/at-red-system-driver.md
        description: "AT - RED - SYSTEM DRIVER"

      - id: AT_GREEN_SYSTEM
        type: call_activity
        flow: at_green_system

      - id: AT_END
        type: end_event

    sequence_flows:
      - {from: AT_RED_TEST,          to: GATE_DSL_AT}
      - {from: GATE_DSL_AT,          to: AT_GREEN_SYSTEM,        when: "dsl_interface_changed == false"}
      - {from: GATE_DSL_AT,          to: AT_RED_DSL,             when: "dsl_interface_changed == true"}
      - {from: AT_RED_DSL,           to: GATE_EXT_AT}
      - {from: GATE_EXT_AT,          to: CT_SUBPROCESS,          when: "external_system_driver_interface_changed == true"}
      - {from: GATE_EXT_AT,          to: GATE_SYS_AT,            when: "external_system_driver_interface_changed == false"}
      - {from: CT_SUBPROCESS,        to: GATE_SYS_AT}
      - {from: GATE_SYS_AT,          to: AT_RED_SYSTEM_DRIVER,   when: "system_driver_interface_changed == true"}
      - {from: GATE_SYS_AT,          to: AT_GREEN_SYSTEM,        when: "system_driver_interface_changed == false"}
      - {from: AT_RED_SYSTEM_DRIVER, to: AT_GREEN_SYSTEM}
      - {from: AT_GREEN_SYSTEM,      to: AT_END}

  # ===========================================================================
  # at_green_system
  # AT - GREEN - SYSTEM — backend + frontend WRITE, human review, release COMMIT.
  # Per cycles.md "Phase-to-Agent Mapping": atdd-backend handles API channel,
  # atdd-frontend handles UI channel, the orchestrator owns REVIEW STOP, and
  # atdd-release runs the COMMIT step.
  # ===========================================================================
  at_green_system:
    start: ATDD_BACKEND
    nodes:
      - id: ATDD_BACKEND
        type: user_task
        agent: atdd-backend
        phase_doc: docs/atdd/process/at-green-system.md
        description: "AT - GREEN - SYSTEM - WRITE (backend)"

      - id: ATDD_FRONTEND
        type: user_task
        agent: atdd-frontend
        phase_doc: docs/atdd/process/at-green-system.md
        description: "AT - GREEN - SYSTEM - WRITE (frontend)"

      - id: STOP_GREEN_REVIEW
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — approve implementation"

      - id: ATDD_RELEASE
        type: user_task
        agent: atdd-release
        phase_doc: docs/atdd/process/at-green-system.md
        description: "AT - GREEN - SYSTEM - COMMIT (atdd-release)"

      - id: GS_END
        type: end_event

    sequence_flows:
      - {from: ATDD_BACKEND,      to: ATDD_FRONTEND}
      - {from: ATDD_FRONTEND,     to: STOP_GREEN_REVIEW}
      - {from: STOP_GREEN_REVIEW, to: ATDD_RELEASE}
      - {from: ATDD_RELEASE,      to: GS_END}

  # ===========================================================================
  # ct_subprocess
  # Contract Test Sub-Process — entered when External Driver interfaces
  # change. Calls External System Onboarding first to ensure a Driver and
  # Test Instance exist.
  # ===========================================================================
  ct_subprocess:
    start: ONBOARDING
    nodes:
      - id: ONBOARDING
        type: call_activity
        flow: external_system_onboarding

      - id: CT_RED_TEST
        type: user_task
        agent: atdd-test
        phase_doc: docs/atdd/process/ct-red-test.md
        description: "CT - RED - TEST"

      - id: GATE_DSL_CT
        type: gateway
        binding: dsl_interface_changed
        description: "DSL Interface Changed?"

      - id: CT_RED_DSL
        type: user_task
        agent: atdd-dsl
        phase_doc: docs/atdd/process/ct-red-dsl.md
        description: "CT - RED - DSL"

      - id: GATE_EXT_CT
        type: gateway
        binding: external_system_driver_interface_changed
        description: "External System Driver Interface Changed?"

      - id: CT_RED_EXTERNAL_DRIVER
        type: user_task
        agent: atdd-driver
        phase_doc: docs/atdd/process/ct-red-external-driver.md
        description: "CT - RED - EXTERNAL DRIVER"

      - id: CT_GREEN_STUBS
        # Ownership TBD per process-audit gap on stubs ownership.
        # Placeholder agent name; resolve before the Go runtime ships.
        type: user_task
        agent: atdd-stubs
        phase_doc: docs/atdd/process/ct-green-stubs.md
        description: "CT - GREEN - STUBS"

      - id: CT_END
        type: end_event

    sequence_flows:
      - {from: ONBOARDING,             to: CT_RED_TEST}
      - {from: CT_RED_TEST,            to: GATE_DSL_CT}
      - {from: GATE_DSL_CT,            to: CT_GREEN_STUBS,         when: "dsl_interface_changed == false"}
      - {from: GATE_DSL_CT,            to: CT_RED_DSL,             when: "dsl_interface_changed == true"}
      - {from: CT_RED_DSL,             to: GATE_EXT_CT}
      - {from: GATE_EXT_CT,            to: CT_GREEN_STUBS,         when: "external_system_driver_interface_changed == false"}
      - {from: GATE_EXT_CT,            to: CT_RED_EXTERNAL_DRIVER, when: "external_system_driver_interface_changed == true"}
      - {from: CT_RED_EXTERNAL_DRIVER, to: CT_GREEN_STUBS}
      - {from: CT_GREEN_STUBS,         to: CT_END}

  # ===========================================================================
  # external_system_onboarding
  # One-time-per-external-system prerequisite to CT - RED - TEST. Resolves two
  # orthogonal questions (does a Driver exist? is a Test Instance accessible?)
  # before per-scenario contract testing starts. Returns immediately if the
  # Driver already exists.
  #
  # Implementation steps are currently agent-less (`agent: human`) — there is
  # no dedicated atdd-onboarding agent today; replace once one exists.
  # ===========================================================================
  external_system_onboarding:
    start: GATE_DRIVER_EXISTS
    nodes:
      - id: GATE_DRIVER_EXISTS
        type: gateway
        binding: external_system_driver_exists
        description: "External System Driver exists?"

      - id: GATE_INSTANCE_ACCESSIBLE
        type: gateway
        binding: external_system_test_instance_accessible
        description: "Test Instance accessible?"

      - id: PROVISION
        type: user_task
        agent: human
        role: implement
        description: "Provision dockerized stand-in"

      - id: DEFINE_IFACE
        type: user_task
        agent: human
        role: implement
        description: "Define minimal Driver interface"

      - id: IMPL_DRIVER
        type: user_task
        agent: human
        role: implement
        description: "Implement Driver impl for Smoke Test"

      - id: WRITE_SMOKE
        type: user_task
        agent: human
        role: implement
        description: "Write single Smoke Test"

      - id: RUN_SMOKE
        type: service_task
        action: run_smoke_test
        description: "Run Smoke Test"

      - id: GATE_SMOKE_PASS
        type: gateway
        binding: smoke_test_passes
        description: "Smoke Test passes?"

      - id: ASK_SUPPORT
        type: user_task
        agent: human
        role: review
        description: "Ask user for support and STOP"

      - id: STOP_ONBOARD_REVIEW
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — approve onboarding artifacts"

      - id: COMMIT_ONBOARD
        type: service_task
        action: commit_onboarding
        description: "COMMIT: External System Onboarding | <name>"

      - id: ONBOARD_END
        type: end_event

    sequence_flows:
      - {from: GATE_DRIVER_EXISTS,      to: ONBOARD_END,             when: "external_system_driver_exists == true"}
      - {from: GATE_DRIVER_EXISTS,      to: GATE_INSTANCE_ACCESSIBLE, when: "external_system_driver_exists == false"}
      - {from: GATE_INSTANCE_ACCESSIBLE, to: DEFINE_IFACE,            when: "external_system_test_instance_accessible == true"}
      - {from: GATE_INSTANCE_ACCESSIBLE, to: PROVISION,               when: "external_system_test_instance_accessible == false"}
      - {from: PROVISION,               to: DEFINE_IFACE}
      - {from: DEFINE_IFACE,            to: IMPL_DRIVER}
      - {from: IMPL_DRIVER,             to: WRITE_SMOKE}
      - {from: WRITE_SMOKE,             to: RUN_SMOKE}
      - {from: RUN_SMOKE,               to: GATE_SMOKE_PASS}
      - {from: GATE_SMOKE_PASS,         to: ASK_SUPPORT,             when: "smoke_test_passes == false"}
      - {from: GATE_SMOKE_PASS,         to: STOP_ONBOARD_REVIEW,     when: "smoke_test_passes == true"}
      - {from: STOP_ONBOARD_REVIEW,     to: COMMIT_ONBOARD}
      - {from: COMMIT_ONBOARD,          to: ONBOARD_END}

  # ===========================================================================
  # structural_cycle
  # Shared by system-api-task, system-ui-task, and chore via call_activity
  # `params:`. The Go runtime substitutes ${phase}, ${agent}, ${phase_doc} at
  # dispatch time. The TEST gate (full | compile | skip) is asked upfront —
  # nothing inside TEST runs until the user chooses.
  # ===========================================================================
  structural_cycle:
    start: STRUCT_WRITE
    nodes:
      - id: STRUCT_WRITE
        type: user_task
        agent: ${agent}
        phase_doc: ${phase_doc}
        description: "${phase} - WRITE"

      - id: STOP_STRUCT_REVIEW
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — approve implementation"

      - id: GATE_TEST_MODE
        type: gateway
        binding: structural_test_mode
        description: "TEST mode? (full | compile | skip)"

      - id: COMPILE
        type: service_task
        action: compile_in_scope
        description: "Compile in-scope projects"

      - id: SAMPLE
        type: service_task
        action: run_sample_suite
        description: "Run sample suite"

      - id: DRIFT
        type: service_task
        action: print_drift_warning
        description: "Print drift warning if applicable"

      - id: STOP_STRUCT_TEST
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — review TEST results"

      - id: ASK_COMMIT
        type: service_task
        action: ask_can_i_commit
        description: "Ask: Can I commit?"

      - id: COMMIT_STRUCT
        type: service_task
        action: commit_phase
        params:
          phase: ${phase}
        description: "COMMIT: <Ticket> | ${phase}"

      - id: TICK
        type: service_task
        action: tick_checklist
        description: "Tick checklist items"

      - id: STRUCT_END
        type: end_event

    sequence_flows:
      - {from: STRUCT_WRITE,       to: STOP_STRUCT_REVIEW}
      - {from: STOP_STRUCT_REVIEW, to: GATE_TEST_MODE}
      - {from: GATE_TEST_MODE,     to: ASK_COMMIT,        when: "structural_test_mode == skip"}
      - {from: GATE_TEST_MODE,     to: COMPILE,           when: "structural_test_mode in [compile, full]"}
      - {from: COMPILE,            to: SAMPLE,            when: "structural_test_mode == full"}
      - {from: COMPILE,            to: DRIFT,             when: "structural_test_mode == compile"}
      - {from: SAMPLE,             to: DRIFT}
      - {from: DRIFT,              to: STOP_STRUCT_TEST}
      - {from: STOP_STRUCT_TEST,   to: ASK_COMMIT}
      - {from: ASK_COMMIT,         to: COMMIT_STRUCT}
      - {from: COMMIT_STRUCT,      to: TICK}
      - {from: TICK,               to: STRUCT_END}

  # ===========================================================================
  # da_cycle
  # Driver Adapter cycle — entered when the change is a structural interface
  # change. Splits on `subtype`:
  #   - system-interface-redesign: a Driver Adapter we own (API, UI, mobile,
  #     CLI, ...). Routed through structural_cycle. The WRITE agent reads the
  #     ticket body + system to figure out which driver(s) to modify — the
  #     framework no longer pre-classifies the channel.
  #   - external-system-interface-redesign: an External System Driver
  #     Adapter, routed through ct_subprocess (which embeds External System
  #     Onboarding when the driver doesn't yet exist).
  # ===========================================================================
  da_cycle:
    start: GATE_SUBTYPE
    nodes:
      - id: GATE_SUBTYPE
        type: gateway
        binding: subtype
        description: "System or external-system interface?"

      - id: SYSTEM_INTERFACE_REDESIGN_CYCLE
        type: call_activity
        flow: structural_cycle
        params:
          phase: "SYSTEM INTERFACE REDESIGN"
          agent: atdd-task
          phase_doc: docs/atdd/process/system-interface-redesign.md
          subtype: system-interface-redesign

      - id: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE
        type: call_activity
        flow: ct_subprocess

      - id: DA_END
        type: end_event

    sequence_flows:
      - {from: GATE_SUBTYPE,                       to: SYSTEM_INTERFACE_REDESIGN_CYCLE,          when: "subtype == system-interface-redesign"}
      - {from: GATE_SUBTYPE,                       to: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE, when: "subtype == external-system-interface-redesign"}
      - {from: SYSTEM_INTERFACE_REDESIGN_CYCLE,    to: DA_END}
      - {from: EXTERNAL_SYSTEM_INTERFACE_REDESIGN_CYCLE, to: DA_END}

  # ===========================================================================
  # sut_cycle
  # System Under Test cycle — structural change with no test-stack artifact
  # changing (no AT, no DA). Routes through structural_cycle with the chore
  # phase / agent / phase_doc.
  # ===========================================================================
  sut_cycle:
    start: CHORE_CYCLE
    nodes:
      - id: CHORE_CYCLE
        type: call_activity
        flow: structural_cycle
        params:
          phase: CHORE
          agent: atdd-chore
          phase_doc: docs/atdd/process/chore.md

      - id: SUT_END
        type: end_event

    sequence_flows:
      - {from: CHORE_CYCLE, to: SUT_END}

  # ===========================================================================
  # legacy_acceptance_criteria
  # TBD per glossary.md ("The Legacy Acceptance Criteria Cycle's own internal phases are
  # TBD") and process-audit gap on Legacy Acceptance Criteria Cycle interim spec.
  # The placeholder is a single human-review STOP so the runtime can dispatch
  # something sensible until the spec lands; replace once cycles.md fills the
  # internal flow.
  # ===========================================================================
  legacy_acceptance_criteria:
    start: LEGACY_TBD
    nodes:
      - id: LEGACY_TBD
        type: user_task
        agent: human
        role: review
        description: "STOP - HUMAN REVIEW — Legacy Acceptance Criteria Cycle TBD"

      - id: LEGACY_END
        type: end_event

    sequence_flows:
      - {from: LEGACY_TBD, to: LEGACY_END}
