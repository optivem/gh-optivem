    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          task-name: refactor-tests
          scopes: "at-test,ct-test,dsl-port,dsl-core,driver-port,driver-adapter,external-system-driver-port,external-system-driver-adapter"

      - id: REFACTOR_TESTS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFACTOR_TESTS_END}

  # ===========================================================================
  # MID — refactor-system
  # ===========================================================================
  refactor-system:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          task-name: refactor-system
          scopes: "system-path"

      - id: REFACTOR_SYS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFACTOR_SYS_END}

  # ===========================================================================
  # MID — refine-acceptance-criteria
  # ===========================================================================
  refine-acceptance-criteria:
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          task-name: refine-acceptance-criteria

      - id: REFINE_AC_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFINE_AC_END}

  # ===========================================================================
  # MID — compile (command)
  # ===========================================================================
  compile:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem compile"

      - id: COMPILE_MID_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMPILE_MID_END}

  # ===========================================================================
  # MID — compile-system (command)
  # ===========================================================================
  compile-system:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem compile-system"

      - id: COMPILE_SYS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMPILE_SYS_END}

  # ===========================================================================
  # MID — compile-tests (command)
  # ===========================================================================
  compile-tests:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem compile-tests"

      - id: COMPILE_TESTS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMPILE_TESTS_END}

  # ===========================================================================
  # MID — build-system (command)
  # ===========================================================================
  build-system:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem build-system"

      - id: BUILD_SYS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: BUILD_SYS_END}

  # ===========================================================================
  # MID — start-system (command)
  # ===========================================================================
  start-system:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem start-system"

      - id: START_SYS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: START_SYS_END}

  # ===========================================================================
  # MID — commit (command)
  # ===========================================================================
  commit:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem commit"

      - id: COMMIT_MID_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMMIT_MID_END}

  # ===========================================================================
  # MID — run-tests (command)
  # ===========================================================================
  #
  # Q5.a structured filter params: `filter-type` enum (`test-type` or
  # `test-name`); `filter-value` (single tag for test-type; list-as-string
  # for test-name). Both absent ⇒ run all tests. The underlying
  # `execute-command` forwards both params to the `gh optivem run-tests`
  # CLI, which owns the filter parsing.
  # ===========================================================================
  run-tests:
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        params:
          command: "gh optivem run-tests"
          filter-type: ${filter-type}
          filter-value: ${filter-value}

      - id: RUN_TESTS_END
        type: end-event

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: RUN_TESTS_END}

  # ===========================================================================
  # LOW — approve (HUMAN gate primitive)
  # ===========================================================================
  #
  # Confirms approval; writes outcome to `approval-outcome` state for the
  # caller to read. Q3 = A (exit-only; caller owns NO branch). Currently
  # encoded with two end-events; alternatives Q3-B (parameterised NO-action)
  # and Q3-C (two primitives APPROVE-OR-EXIT / APPROVE-OR-RETRY) are open
  # questions on the exploration backlog.
  #
  # TODO(Phase D / exploration backlog): the runtime today has no
  # ERROR-end-event semantics — the YES/NO branches both end normally and
  # the caller is responsible for re-reading `approval-outcome`. If
  # Q-late-1's "END ERROR transitively kills the process" intent becomes a
  # binding contract, add an `end-event-kind: error` field to RawNode +
  # wire RunProcess to propagate it.
  # ===========================================================================
  approve:
    start: ASK_HUMAN
    nodes:
      - id: ASK_HUMAN
        type: user-task
        agent: human
        documentation: "${question}"

      - id: GATE_APPROVED
        type: gateway
        binding: approval-outcome
        documentation: "Approved?"

      - id: APPROVE_OK_END
        type: end-event

      - id: APPROVE_REJECT_END
        type: end-event

    sequence-flows:
      - {from: ASK_HUMAN,     to: GATE_APPROVED}
      - {from: GATE_APPROVED, to: APPROVE_OK_END,     when: "approval-outcome == approved"}
      - {from: GATE_APPROVED, to: APPROVE_REJECT_END, when: "approval-outcome == rejected"}

  # ===========================================================================
  # LOW — execute-agent (LLM agent dispatch primitive)
  # ===========================================================================
  #
  # Wraps an agent run with approval + validation + optional fix recovery
  # + post-approval. The agent name is the caller's `task-name` param,
  # forwarded into the templated `agent: ${task-name}` on RUN_AGENT.
  # Prompt path is derived from task-name per Q28.a (`task-name + ".md"`).
  #
  # Validation step asserts (1) all `outputs` named by the caller are
  # present in agent COMMIT output, (2) `scopes` constraints are
  # satisfied (working-tree diff is within allowed paths). When
  # validation fails AND `fix-on-failure == true`, dispatch `fix` with
  # the failure payload; on `fix-on-failure == false` (the recursive
  # call site from `fix` itself) skip remediation and let POST approval
  # see the broken state.
  # ===========================================================================
  execute-agent:
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        params:
          question: "Do you approve task ${task-name} to run?"

      - id: RUN_AGENT
        type: user-task
        agent: ${task-name}
        documentation: "Run agent ${task-name}"

      - id: VALIDATE_OUTPUTS_AND_SCOPES
        type: service-task
        action: validate-outputs-and-scopes
        documentation: "Validate outputs (${outputs}) & scopes (${scopes})"

      - id: GATE_OUTPUTS_AND_SCOPES_VALID
        type: gateway
        binding: outputs-and-scopes-valid
        documentation: "Outputs & scopes valid?"

      - id: GATE_FIX_ON_FAILURE
        type: gateway
        binding: fix-on-failure-enabled
        documentation: "Fix on failure?"

      - id: CALL_FIX
        type: call-activity
        process: fix

      - id: APPROVE_POST
        type: call-activity
        process: approve
        params:
          question: "Approve agent output for task ${task-name}?"

      - id: EXECUTE_AGENT_END
        type: end-event

    sequence-flows:
      - {from: APPROVE_PRE,                  to: RUN_AGENT}
      - {from: RUN_AGENT,                    to: VALIDATE_OUTPUTS_AND_SCOPES}
      - {from: VALIDATE_OUTPUTS_AND_SCOPES,  to: GATE_OUTPUTS_AND_SCOPES_VALID}
      - {from: GATE_OUTPUTS_AND_SCOPES_VALID, to: APPROVE_POST,        when: "outputs-and-scopes-valid == true"}
      - {from: GATE_OUTPUTS_AND_SCOPES_VALID, to: GATE_FIX_ON_FAILURE, when: "outputs-and-scopes-valid == false"}
      - {from: GATE_FIX_ON_FAILURE,           to: CALL_FIX,             when: "fix-on-failure-enabled == true"}
      - {from: GATE_FIX_ON_FAILURE,           to: APPROVE_POST,         when: "fix-on-failure-enabled == false"}
      - {from: CALL_FIX,                      to: APPROVE_POST}
      - {from: APPROVE_POST,                  to: EXECUTE_AGENT_END}

  # ===========================================================================
  # LOW — execute-command (shell command dispatch primitive)
  # ===========================================================================
  #
  # PRE approval only (Q2 = C asymmetric — commands have machine-checkable
  # success). On command failure, dispatch `fix` (the `command-failed`
  # kind) without passing `scopes`/`outputs` — commands don't have them.
  # ===========================================================================
  execute-command:
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        params:
          question: "Do you approve running command ${command} ?"

      - id: RUN_COMMAND
        type: service-task
        action: run-command
        documentation: "Run command ${command}"

      - id: GATE_COMMAND_SUCCEEDED
        type: gateway
        binding: command-succeeded
        documentation: "Command succeeded?"

      - id: CALL_FIX
        type: call-activity
        process: fix

      - id: EXECUTE_COMMAND_END
        type: end-event

    sequence-flows:
      - {from: APPROVE_PRE,            to: RUN_COMMAND}
      - {from: RUN_COMMAND,            to: GATE_COMMAND_SUCCEEDED}
      - {from: GATE_COMMAND_SUCCEEDED, to: EXECUTE_COMMAND_END, when: "command-succeeded == true"}
      - {from: GATE_COMMAND_SUCCEEDED, to: CALL_FIX,            when: "command-succeeded == false"}
      - {from: CALL_FIX,               to: EXECUTE_COMMAND_END}

  # ===========================================================================
  # LOW — fix (single-attempt remediation primitive)
  # ===========================================================================
  #
  # Q-late-5 (β-convention) routing: the fix-* task-name is derived as
  # `"fix-" + failure.kind` and passed into the inner `execute-agent`. No
  # routing table here — the runtime constructs the task-name dispatch-
  # time. The inner `execute-agent` receives `fix-on-failure: false` so
  # validation failure in the fix attempt does NOT recurse into another
  # fix (single attempt, terminates regardless of inner outcome).
  # ===========================================================================
  fix:
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        params:
          question: "Do you approve fix to attempt remediation for ${failure} ?"

      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        params:
          # task-name derived from failure.kind by the binding plumbing
          # (Q-late-5): the (β-convention) "fix-" + failure.kind formula
          # resolves at dispatch time. Phase D wires the param-derivation
          # gate so this becomes ${fix-task-name}; for now the literal
          # template documents the convention.
          task-name: "fix-${failure-kind}"
          fix-on-failure: "false"
          scopes: ${scopes}
          outputs: ${outputs}

      - id: FIX_END
        type: end-event

    sequence-flows:
      - {from: APPROVE_PRE,  to: EXECUTE_AGENT}
      - {from: EXECUTE_AGENT, to: FIX_END}
