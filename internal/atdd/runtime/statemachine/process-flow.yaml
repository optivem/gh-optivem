# ATDD Pipeline — Five-Level BPMN Orchestration
#
# Single source of truth for the process flow under the TOP / CYCLE / HIGH /
# MID / LOW structure introduced by the BPMN refactor (design archive:
# plans/20260525-1057-bpmn-refactor-design.md; execution plan:
# plans/20260525-1517-bpmn-refactor-yaml-and-diagrams.md). Replaces the
# previous AT-cycle / CT-subprocess / structural-cycle / legacy-acceptance-
# criteria shape wholesale per Q17 = A (full replacement).
#
# Level reading order:
#
#   TOP    — operator entry points. `refine-ticket` grooms backlog tickets,
#            `implement-ticket` runs a READY ticket end-to-end via the
#            ticket-kind gateway, `refactor` is ad-hoc refactor with no
#            ticket overhead. The runtime currently still bootstraps into a
#            thin `main` process that picks a ticket and delegates to
#            `implement-ticket`; the picker collapses into Go code during
#            Phase D (downstream-alignment plan).
#
#   CYCLE  — per-ticket sub-processes. One per ticket-kind row in the
#            gateway lookup table. `change-system-behavior`,
#            `cover-system-behavior`, `redesign-system-structure`,
#            `refactor-system-structure`, `refactor-test-structure`,
#            `refine-backlog`, `onboard-external-system`.
#
#   HIGH   — composite orchestrations. Author the cascading test/system
#            verify shape (e.g. `write-and-verify-acceptance-tests` →
#            `implement-and-verify-dsl` → driver-adapter fanout). Reused by
#            multiple CYCLEs and call-back-into other HIGH via the shared
#            `implement-test-layer` parameterised flow.
#
#   MID    — atomic agent or command tasks. Each wraps exactly one LOW
#            primitive call with task-specific params: `write-acceptance-
#            tests`, `implement-system`, `compile`, `commit`, `run-tests`,
#            etc. The MID layer is the only place an agent name or command
#            name appears literally (everything below is templated).
#
#   LOW    — primitives. Four total: `approve` (HUMAN gate), `execute-agent`
#            (run a templated LLM agent with validation + optional fix
#            recovery), `execute-command` (run a templated shell command),
#            `fix` (single-attempt remediation that re-enters
#            `execute-agent` with `fix-on-failure: false`).
#
# Encoding conventions:
#
#   - Process names match the canonical kebab-case task names from
#     plans/ideas/{1..5}-bpmn-refactor-*-level.md. Cross-file connectedness
#     (Q-new-3 vocabulary, Q-new-6 acceptance-test naming) is applied.
#
#   - `call-activity.process:` is the only invocation primitive. Templated
#     `process: ${agent-action}` resolves at dispatch time against the
#     caller's params (runtime support added by Item 2 of the execution
#     plan).
#
#   - `call-activity.params:` carries call-site values down into the
#     called sub-process. ExpandParams substitutes ${name} occurrences in
#     param values against the parent's params before pushing the new
#     scope (so `params: {expected-test-result: ${expected-test-result}}`
#     forwards the parent's value).
#
#   - Gateway bindings (Q-new-1: parameterised expectation) read state set
#     either by an upstream gateway's binding function or by a custom Go
#     gate that promotes a relevant param into state. The Bind-time wiring
#     for these new bindings is downstream-alignment scope (Phase D).
#
#   - LOW primitives are encoded as their own processes; MID tasks call
#     them via `call-activity`. The double indirection looks heavier than
#     the brainstorm's prose but is what makes the diagram show "agent X
#     runs through LOW execute-agent" instead of inlining the validation /
#     approval loop into every MID.
#
# Runtime contract gaps known and accepted in this Item (encoded as TODO
# comments inline):
#
#   - `approve` NO-branch: Q3 = A (exit-only; caller owns NO) — currently
#     encoded as two end-events plus a state binding `approval-outcome`
#     the caller can re-read. Alternatives Q3-B (parameterised NO-action)
#     and Q3-C (split into two primitives APPROVE-OR-EXIT / APPROVE-OR-
#     RETRY) deferred to a future plan.
#
#   - `execute-agent` validation gateway (`outputs-and-scopes-valid`),
#     scope-diff plumbing, and `fix-on-failure` flag dispatch: the
#     YAML edges describe the shape; the gate/action bindings land with
#     the writing-agent runtime rewire (Phase D).
#
#   - `run-tests` structured filter params (`filter-type` enum +
#     `filter-value`, Q5.a resolved): encoded as call-site params on the
#     `run-tests` MID; the underlying `execute-command` reads them at
#     dispatch time via the command's own arg substitution. Param values
#     are strings (the YAML schema does not support typed unions); a
#     dedicated parser lives in the Go command layer (Phase D).
#
#   - `fix-*` agent inventory (Q-late-5 (β-convention) routing): each `fix`
#     call dispatches `execute-agent` with `task-name = "fix-" +
#     failure.kind`. The kind values are not enumerated here — the prompt
#     files implementing them are authored / renamed in the Phase D
#     downstream-alignment plan.
#
# Document shape (unchanged from prior YAML; see internal/atdd/runtime/
# statemachine/load.go for the parser):
#
#   processes:
#     <process-name>:
#       start: <node-id>
#       outputs: [<name>, ...]        # optional BPMN-style data outputs
#       nodes:
#         - id: <node-id>
#           type: <node-type>         # one of: start-event, end-event,
#                                     # service-task, user-task, gateway,
#                                     # call-activity
#           # body fields per type:
#           # service-task  → action:
#           # user-task     → agent:       (`human` for STOPs)
#           # gateway       → binding:
#           # call-activity → process: [+ params: <map>]
#       sequence-flows:
#         - {from: <id>, to: <id>}                      # unconditional
#         - {from: <id>, to: <id>, when: "<predicate>"} # gateway-guarded

processes:

  # ===========================================================================
  # Runtime bootstrap
  # ===========================================================================
  #
  # `main` is the runtime entry point invoked by `gh optivem implement`. It
  # picks a ticket (board mode) or treats the operator-supplied ticket as
  # pre-picked (specific-issue mode), then delegates to the TOP
  # `implement-ticket` process. No domain logic lives here — `main` is the
  # bridge between the CLI invocation surface and the five-level BPMN
  # structure. Phase D removes `main` from YAML by moving the picker into
  # the Go driver.
  # ===========================================================================
  main:
    start: START
    nodes:
      - id: START
        type: start-event

      - id: PICK_TOP_READY
        type: service-task
        action: pick-top-ready
        documentation: "Pick top READY ticket"

      - id: IMPLEMENT_TICKET
        type: call-activity
        process: implement-ticket

      - id: END
        type: end-event

    sequence-flows:
      - {from: START,            to: PICK_TOP_READY,   when: "mode == board"}
      - {from: START,            to: IMPLEMENT_TICKET, when: "mode == specific-issue"}
      - {from: PICK_TOP_READY,   to: IMPLEMENT_TICKET}
      - {from: IMPLEMENT_TICKET, to: END}

  # ===========================================================================
  # TOP — refine-ticket
  # ===========================================================================
  #
  # Backlog grooming entry. Marks the ticket IN REFINEMENT, runs the
  # refine-backlog cycle to produce Gherkin acceptance criteria + classify
  # the ticket-kind, then marks READY. The READY state is the precondition
  # for `implement-ticket`.
  # ===========================================================================
  refine-ticket:
    start: MARK_IN_REFINEMENT
    nodes:
      - id: MARK_IN_REFINEMENT
        type: service-task
        action: move-to-in-refinement

      - id: REFINE_BACKLOG
        type: call-activity
        process: refine-backlog

      - id: MARK_READY
        type: service-task
        action: move-to-ready

      - id: REFINE_TICKET_END
        type: end-event

    sequence-flows:
      - {from: MARK_IN_REFINEMENT, to: REFINE_BACKLOG}
      - {from: REFINE_BACKLOG,     to: MARK_READY}
      - {from: MARK_READY,         to: REFINE_TICKET_END}

  # ===========================================================================
  # TOP — implement-ticket
  # ===========================================================================
  #
  # Per-ticket execution. Marks IN PROGRESS, picks a CYCLE via the
  # mechanical 1:1 ticket-kind gateway (Q30 = A; subtype validation hard-
  # exits on unknown kinds), runs the chosen CYCLE, then marks IN
  # ACCEPTANCE. Single-cycle tickets only (Q30.b = A) — multi-cycle work
  # splits during refinement.
  #
  # Absorbs the pre-refactor github-intake process (cross-check inventory
  # diagram #3). The OLD intake's classification + body-parsing pipeline
  # (`read-ticket-type` / `read-subtype` / `parse-ticket-body` service
  # tasks plus three STOP nodes) collapses into the `ticket-kind` gateway
  # binding: the binding's Go implementation does the read/parse/classify
  # work and returns the discriminator value the gateway switches on.
  # Operator-facing parse errors / unrecognised types surface through
  # the runtime's no-edge-matched error path rather than dedicated STOP
  # nodes. The gateway's binding function lands in Phase D (downstream-
  # alignment plan) alongside the other new bindings.
  #
  # Ticket-kind gateway lookup table (locked in Q30):
  #
  #   ticket-kind                          | CYCLE
  #   ---                                  | ---
  #   story                                | change-system-behavior
  #   bug                                  | change-system-behavior
  #   task/cover-legacy                    | cover-system-behavior
  #   task/redesign-system                 | redesign-system-structure
  #   task/refactor-system                 | refactor-system-structure
  #   task/refactor-tests                  | refactor-test-structure
  #   task/onboard-external-system         | onboard-external-system
  #
  # Unknown ticket-kind (and `spike` per the exploration backlog) does not
  # appear as a branch — the gateway is exhaustive over the known set and
  # the runtime's no-edge-matched error fires when an unrecognised value
  # arrives. The operator re-classifies via `refine-ticket` and re-runs.
  # ===========================================================================
  implement-ticket:
    start: MARK_IN_PROGRESS
    nodes:
      - id: MARK_IN_PROGRESS
        type: service-task
        action: move-to-in-progress

      - id: GATE_TICKET_KIND
        type: gateway
        binding: ticket-kind
        documentation: "Ticket kind (type + optional task subtype)?"

      - id: CALL_CHANGE_SYSTEM_BEHAVIOR
        type: call-activity
        process: change-system-behavior

      - id: CALL_COVER_SYSTEM_BEHAVIOR
        type: call-activity
        process: cover-system-behavior

      - id: CALL_REDESIGN_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-system-structure

      - id: CALL_REFACTOR_SYSTEM_STRUCTURE
        type: call-activity
        process: refactor-system-structure

      - id: CALL_REFACTOR_TEST_STRUCTURE
        type: call-activity
        process: refactor-test-structure

      - id: CALL_ONBOARD_EXTERNAL_SYSTEM
        type: call-activity
        process: onboard-external-system

      - id: MARK_IN_ACCEPTANCE
        type: service-task
        action: move-to-in-acceptance

      - id: IMPLEMENT_TICKET_END
        type: end-event

    sequence-flows:
      - {from: MARK_IN_PROGRESS,                 to: GATE_TICKET_KIND}
      - {from: GATE_TICKET_KIND, to: CALL_CHANGE_SYSTEM_BEHAVIOR,       when: "ticket-kind == story"}
      - {from: GATE_TICKET_KIND, to: CALL_CHANGE_SYSTEM_BEHAVIOR,       when: "ticket-kind == bug"}
      - {from: GATE_TICKET_KIND, to: CALL_COVER_SYSTEM_BEHAVIOR,        when: "ticket-kind == task/cover-legacy"}
      - {from: GATE_TICKET_KIND, to: CALL_REDESIGN_SYSTEM_STRUCTURE,    when: "ticket-kind == task/redesign-system"}
      - {from: GATE_TICKET_KIND, to: CALL_REFACTOR_SYSTEM_STRUCTURE,    when: "ticket-kind == task/refactor-system"}
      - {from: GATE_TICKET_KIND, to: CALL_REFACTOR_TEST_STRUCTURE,      when: "ticket-kind == task/refactor-tests"}
      - {from: GATE_TICKET_KIND, to: CALL_ONBOARD_EXTERNAL_SYSTEM,      when: "ticket-kind == task/onboard-external-system"}
      - {from: CALL_CHANGE_SYSTEM_BEHAVIOR,      to: MARK_IN_ACCEPTANCE}
      - {from: CALL_COVER_SYSTEM_BEHAVIOR,       to: MARK_IN_ACCEPTANCE}
      - {from: CALL_REDESIGN_SYSTEM_STRUCTURE,   to: MARK_IN_ACCEPTANCE}
      - {from: CALL_REFACTOR_SYSTEM_STRUCTURE,   to: MARK_IN_ACCEPTANCE}
      - {from: CALL_REFACTOR_TEST_STRUCTURE,     to: MARK_IN_ACCEPTANCE}
      - {from: CALL_ONBOARD_EXTERNAL_SYSTEM,     to: MARK_IN_ACCEPTANCE}
      - {from: MARK_IN_ACCEPTANCE,               to: IMPLEMENT_TICKET_END}

  # ===========================================================================
  # TOP — refactor (Q34 — ad-hoc refactor entry; no ticket overhead)
  # ===========================================================================
  #
  # Loopable refactor-type chooser. The operator picks a refactor CYCLE
  # (opportunistic mode, no checklist) or exits. No Mark-Ticket bookends —
  # there is no ticket. Coexists with two other refactor surfaces:
  # (1) ticket-driven via `task/refactor-system` → `implement-ticket`
  # gateway → CYCLE; (2) opportunistic-inside-change via the loopable
  # step 3 in `change-system-behavior`. Three surfaces, three ceremony
  # levels.
  # ===========================================================================
  refactor:
    start: GATE_REFACTOR_TYPE_CHOICE
    nodes:
      - id: GATE_REFACTOR_TYPE_CHOICE
        type: gateway
        binding: refactor-type-choice
        documentation: "Choose refactor type (loopable; none = exit)"

      - id: CALL_REFACTOR_SYSTEM_STRUCTURE
        type: call-activity
        process: refactor-system-structure

      - id: CALL_REFACTOR_TEST_STRUCTURE
        type: call-activity
        process: refactor-test-structure

      - id: CALL_REDESIGN_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-system-structure

      - id: REFACTOR_TOP_END
        type: end-event

    sequence-flows:
      - {from: GATE_REFACTOR_TYPE_CHOICE, to: CALL_REFACTOR_SYSTEM_STRUCTURE, when: "refactor-type-choice == refactor-system-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE, to: CALL_REFACTOR_TEST_STRUCTURE,   when: "refactor-type-choice == refactor-test-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE, to: CALL_REDESIGN_SYSTEM_STRUCTURE, when: "refactor-type-choice == redesign-system-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE, to: REFACTOR_TOP_END,               when: "refactor-type-choice == none"}
      - {from: CALL_REFACTOR_SYSTEM_STRUCTURE, to: GATE_REFACTOR_TYPE_CHOICE}
      - {from: CALL_REFACTOR_TEST_STRUCTURE,   to: GATE_REFACTOR_TYPE_CHOICE}
      - {from: CALL_REDESIGN_SYSTEM_STRUCTURE, to: GATE_REFACTOR_TYPE_CHOICE}

  # ===========================================================================
  # CYCLE — refine-backlog (Q9 = A, sibling cycle)
  # ===========================================================================
  refine-backlog:
    start: REFINE_ACCEPTANCE_CRITERIA
    nodes:
      - id: REFINE_ACCEPTANCE_CRITERIA
        type: call-activity
        process: refine-acceptance-criteria

      - id: REFINE_BACKLOG_END
        type: end-event

    sequence-flows:
      - {from: REFINE_ACCEPTANCE_CRITERIA, to: REFINE_BACKLOG_END}

  # ===========================================================================
  # CYCLE — onboard-external-system (Q-ext = b, standalone cycle)
  # ===========================================================================
  #
  # Per-system onboarding for an external system. The four steps are
  # currently agent-less placeholders (`agent: human`) matching the
  # brainstorm's tentative shape — Phase D may promote one or more steps
  # to a dedicated onboarding agent.
  # ===========================================================================
  onboard-external-system:
    start: IDENTIFY_EXTERNAL_SYSTEM
    nodes:
      - id: IDENTIFY_EXTERNAL_SYSTEM
        type: user-task
        agent: human
        documentation: "Identify external system"

      - id: DOCUMENT_EXTERNAL_SYSTEM_CONTRACT
        type: user-task
        agent: human
        documentation: "Document external system contract"

      - id: SETUP_EXTERNAL_SYSTEM_ACCESS
        type: user-task
        agent: human
        documentation: "Set up external system access (credentials, endpoints, sandbox)"

      - id: VERIFY_EXTERNAL_SYSTEM_REACHABLE
        type: user-task
        agent: human
        documentation: "Verify external system reachable"

      - id: ONBOARD_END
        type: end-event

    sequence-flows:
      - {from: IDENTIFY_EXTERNAL_SYSTEM,          to: DOCUMENT_EXTERNAL_SYSTEM_CONTRACT}
      - {from: DOCUMENT_EXTERNAL_SYSTEM_CONTRACT, to: SETUP_EXTERNAL_SYSTEM_ACCESS}
      - {from: SETUP_EXTERNAL_SYSTEM_ACCESS,      to: VERIFY_EXTERNAL_SYSTEM_REACHABLE}
      - {from: VERIFY_EXTERNAL_SYSTEM_REACHABLE,  to: ONBOARD_END}

  # ===========================================================================
  # CYCLE — change-system-behavior
  # ===========================================================================
  #
  # Classic red-green-REFACTOR triad (Q33). Step 3 is a loopable
  # opportunistic-refactor menu that calls existing CYCLEs in opportunistic
  # mode (no checklist supplied — the CYCLE degrades to "look at the just-
  # landed patch / operator's mind"). One CYCLE definition serves both
  # ticket-driven (via `implement-ticket` gateway) and opportunistic (here)
  # callers.
  # ===========================================================================
  change-system-behavior:
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL
        type: call-activity
        process: write-and-verify-acceptance-tests-fail
        documentation: "RED — write failing acceptance tests"

      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          agent-action: implement-system
        documentation: "GREEN — agent-action: implement-system"

      - id: GATE_OPPORTUNISTIC_REFACTOR
        type: gateway
        binding: refactor-type-choice
        documentation: "Opportunistic refactor? (loopable; none = end cycle)"

      - id: OPP_REFACTOR_SYSTEM_STRUCTURE
        type: call-activity
        process: refactor-system-structure

      - id: OPP_REFACTOR_TEST_STRUCTURE
        type: call-activity
        process: refactor-test-structure

      - id: OPP_REDESIGN_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-system-structure

      - id: CHANGE_SYSTEM_BEHAVIOR_END
        type: end-event

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL, to: IMPLEMENT_AND_VERIFY_SYSTEM}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,            to: GATE_OPPORTUNISTIC_REFACTOR}
      - {from: GATE_OPPORTUNISTIC_REFACTOR, to: OPP_REFACTOR_SYSTEM_STRUCTURE, when: "refactor-type-choice == refactor-system-structure"}
      - {from: GATE_OPPORTUNISTIC_REFACTOR, to: OPP_REFACTOR_TEST_STRUCTURE,   when: "refactor-type-choice == refactor-test-structure"}
      - {from: GATE_OPPORTUNISTIC_REFACTOR, to: OPP_REDESIGN_SYSTEM_STRUCTURE, when: "refactor-type-choice == redesign-system-structure"}
      - {from: GATE_OPPORTUNISTIC_REFACTOR, to: CHANGE_SYSTEM_BEHAVIOR_END,    when: "refactor-type-choice == none"}
      - {from: OPP_REFACTOR_SYSTEM_STRUCTURE, to: GATE_OPPORTUNISTIC_REFACTOR}
      - {from: OPP_REFACTOR_TEST_STRUCTURE,   to: GATE_OPPORTUNISTIC_REFACTOR}
      - {from: OPP_REDESIGN_SYSTEM_STRUCTURE,  to: GATE_OPPORTUNISTIC_REFACTOR}

  # ===========================================================================
  # CYCLE — cover-system-behavior (Q16 = B, legacy-coverage as parameterised expectation)
  # ===========================================================================
  #
  # Legacy-coverage cycle. Operator specifies acceptance criteria only;
  # CT is a nested sub-process when the AT layer needs a stub/driver to
  # pass (Q31.a = Option A nested). Gateway is one row at TOP
  # (`task/cover-legacy` → `cover-system-behavior`) — not split into
  # cover-legacy-acceptance / cover-legacy-contract, because the operator
  # does not think in CT subtypes (CT is an implementation detail of
  # making AT pass).
  # ===========================================================================
  cover-system-behavior:
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS
        type: call-activity
        process: write-and-verify-acceptance-tests-pass
        documentation: "Cover — write passing acceptance tests"

      - id: COVER_END
        type: end-event

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS, to: COVER_END}

  # ===========================================================================
  # CYCLE — redesign-system-structure (Q-new-2)
  # ===========================================================================
  #
  # Step 1 splits into two MID-direct calls (`implement-system-driver-
  # adapters` + `implement-external-system-driver-adapters`); no umbrella
  # MID. Step 2 reuses HIGH `implement-and-verify-system`.
  # ===========================================================================
  redesign-system-structure:
    start: IMPLEMENT_SYSTEM_DRIVER_ADAPTERS
    nodes:
      - id: IMPLEMENT_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-system-driver-adapters

      - id: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-external-system-driver-adapters

      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          agent-action: implement-system
        documentation: "agent-action: implement-system"

      - id: REDESIGN_END
        type: end-event

    sequence-flows:
      - {from: IMPLEMENT_SYSTEM_DRIVER_ADAPTERS,          to: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS, to: IMPLEMENT_AND_VERIFY_SYSTEM}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,               to: REDESIGN_END}

  # ===========================================================================
  # CYCLE — refactor-system-structure (Phase C.1 prototype — first cycle encoded)
  # ===========================================================================
  #
  # Step 1 calls HIGH `implement-and-verify-system` with
  # `agent-action: refactor-system`. Was the prototype encoded in Item 1 of
  # this plan; preserved unchanged.
  # ===========================================================================
  refactor-system-structure:
    start: IMPLEMENT_AND_VERIFY_SYSTEM
    nodes:
      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          agent-action: refactor-system
        documentation: "agent-action: refactor-system"

      - id: REFACTOR_SYSTEM_STRUCTURE_END
        type: end-event

    sequence-flows:
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM, to: REFACTOR_SYSTEM_STRUCTURE_END}

  # ===========================================================================
  # CYCLE — refactor-test-structure (Q8 — distinct HIGH for test refactor)
  # ===========================================================================
  refactor-test-structure:
    start: REFACTOR_AND_VERIFY_TESTS
    nodes:
      - id: REFACTOR_AND_VERIFY_TESTS
        type: call-activity
        process: refactor-and-verify-tests

      - id: REFACTOR_TEST_STRUCTURE_END
        type: end-event

    sequence-flows:
      - {from: REFACTOR_AND_VERIFY_TESTS, to: REFACTOR_TEST_STRUCTURE_END}

  # ===========================================================================
  # HIGH — write-and-verify-acceptance-tests-fail (Q-new-6 outer wrapper)
  # ===========================================================================
  #
  # Cycle-facing thin wrapper that pins `expected-test-result: failure`
  # before calling the parameterised middle. Called by
  # `change-system-behavior` step 1.
  # ===========================================================================
  write-and-verify-acceptance-tests-fail:
    start: CALL_PARAMETERISED_CORE
    nodes:
      - id: CALL_PARAMETERISED_CORE
        type: call-activity
        process: write-and-verify-acceptance-tests
        params:
          expected-test-result: failure

      - id: WAV_AT_FAIL_END
        type: end-event

    sequence-flows:
      - {from: CALL_PARAMETERISED_CORE, to: WAV_AT_FAIL_END}

  # ===========================================================================
  # HIGH — write-and-verify-acceptance-tests-pass (Q-new-6 outer wrapper)
  # ===========================================================================
  #
  # Cycle-facing thin wrapper that pins `expected-test-result: success`
  # before calling the parameterised middle. Called by
  # `cover-system-behavior` step 1.
  # ===========================================================================
  write-and-verify-acceptance-tests-pass:
    start: CALL_PARAMETERISED_CORE
    nodes:
      - id: CALL_PARAMETERISED_CORE
        type: call-activity
        process: write-and-verify-acceptance-tests
        params:
          expected-test-result: success

      - id: WAV_AT_PASS_END
        type: end-event

    sequence-flows:
      - {from: CALL_PARAMETERISED_CORE, to: WAV_AT_PASS_END}

  # ===========================================================================
  # HIGH — write-and-verify-acceptance-tests (Q-new-6 middle, canonical full flow)
  # ===========================================================================
  #
  # Writes the test code (inner primitive) then cascades into DSL +
  # driver-adapter impl whenever ports changed. Reads `dsl-port-changed`
  # from the inner call, then `system-driver-ports-changed` /
  # `external-driver-ports-changed` from the DSL impl (Q6 port-change
  # wiring table). Note that the GATE bindings are bound to Go gate
  # functions that promote the relevant ctx.Params value into ctx.State
  # for the predicate evaluator to read.
  # ===========================================================================
  write-and-verify-acceptance-tests:
    start: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE
        type: call-activity
        process: write-and-verify-acceptance-test-code
        params:
          acceptance-criteria: ${acceptance-criteria}
          expected-test-result: ${expected-test-result}

      - id: GATE_DSL_PORT_CHANGED
        type: gateway
        binding: dsl-port-changed
        documentation: "DSL port changed?"

      - id: IMPLEMENT_AND_VERIFY_DSL
        type: call-activity
        process: implement-and-verify-dsl
        params:
          expected-test-result: ${expected-test-result}
          tests: acceptance

      - id: GATE_EXTERNAL_DRIVER_PORTS_CHANGED
        type: gateway
        binding: external-driver-ports-changed
        documentation: "External system driver ports changed?"

      - id: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS
        type: call-activity
        process: implement-and-verify-external-system-driver-adapters
        params:
          expected-test-result: ${expected-test-result}
          tests: acceptance

      - id: GATE_SYSTEM_DRIVER_PORTS_CHANGED
        type: gateway
        binding: system-driver-ports-changed
        documentation: "System driver ports changed?"

      - id: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-and-verify-system-driver-adapters
        params:
          expected-test-result: ${expected-test-result}
          tests: acceptance

      - id: WAV_AT_END
        type: end-event

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE, to: GATE_DSL_PORT_CHANGED}
      - {from: GATE_DSL_PORT_CHANGED, to: IMPLEMENT_AND_VERIFY_DSL, when: "dsl-port-changed == true"}
      - {from: GATE_DSL_PORT_CHANGED, to: WAV_AT_END,               when: "dsl-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_DSL, to: GATE_EXTERNAL_DRIVER_PORTS_CHANGED}
      - {from: GATE_EXTERNAL_DRIVER_PORTS_CHANGED, to: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS, when: "external-driver-ports-changed == true"}
      - {from: GATE_EXTERNAL_DRIVER_PORTS_CHANGED, to: GATE_SYSTEM_DRIVER_PORTS_CHANGED,              when: "external-driver-ports-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS, to: GATE_SYSTEM_DRIVER_PORTS_CHANGED}
      - {from: GATE_SYSTEM_DRIVER_PORTS_CHANGED, to: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS, when: "system-driver-ports-changed == true"}
      - {from: GATE_SYSTEM_DRIVER_PORTS_CHANGED, to: WAV_AT_END,                                  when: "system-driver-ports-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS, to: WAV_AT_END}

  # ===========================================================================
  # HIGH — write-and-verify-acceptance-test-code (Q-new-6 inner primitive)
  # ===========================================================================
  #
  # Pure test-code authoring: write tests, compile, verify, commit. No
  # production-side impl. Branches on `expected-test-result` parameter
  # (success → verify-tests-pass; failure → verify-tests-fail +
  # disable-tests).
  # ===========================================================================
  write-and-verify-acceptance-test-code:
    start: WRITE_ACCEPTANCE_TESTS
    nodes:
      - id: WRITE_ACCEPTANCE_TESTS
        type: call-activity
        process: write-acceptance-tests
        params:
          acceptance-criteria: ${acceptance-criteria}
          expected-test-result: ${expected-test-result}

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests

      - id: GATE_EXPECTED_TEST_RESULT
        type: gateway
        binding: expected-test-result
        documentation: "Expected test result?"

      - id: VERIFY_TESTS_PASS_ACCEPTANCE
        type: call-activity
        process: verify-tests-pass
        params:
          filter-type: test-type
          filter-value: acceptance

      - id: VERIFY_TESTS_FAIL_ACCEPTANCE
        type: call-activity
        process: verify-tests-fail
        params:
          filter-type: test-type
          filter-value: acceptance

      - id: DISABLE_ACCEPTANCE_TESTS
        type: call-activity
        process: disable-tests
        params:
          tests: acceptance

      - id: COMMIT_TEST_CODE
        type: call-activity
        process: commit

      - id: WAV_AT_CODE_END
        type: end-event

    sequence-flows:
      - {from: WRITE_ACCEPTANCE_TESTS, to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,          to: GATE_EXPECTED_TEST_RESULT}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_PASS_ACCEPTANCE, when: "expected-test-result == success"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_FAIL_ACCEPTANCE, when: "expected-test-result == failure"}
      - {from: VERIFY_TESTS_PASS_ACCEPTANCE, to: COMMIT_TEST_CODE}
      - {from: VERIFY_TESTS_FAIL_ACCEPTANCE, to: DISABLE_ACCEPTANCE_TESTS}
      - {from: DISABLE_ACCEPTANCE_TESTS,     to: COMMIT_TEST_CODE}
      - {from: COMMIT_TEST_CODE,             to: WAV_AT_CODE_END}

  # ===========================================================================
  # HIGH — implement-and-verify-dsl
  # ===========================================================================
  implement-and-verify-dsl:
    start: IMPLEMENT_TEST_LAYER
    nodes:
      - id: IMPLEMENT_TEST_LAYER
        type: call-activity
        process: implement-test-layer
        params:
          agent-action: implement-dsl
          expected-test-result: ${expected-test-result}
          tests: ${tests}

      - id: IMPL_DSL_END
        type: end-event

    sequence-flows:
      - {from: IMPLEMENT_TEST_LAYER, to: IMPL_DSL_END}

  # ===========================================================================
  # HIGH — implement-and-verify-system-driver-adapters
  # ===========================================================================
  implement-and-verify-system-driver-adapters:
    start: IMPLEMENT_TEST_LAYER
    nodes:
      - id: IMPLEMENT_TEST_LAYER
        type: call-activity
        process: implement-test-layer
        params:
          agent-action: implement-system-driver-adapters
          expected-test-result: ${expected-test-result}
          tests: ${tests}

      - id: IMPL_SYS_DRIVER_END
        type: end-event

    sequence-flows:
      - {from: IMPLEMENT_TEST_LAYER, to: IMPL_SYS_DRIVER_END}

  # ===========================================================================
  # HIGH — implement-and-verify-external-system-driver-adapters
  # ===========================================================================
  implement-and-verify-external-system-driver-adapters:
    start: IMPLEMENT_TEST_LAYER
    nodes:
      - id: IMPLEMENT_TEST_LAYER
        type: call-activity
        process: implement-test-layer
        params:
          agent-action: implement-external-system-driver-adapters
          expected-test-result: ${expected-test-result}
          tests: ${tests}

      - id: IMPL_EXT_DRIVER_END
