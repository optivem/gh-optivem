          agent: system-implementer
        read:  [system-path]
        write: [system-path]

      - id: IMPL_SYS_END
        type: end-event
        name: "System Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_SYS_END}

  # Reshape variant of implement-system (plan 20260526-1448 Item 10 verb
  # split). Dispatched by redesign-system-structure CYCLE via the
  # parameterised implement-and-verify-system HIGH with
  # `action: update-system`. Reads driver-port (must see what must not
  # change) and driver-adapter (the absorbing layer) on top of system-path;
  # writes only system-path + driver-adapter (driver-port writes require a
  # scope_exception).
  update-system:
    name: "Update System"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: update-system
          agent: system-updater
        read:  [system-path, driver-adapter, driver-port]
        write: [system-path, driver-adapter]

      - id: UPDATE_SYS_END
        type: end-event
        name: "System Updated"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: UPDATE_SYS_END}

  # Asymmetric: the agent reads driver-port to see what to implement but
  # cannot write to it from this task — driver-port edits require a
  # scope_exception. The inline "Driver-port guardrail" prose in the prompt
  # body collapses into scope (plan 20260526-1448 Item 3 + Item 11 Case B).
  implement-system-driver-adapters:
    name: "Implement System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
