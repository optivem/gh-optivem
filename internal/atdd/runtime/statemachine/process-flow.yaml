          task-name: implement-system-driver-adapters
          agent: system-driver-adapter-implementer
        read:  [driver-port, driver-adapter]
        write: [driver-adapter]

      - id: IMPL_SYS_DA_END
        type: end-event
        name: "System Driver Adapters Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_SYS_DA_END}

  # Reshape variant of implement-system-driver-adapters (plan 20260526-1448
  # Item 10 verb split). Dispatched by redesign-system-structure CYCLE.
  # Same asymmetric scope as the implement variant — driver-port is
  # read-only here; reshape writes land in driver-adapter.
  update-system-driver-adapters:
    name: "Update System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: update-system-driver-adapters
          agent: system-driver-adapter-updater
        read:  [driver-port, driver-adapter]
        write: [driver-adapter]

      - id: UPDATE_SYS_DA_END
        type: end-event
