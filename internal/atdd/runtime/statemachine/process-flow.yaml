    sequence-flows:
      - {from: EXECUTE_AGENT, to: UPDATE_SYS_DA_END}

  # Same asymmetry as implement-system-driver-adapters (external side).
  implement-external-system-driver-adapters:
    name: "Implement External-System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
