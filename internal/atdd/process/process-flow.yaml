# ATDD Pipeline — Five-Level BPMN Orchestration
#
# Single source of truth for the process flow under the TOP / CYCLE / HIGH /
# MID / LOW structure introduced by the BPMN refactor. Replaces the
# previous AT-cycle / CT-subprocess / structural-cycle / legacy-acceptance-
# criteria shape wholesale per Q17 = A (full replacement).
#
# Level reading order:
#
#   TOP    — operator entry points. `refine-ticket` grooms backlog tickets,
#            `implement-ticket` runs a READY ticket end-to-end via the
#            ticket-kind gateway, `refactor` is ad-hoc refactor with no
#            ticket overhead. The runtime currently still bootstraps into a
#            thin `main` process that picks a ticket and delegates to
#            `implement-ticket`; the picker collapses into Go code during
#            Phase D (downstream-alignment plan).
#
#   CYCLE  — per-ticket sub-processes. One per ticket-kind row in the
#            gateway lookup table. `change-system-behavior`,
#            `cover-system-behavior`, `redesign-system-structure`,
#            `refactor-system-structure`, `refactor-test-structure`,
#            `refine-backlog-item`.
#
#   HIGH   — composite orchestrations. Author the cascading test/system
#            verify shape (e.g. `write-and-verify-acceptance-tests` →
#            `implement-and-verify-dsl` → driver-adapter fanout). Reused by
#            multiple CYCLEs and call-back-into other HIGH via the shared
#            `implement-test-layer` parameterised flow.
#
#   MID    — atomic agent or command tasks. Each wraps exactly one LOW
#            primitive call with task-specific params: `write-acceptance-
#            tests`, `implement-system`, `compile-tests`, `commit`,
#            `run-tests`, etc. The MID layer is the only place an agent name or command
#            name appears literally (everything below is templated).
#
#   LOW    — primitives. Four total: `approve` (HUMAN gate), `execute-agent`
#            (run a templated LLM agent with validation + optional fix
#            recovery), `execute-command` (run a templated shell command),
#            `fix` (single-attempt remediation that re-enters
#            `execute-agent` with `fix-on-failure: false`).
#
# Encoding conventions:
#
#   - Process names are kebab-case canonical. This YAML is itself the
#     source of truth — historical brainstorm files that named these
#     processes have been retired.
#
#   - `call-activity.process:` is the only invocation primitive. Templated
#     `process: ${action}` resolves at dispatch time against the
#     caller's params (runtime support added by Item 2 of the execution
#     plan).
#
#   - `call-activity.params:` carries call-site values down into the
#     called sub-process. ExpandParams substitutes ${name} occurrences in
#     param values against the parent's params before pushing the new
#     scope (so `params: {expected-test-result: ${expected-test-result}}`
#     forwards the parent's value).
#
#   - Gateway bindings (Q-new-1: parameterised expectation) read state set
#     either by an upstream gateway's binding function or by a custom Go
#     gate that promotes a relevant param into state. The Bind-time wiring
#     for these new bindings is downstream-alignment scope (Phase D).
#
#   - LOW primitives are encoded as their own processes; MID tasks call
#     them via `call-activity`. The double indirection looks heavier than
#     the brainstorm's prose but is what makes the diagram show "agent X
#     runs through LOW execute-agent" instead of inlining the validation /
#     approval loop into every MID.
#
# Runtime contract gaps known and accepted in this Item (encoded as TODO
# comments inline):
#
#   - `approve` NO-branch: Q3 = A (exit-only; caller owns NO) — currently
#     encoded as two end-events plus a state binding `approval-outcome`
#     the caller can re-read. Alternatives Q3-B (parameterised NO-action)
#     and Q3-C (split into two primitives APPROVE-OR-EXIT / APPROVE-OR-
#     RETRY) deferred to a future plan.
#
#   - `execute-agent` validation gateway (`outputs-and-scopes-valid`),
#     scope-diff plumbing, and `fix-on-failure` flag dispatch: the
#     YAML edges describe the shape; the gate/action bindings land with
#     the writing-agent runtime rewire (Phase D).
#
#   - `run-tests` exact-name verify params (`suite` + `test-names`):
#     encoded as call-site params on the `run-tests` MID; the underlying
#     `execute-command` reads them at dispatch time and appends them as
#     `--suite=…` / `--test=…` flags to `gh optivem test run`. `suite`
#     pins the test category (acceptance / contract-real / contract-stub
#     — a static property of the writing agent that fed the cycle).
#     `test-names` is the comma-separated list of bare test method names
#     emitted by the writing agent (`test-names` output, joined by
#     `coerceStateValue`'s `[]string` case). Both absent ⇒ run all tests.
#
#   - `fix-*` agent inventory (Q-late-5 (β-convention) routing): each `fix`
#     call dispatches `execute-agent` with `task-name: "fix-${failure-kind}"`
#     and `agent: "${failure-kind}-fixer"`. The placeholders resolve at
#     dispatch time via `ExpandParams`'s params-then-state scope chain
#     (`statemachine/run.go`), so the binding that wrote `failure-kind`
#     into state — `runCommand` or `validateOutputsAndScopes` — feeds the
#     substitution without a call-site passthrough param.
#     Closed set of kinds (every fixer follows the `<kind>-fixer.md`
#     convention; the prompt diagnoses first, then applies the smallest
#     fix within scope):
#       - `command-failed`           → command-failed-fixer.md           (runCommand)
#       - `missing-output`           → missing-output-fixer.md           (validateOutputsAndScopes)
#       - `scope-diff`               → scope-diff-fixer.md               (validateOutputsAndScopes)
#       - `unexpected-passing-tests` → unexpected-passing-tests-fixer.md (legacy MID convention)
#       - `unexpected-failing-tests` → unexpected-failing-tests-fixer.md (legacy MID convention)
#     The last two predate the β-convention — their MID-name carries the
#     kind directly; the Q-late-5 dispatch path is not exercised for them.
#
#     Scope augmentation for `scope-diff`: the dispatcher (driver.go)
#     appends `internal/atdd/process/process-flow.yaml` to
#     the scope_block when `failure-kind == scope-diff`, because the
#     `scope-diff-fixer` may need to widen a call-site's `scopes:` list
#     (the "scopes too narrow" mode). Every other failure-kind inherits
#     the originating task's scope unchanged.
#
# Document shape (unchanged from prior YAML; see internal/atdd/runtime/
# statemachine/load.go for the parser):
#
#   processes:
#     <process-name>:
#       start: <node-id>
#       outputs:                       # writing-agent MIDs only — the
#         - key: <name>                # structured output contract;
#           type: string|bool|string-list
#           optional: false            # (default; omit when false)
#       nodes:
#         - id: <node-id>
#           type: <node-type>         # one of: start-event, end-event,
#                                     # error-end-event, service-task,
#                                     # user-task, gateway, call-activity
#           # body fields per type:
#           # service-task  → action:
#           # user-task     → agent:       (`human` for STOPs)
#           # gateway       → binding:
#           # call-activity → process: [+ params: <map>]
#           # optional node-level fields (parser RawNode):
#           # tdd-stage: red|green|refactor          # TDD-stage styling
#           # read: / write: / scope: / scope-rationale:   # writing-agent
#           #                                        # call-activity scope
#           # max-visits: <n> + on-max-visits: <id>  # per-node visit cap
#       sequence-flows:
#         - {from: <id>, to: <id>}                      # unconditional
#         - {from: <id>, to: <id>, when: "<predicate>"} # gateway-guarded

processes:

  # Runtime bootstrap
  #
  # `main` is the runtime entry point invoked by `gh optivem implement`. It
  # treats the operator-supplied ticket as pre-picked and delegates to the
  # TOP `implement-ticket` process. No domain logic lives here — `main` is
  # the bridge between the CLI invocation surface and the five-level BPMN
  # structure.
  main:
    name: "Main"
    start: START
    nodes:
      - id: START
        type: start-event
        name: "Ticket Ready"

      - id: IMPLEMENT_TICKET
        type: call-activity
        process: implement-ticket
        name: "Implement Ticket"

      - id: END
        type: end-event
        name: "Ticket In Acceptance"

    sequence-flows:
      - {from: START,            to: IMPLEMENT_TICKET}
      - {from: IMPLEMENT_TICKET, to: END}

  # Backlog grooming entry. Marks the ticket IN REFINEMENT, runs the
  # refine-backlog-item cycle to produce Gherkin acceptance criteria +
  # classify the ticket-kind, then marks READY. The READY state is the
  # precondition for `implement-ticket`.
  refine-ticket:
    name: "Refine Ticket"
    start: MARK_IN_REFINEMENT
    nodes:
      - id: MARK_IN_REFINEMENT
        type: service-task
        action: move-to-in-refinement
        name: "Mark IN REFINEMENT"

      - id: REFINE_BACKLOG_ITEM
        type: call-activity
        process: refine-backlog-item
        name: "Refine Backlog Item"

      - id: MARK_READY
        type: service-task
        action: move-to-ready
        name: "Mark READY"

      - id: REFINE_TICKET_END
        type: end-event
        name: "Ticket Ready"

    sequence-flows:
      - {from: MARK_IN_REFINEMENT, to: REFINE_BACKLOG_ITEM}
      - {from: REFINE_BACKLOG_ITEM, to: MARK_READY}
      - {from: MARK_READY,         to: REFINE_TICKET_END}

  # Per-ticket execution. Marks IN PROGRESS, picks a CYCLE via a
  # hierarchical two-level gateway (type → subtype), runs the chosen
  # CYCLE, then marks IN ACCEPTANCE. Single-cycle tickets only (Q30.b = A)
  # — multi-cycle work splits during refinement.
  #
  # Two-level gateway shape (Item 11):
  #
  #   GATE_TICKET_KIND (binding: ticket-kind, values: story | bug | task)
  #     story → change-system-behavior
  #     bug   → change-system-behavior
  #     task  → GATE_TASK_SUBTYPE
  #
  #   GATE_TASK_SUBTYPE (binding: task-subtype, task-only second level)
  #     legacy-coverage             → cover-system-behavior
  #     system-redesign             → redesign-system-structure
  #     external-system-redesign    → redesign-external-system-structure
  #     system-refactor             → refactor-system-structure
  #     test-refactor               → refactor-test-structure
  #
  # Matches how operators conceptually classify: "first, what is this —
  # story, bug, or task? then, if task, what kind?" The slash-delimited
  # vocabulary used by the older flat gateway (`task/legacy-coverage`)
  # is split into a `ticket-kind` axis and a `task-subtype` axis at the
  # binding layer. Both axes are live: the ticket-kind binding resolves
  # the kind from the tracker (Tracker.Classify) and the task-subtype
  # binding resolves the subtype (Tracker.Subtypes), so task-kind
  # tickets dispatch end-to-end to their cycles.
  #
  # Absorbs the pre-refactor github-intake process (cross-check
  # inventory diagram #3). The OLD intake's classification + body-
  # parsing pipeline (`read-ticket-type` / `read-subtype` / `parse-
  # ticket-body` service tasks plus three STOP nodes) collapses into
  # two nodes here: the PARSE_TICKET service-task (action: parse-ticket
  # — Tracker.ReadSections → intake.ParseSections → ctx.State["ticket_*"])
  # handles body extraction with shape-level validation (AC XOR
  # Checklist), and the two-stage gateway handles type/subtype
  # discrimination. Per-kind required-section enforcement lives
  # downstream at dispatch time via the load-bearing placeholder check
  # in clauderun.go.
  #
  # Operator-facing parse errors / unrecognised types or subtypes
  # surface through error end-events: GATE_TICKET_KIND's unguarded
  # catch-all routes unrecognised types to `UNKNOWN_TICKET_KIND`;
  # GATE_TASK_SUBTYPE's catch-all routes unrecognised subtypes (or task
  # tickets with no subtype label) to `UNKNOWN_TASK_SUBTYPE`. Both
  # terminate the process with the event's documentation as the error
  # message (see statemachine/run.go).
  implement-ticket:
    name: "Implement Ticket"
    start: MARK_IN_PROGRESS
    nodes:
      - id: MARK_IN_PROGRESS
        type: service-task
        action: move-to-in-progress
        name: "Mark IN PROGRESS"

      - id: PARSE_TICKET
        type: service-task
        action: parse-ticket
        name: "Parse Ticket"

      - id: GATE_TICKET_KIND
        type: gateway
        binding: ticket-kind
        name: "Ticket Kind?"

      - id: GATE_TASK_SUBTYPE
        type: gateway
        binding: task-subtype
        name: "Task Subtype?"

      - id: CHANGE_SYSTEM_BEHAVIOR
        type: call-activity
        process: change-system-behavior
        name: "Change System Behavior"

      - id: COVER_SYSTEM_BEHAVIOR
        type: call-activity
        process: cover-system-behavior
        name: "Cover System Behavior"

      - id: REDESIGN_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-system-structure
        name: "Redesign System Structure"

      - id: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-external-system-structure
        name: "Redesign External System Structure"

      - id: REFACTOR_SYSTEM_STRUCTURE
        type: call-activity
        process: refactor-system-structure
        name: "Refactor System Structure"

      - id: REFACTOR_TEST_STRUCTURE
        type: call-activity
        process: refactor-test-structure
        name: "Refactor Test Structure"

      - id: MARK_IN_ACCEPTANCE
        type: service-task
        action: move-to-in-acceptance
        name: "Mark IN ACCEPTANCE"

      - id: IMPLEMENT_TICKET_END
        type: end-event
        name: "Ticket Marked IN ACCEPTANCE"

      - id: UNKNOWN_TICKET_KIND
        type: error-end-event
        name: "Unknown Ticket Kind"

      - id: UNKNOWN_TASK_SUBTYPE
        type: error-end-event
        name: "Unknown Task Subtype"

    sequence-flows:
      - {from: MARK_IN_PROGRESS,            to: PARSE_TICKET}
      - {from: PARSE_TICKET,                to: GATE_TICKET_KIND}
      - {from: GATE_TICKET_KIND, to: CHANGE_SYSTEM_BEHAVIOR, when: "ticket-kind == story"}
      - {from: GATE_TICKET_KIND, to: CHANGE_SYSTEM_BEHAVIOR, when: "ticket-kind == bug"}
      - {from: GATE_TICKET_KIND, to: GATE_TASK_SUBTYPE,      when: "ticket-kind == task"}
      - {from: GATE_TICKET_KIND, to: UNKNOWN_TICKET_KIND}
      - {from: GATE_TASK_SUBTYPE, to: COVER_SYSTEM_BEHAVIOR,              when: "task-subtype == legacy-coverage"}
      - {from: GATE_TASK_SUBTYPE, to: REDESIGN_SYSTEM_STRUCTURE,          when: "task-subtype == system-redesign"}
      - {from: GATE_TASK_SUBTYPE, to: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE, when: "task-subtype == external-system-redesign"}
      - {from: GATE_TASK_SUBTYPE, to: REFACTOR_SYSTEM_STRUCTURE,          when: "task-subtype == system-refactor"}
      - {from: GATE_TASK_SUBTYPE, to: REFACTOR_TEST_STRUCTURE,            when: "task-subtype == test-refactor"}
      - {from: GATE_TASK_SUBTYPE, to: UNKNOWN_TASK_SUBTYPE}
      - {from: CHANGE_SYSTEM_BEHAVIOR,             to: MARK_IN_ACCEPTANCE}
      - {from: COVER_SYSTEM_BEHAVIOR,              to: MARK_IN_ACCEPTANCE}
      - {from: REDESIGN_SYSTEM_STRUCTURE,          to: MARK_IN_ACCEPTANCE}
      - {from: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE, to: MARK_IN_ACCEPTANCE}
      - {from: REFACTOR_SYSTEM_STRUCTURE,          to: MARK_IN_ACCEPTANCE}
      - {from: REFACTOR_TEST_STRUCTURE,            to: MARK_IN_ACCEPTANCE}
      - {from: MARK_IN_ACCEPTANCE,        to: IMPLEMENT_TICKET_END}

  # Loopable refactor-type chooser. The operator picks a refactor CYCLE
  # (opportunistic mode, no checklist) or exits. No Mark-Ticket bookends —
  # there is no ticket. Reused by `change-system-behavior` step 3 (via a
  # single `REFACTOR_OPPORTUNISTICALLY` call-activity) so the
  # opportunistic-inside-change surface shares this menu instead of
  # duplicating the gateway. Three call surfaces, one definition:
  # (1) ticket-driven via `task/system-refactor` → `implement-ticket`
  # gateway → CYCLE; (2) opportunistic-inside-change via the call into
  # this TOP; (3) ad-hoc operator entry directly into this TOP.
  refactor:
    name: "Refactor"
    start: GATE_REFACTOR_TYPE_CHOICE
    nodes:
      # No unknown catch-all edge by design (unlike the parse-derived
      # ticket-kind / task-subtype gateways, whose catch-alls guard real
      # out-of-set ticket labels). `refactor-type-choice` is a re-prompting
      # menu, not a parser: under --auto it defaults to `none`, otherwise it
      # re-prompts on any unrecognised reply — so it only ever emits the 5
      # enumerated values below. A catch-all here would be unreachable.
      - id: GATE_REFACTOR_TYPE_CHOICE
        type: gateway
        binding: refactor-type-choice
        name: "Refactor Type?"

      - id: REFACTOR_SYSTEM_STRUCTURE
        type: call-activity
        process: refactor-system-structure
        name: "Refactor System Structure"

      - id: REFACTOR_TEST_STRUCTURE
        type: call-activity
        process: refactor-test-structure
        name: "Refactor Test Structure"

      - id: REDESIGN_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-system-structure
        name: "Redesign System Structure"

      - id: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE
        type: call-activity
        process: redesign-external-system-structure
        name: "Redesign External System Structure"

      - id: REFACTOR_TOP_END
        type: end-event
        name: "Refactor Complete"

    sequence-flows:
      - {from: GATE_REFACTOR_TYPE_CHOICE,          to: REFACTOR_SYSTEM_STRUCTURE,          when: "refactor-type-choice == refactor-system-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE,          to: REFACTOR_TEST_STRUCTURE,            when: "refactor-type-choice == refactor-test-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE,          to: REDESIGN_SYSTEM_STRUCTURE,          when: "refactor-type-choice == redesign-system-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE,          to: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE, when: "refactor-type-choice == redesign-external-system-structure"}
      - {from: GATE_REFACTOR_TYPE_CHOICE,          to: REFACTOR_TOP_END,                   when: "refactor-type-choice == none"}
      - {from: REFACTOR_SYSTEM_STRUCTURE,          to: GATE_REFACTOR_TYPE_CHOICE}
      - {from: REFACTOR_TEST_STRUCTURE,            to: GATE_REFACTOR_TYPE_CHOICE}
      - {from: REDESIGN_SYSTEM_STRUCTURE,          to: GATE_REFACTOR_TYPE_CHOICE}
      - {from: REDESIGN_EXTERNAL_SYSTEM_STRUCTURE, to: GATE_REFACTOR_TYPE_CHOICE}

  refine-backlog-item:
    name: "Refine Backlog Item"
    start: REFINE_ACCEPTANCE_CRITERIA
    nodes:
      - id: REFINE_ACCEPTANCE_CRITERIA
        type: call-activity
        process: refine-acceptance-criteria
        name: "Refine Acceptance Criteria"

      - id: REFINE_BACKLOG_ITEM_END
        type: end-event
        name: "Backlog Item Refined"

    sequence-flows:
      - {from: REFINE_ACCEPTANCE_CRITERIA, to: REFINE_BACKLOG_ITEM_END}

  # Classic red-green-REFACTOR triad (Q33). Step 3 delegates to the
  # canonical `refactor` TOP process — same gateway, same three
  # refactor-cycle options, same `none` exit. Two surfaces, one
  # definition: the ticket-driven path (`task/system-refactor` →
  # `implement-ticket` gateway → CYCLE) and the opportunistic-in-place
  # path (here, via the `refactor` call-activity) both land on the
  # `refactor-*-structure` CYCLEs through one shared menu.
  change-system-behavior:
    name: "Change System Behavior"
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL
        type: call-activity
        process: write-and-verify-acceptance-tests-fail
        name: "Write Failing Acceptance Tests"
        tdd-stage: red

      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          task-name: implement-system
          action: implement-system
          # Behavioral GREEN: verify ONLY the AT(s) the RED writer just
          # produced. Read the AT-cascade-namespaced `at-test-names` key
          # (plan 20260608-1231), NOT a flat `test-names`: a nested contract
          # excursion (shared-contract → external-driver CT-HIGH) runs between
          # the AT writer and this read and re-emits `test-names`, so a flat
          # key would resolve to the contract method here → false RED. The
          # `at-`/`ct-` landing namespacing (plan 20260606-1525) isolates the
          # AT writer's list under `at-test-names`.
          suite: acceptance
          test-names: ${at-test-names}
        name: "Implement System"
        tdd-stage: green

      - id: REFACTOR_OPPORTUNISTICALLY
        type: call-activity
        process: refactor
        name: "Opportunistic Refactor (Loopable)"
        tdd-stage: refactor

      - id: CHANGE_SYSTEM_BEHAVIOR_END
        type: end-event
        name: "System Behavior Changed"

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_FAIL, to: IMPLEMENT_AND_VERIFY_SYSTEM}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,            to: REFACTOR_OPPORTUNISTICALLY}
      - {from: REFACTOR_OPPORTUNISTICALLY,             to: CHANGE_SYSTEM_BEHAVIOR_END}

  # Legacy-coverage cycle. Operator specifies acceptance criteria only;
  # CT is a nested sub-process when the AT layer needs a stub/driver to
  # pass (Q31.a = Option A nested). Gateway is one row at TOP
  # (`task/legacy-coverage` → `cover-system-behavior`) — not split into
  # cover-legacy-acceptance / cover-legacy-contract, because the operator
  # does not think in CT subtypes (CT is an implementation detail of
  # making AT pass).
  cover-system-behavior:
    name: "Cover System Behavior"
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS
        type: call-activity
        process: write-and-verify-acceptance-tests-pass
        name: "Write Passing Acceptance Tests"
        tdd-stage: green

      - id: COVER_END
        type: end-event
        name: "System Behavior Covered"

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS_PASS, to: COVER_END}

  # System-side structure redesign. Step 1 calls MID
  # `update-system-driver-adapters` (reshape adapter layer to absorb the
  # surface change). Step 2 reuses HIGH `implement-and-verify-system` with
  # `action: update-system` (reshape the system surface). External-side
  # driver adapters live in the sibling CYCLE
  # `redesign-external-system-structure`, reached via
  # `task/external-system-redesign` — `task/system-redesign` tickets stay
  # system-side and no longer rebuild the external boundary.
  #
  # Verb-split note (plan 20260526-1448 Item 10): the redesign call sites
  # dispatch `update-*` variants (Checklist-driven reshape) rather than
  # `implement-*` variants (TODO-fill translation). Each variant is a
  # single-caller prompt with one algorithm and no Checklist branching.
  redesign-system-structure:
    name: "Redesign System Structure"
    start: UPDATE_SYSTEM_DRIVER_ADAPTERS
    nodes:
      - id: UPDATE_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: update-system-driver-adapters
        name: "Update System Driver Adapters"
        tdd-stage: red

      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          task-name: update-system
          action: update-system
          # Structural redesign: behavior must be preserved across ALL tests,
          # so VERIFY_TESTS_PASS runs the full regression. Narrowing would
          # assert nothing about preservation.
          suite: ""
          test-names: ""
        name: "Update System"
        tdd-stage: green

      - id: REDESIGN_END
        type: end-event
        name: "System Structure Redesigned"

    sequence-flows:
      - {from: UPDATE_SYSTEM_DRIVER_ADAPTERS,  to: IMPLEMENT_AND_VERIFY_SYSTEM}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,    to: REDESIGN_END}

  # External-side sibling of `redesign-system-structure`. Step 1 calls
  # MID `update-external-system-driver-adapters` (reshape Ext* DTOs +
  # Real/Stub driver impls to match the new external API). Step 2 reuses
  # HIGH `implement-and-verify-system` with `action: update-system`
  # because either side of the boundary can shift the system's port
  # surface — an external-system contract change usually requires the
  # acceptance tests to re-verify against the new stub behavior, and
  # update-system absorbs whatever surface reshape that implies.
  #
  # Verb-split note (plan 20260526-1448 Item 10): the redesign call sites
  # dispatch `update-*` variants (Checklist-driven reshape).
  redesign-external-system-structure:
    name: "Redesign External System Structure"
    start: UPDATE_EXTERNAL_SYSTEM_DRIVER_ADAPTERS
    nodes:
      - id: UPDATE_EXTERNAL_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: update-external-system-driver-adapters
        name: "Update External System Driver Adapters"
        tdd-stage: red

      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          task-name: update-system
          action: update-system
          # Structural redesign (external side): full regression — same
          # rationale as redesign-system-structure (line 521).
          suite: ""
          test-names: ""
        name: "Update System"
        tdd-stage: green

      - id: REDESIGN_EXTERNAL_END
        type: end-event
        name: "External System Structure Redesigned"

    sequence-flows:
      - {from: UPDATE_EXTERNAL_SYSTEM_DRIVER_ADAPTERS, to: IMPLEMENT_AND_VERIFY_SYSTEM}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,            to: REDESIGN_EXTERNAL_END}

  # Step 1 calls HIGH `implement-and-verify-system` with
  # `action: refactor-system`. Was the prototype encoded in Item 1 of
  # this plan; preserved unchanged.
  refactor-system-structure:
    name: "Refactor System Structure"
    start: IMPLEMENT_AND_VERIFY_SYSTEM
    nodes:
      - id: IMPLEMENT_AND_VERIFY_SYSTEM
        type: call-activity
        process: implement-and-verify-system
        params:
          task-name: refactor-system
          action: refactor-system
          # Structural refactor: behavior must be preserved across ALL tests,
          # so VERIFY_TESTS_PASS runs the full regression.
          suite: ""
          test-names: ""
        name: "Refactor System"
        tdd-stage: refactor

      - id: REFACTOR_SYSTEM_STRUCTURE_END
        type: end-event
        name: "System Structure Refactored"

    sequence-flows:
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM,     to: REFACTOR_SYSTEM_STRUCTURE_END}

  refactor-test-structure:
    name: "Refactor Test Structure"
    start: REFACTOR_AND_VERIFY_TESTS
    nodes:
      - id: REFACTOR_AND_VERIFY_TESTS
        type: call-activity
        process: refactor-and-verify-tests
        name: "Refactor and Verify Tests"
        tdd-stage: refactor
        params:
          task-name: refactor-tests

      - id: REFACTOR_TEST_STRUCTURE_END
        type: end-event
        name: "Test Structure Refactored"

    sequence-flows:
      - {from: REFACTOR_AND_VERIFY_TESTS,      to: REFACTOR_TEST_STRUCTURE_END}

  # Cycle-facing thin wrapper that pins `expected-test-result: failure`
  # before calling the parameterised middle. Called by
  # `change-system-behavior` step 1.
  write-and-verify-acceptance-tests-fail:
    name: "Write and Verify Acceptance Tests Fail"
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS
        type: call-activity
        process: write-and-verify-acceptance-tests
        name: "Write and Verify Acceptance Tests"
        params:
          expected-test-result: failure

      - id: WAV_AT_FAIL_END
        type: end-event
        name: "Failing Acceptance Tests Verified"

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS, to: WAV_AT_FAIL_END}

  # Cycle-facing thin wrapper that pins `expected-test-result: success`
  # before calling the parameterised middle. Called by
  # `cover-system-behavior` step 1.
  write-and-verify-acceptance-tests-pass:
    name: "Write and Verify Acceptance Tests Pass"
    start: WRITE_AND_VERIFY_ACCEPTANCE_TESTS
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TESTS
        type: call-activity
        process: write-and-verify-acceptance-tests
        name: "Write and Verify Acceptance Tests"
        params:
          expected-test-result: success
          # Cover-path verify mode (plan 20260606-1518). The system already
          # has the behaviour, so each AT layer expects PASS only when no
          # further plumbing change is pending (else FAIL) — unlike the change
          # path (-fail wrapper), which leaves verify-mode unset so the gate
          # defaults to `red` and routes on the pinned expected-test-result.
          # Inherits down the whole cover cascade via the wrapCallActivity
          # param-merge; each layer pins its own verify-pending-on below.
          verify-mode: green-when-complete

      - id: WAV_AT_PASS_END
        type: end-event
        name: "Passing Acceptance Tests Verified"

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TESTS, to: WAV_AT_PASS_END}

  # The shared, channel-AGNOSTIC contract slice (plan 20260530-1725 Item 2a).
  # This is the cascade up to — but NOT including — the per-channel System
  # Driver adapter gate: write the test code (inner primitive), then cascade
  # into DSL whenever the DSL port changed, and — when the external-system
  # driver port changed — into the contract-test-first CT-HIGH
  # (`…-contract-tests`, Q31.a Option A nested), which writes+verifies the
  # contract test (real, then stub) and implements the external adapter.
  # Reads `at-dsl-port-changed` from the inner call, then
  # `at-external-driver-port-changed` from the DSL impl (Q6 port-change wiring
  # table); both are the acceptance-cascade-namespaced verdicts (plan
  # 20260606-1525). The GATE bindings are bound to Go gate functions that
  # promote the relevant ctx.State value into ctx.State for the predicate
  # evaluator.
  #
  # Why this is its own named sub-process: it is the `--target test` slice the
  # whole team mobs (tests + DSL core + driver port + external) — the contract
  # every channel team builds on. It ends RED-by-design (no system, no
  # per-channel adapter yet). The `--target` selector enters it by name via
  # RunProcess; `write-and-verify-acceptance-tests` (below) composes it and
  # then runs the per-channel adapter tail it deliberately excludes
  # (D-external keeps the external adapter HERE, but the System Driver adapter
  # is channel-shaped and owned by each channel team — D-adapter-ownership
  # option A).
  shared-contract:
    name: "Write and Verify Channel-Shared Acceptance Tests"
    start: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE
    nodes:
      - id: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE
        type: call-activity
        process: write-and-verify-acceptance-test-code
        name: "Write and Verify Acceptance Test Code"
        params:
          # Declares the originating writing-agent MID for this wrapper so
          # every command-runner child (compile/verify/commit) and
          # any FIX dispatched on command-failure inherits it via the
          # params-merge in wrapCallActivity. Without it, fix-* recovery
          # in execute-command would resolve ${task-name} to the literal
          # "${task-name}" and Engine.Scope would return empty, leaving
          # ${scope_block} unfilled in the fixer prompt.
          task-name: write-acceptance-tests
          acceptance-criteria: ${acceptance-criteria}
          expected-test-result: ${expected-test-result}
          # Cascade tag (plan 20260606-1525): the test-code writer emits
          # `dsl-port-changed` and `test-names`; the landing layer namespaces
          # them to `at-*` from this test-category so the nested contract
          # excursion can't clobber the acceptance verdict or test-name list
          # (test-names namespacing added by plan 20260608-1231).
          test-category: acceptance
          # Cover-path plumbing scope (plan 20260606-1518): the test-code
          # layer's plumbing is complete unless the DSL port changed, so the
          # green-when-complete verify gate expects PASS iff at-dsl-port-changed
          # is false. Ignored on the change path (verify-mode red).
          verify-pending-on: dsl

      - id: GATE_DSL_PORT_CHANGED
        type: gateway
        binding: at-dsl-port-changed
        name: "DSL Port Changed?"

      - id: IMPLEMENT_AND_VERIFY_DSL
        type: call-activity
        process: implement-and-verify-dsl
        name: "Implement and Verify DSL"
        params:
          task-name: implement-dsl
          expected-test-result: ${expected-test-result}
          test-category: acceptance
          suite: acceptance
          # AT-cascade test-name list (plan 20260608-1231): bind the namespaced
          # `at-test-names` so the inner implement-test-layer change-path verify
          # (VERIFY_TESTS_FAIL_FILTERED) selects the acceptance methods.
          # implement-test-layer is intent-agnostic and reads a flat
          # ${test-names} param; without this bind it falls through to the
          # (now-namespaced-away) bare key and fails strict ExpandParams.
          test-names: ${at-test-names}
          # Cover-path plumbing scope (plan 20260606-1518): after the DSL impl,
          # plumbing is still pending iff a system- or external-driver port
          # changed, so the green-when-complete verify gate expects PASS only
          # when both at-system/at-external-driver-port-changed are false.
          # Inherits into implement-and-verify-dsl → implement-test-layer.
          verify-pending-on: drivers

      - id: GATE_EXTERNAL_DRIVER_PORTS_CHANGED
        type: gateway
        binding: at-external-driver-port-changed
        name: "External Driver Ports Changed?"

      # Q31.a (resolved Option A, nested): the external-driver-port-changed
      # true-branch enters the contract-test-first CT-HIGH, not a thin AT-only
      # adapter step. The CT-HIGH is a superset — it writes+verifies the
      # contract test (real, then stub) AND implements the external adapter.
      # It is self-contained: it pins its own expected results internally
      # (write-contract-tests → success; contract-real/stub are outcome-probed
      # post-adapters, plan 20260606-1943 — no pinned polarity) and sources
      # `${ct-test-names}` from write-contract-tests'
      # output. The one caller param it needs is the cascade tag (plan
      # 20260606-1525): `test-category: contract` makes the whole excursion
      # namespace its port-changed verdicts AND test-name list under `ct-*`, so
      # its inner test-code writer (write-contract-tests) and DSL impl cannot
      # clobber the parent AT cascade's `at-*` keys. The inner
      # IMPLEMENT_AND_VERIFY_DSL re-pins `test-category: contract` locally
      # (harmless — same value).
      - id: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS
        type: call-activity
        process: implement-and-verify-external-system-driver-adapters-contract-tests
        name: "Implement and Verify External System Driver Adapters Contract Tests"
        params:
          test-category: contract
          # Default the CT-HIGH inner verify gates away from the enclosing
          # cover run: pin `red` here so the green-when-complete cover mode
          # cannot inherit into the contract excursion's
          # IMPLEMENT_AND_VERIFY_DSL → implement-test-layer gate (plan
          # 20260606-1518). That inner DSL step now overrides this to
          # `verify-mode: none` (compile-only; contract-real red/green is
          # deferred to PROBE_CONTRACT_REAL, plan 20260606-2330) — the `red`
          # default remains as the barrier for any other inner
          # implement-test-layer consumer.
          verify-mode: red

      - id: GATE_AT_TERMINAL_GREEN
        type: gateway
        binding: at-external-terminal-verify-needed
        name: "Cover Run Needs Terminal AT-Green?"

      # RED writes/builds tests, not system source; the CT-HIGH already left the
      # system up against the stub. `system start` is idempotent.
      - id: START_SYSTEM_AT_TERMINAL
        type: call-activity
        process: start-system
        name: "Start System"

      # Case D (plan 20260606-1518): on the external-driver-only cover branch the
      # CT-HIGH verified the contract tests, not the AT, so the AT would otherwise
      # end last-verified as FAILING at the DSL layer. With the external adapters
      # now built and no system-driver adapter step to follow, all AT plumbing is
      # complete — assert the AT greens.
      - id: VERIFY_TESTS_PASS_ACCEPTANCE_TERMINAL
        type: call-activity
        process: verify-tests-pass
        name: "Verify Acceptance Tests Pass"
        params:
          suite: acceptance
          # AT-cascade-namespaced (plan 20260608-1231): this terminal AT-green
          # runs AFTER the external-driver CT-HIGH, which re-emits `test-names`
          # under `ct-*`. Read `at-test-names` so the cover-path verify selects
          # the acceptance methods, not the contract method.
          test-names: ${at-test-names}

      - id: SHARED_CONTRACT_END
        type: end-event
        name: "Channel-Shared Acceptance Tests Verified"

    sequence-flows:
      - {from: WRITE_AND_VERIFY_ACCEPTANCE_TEST_CODE, to: GATE_DSL_PORT_CHANGED}
      - {from: GATE_DSL_PORT_CHANGED, to: IMPLEMENT_AND_VERIFY_DSL, when: "at-dsl-port-changed == true"}
      - {from: GATE_DSL_PORT_CHANGED, to: SHARED_CONTRACT_END,      when: "at-dsl-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_DSL, to: GATE_EXTERNAL_DRIVER_PORTS_CHANGED}
      - {from: GATE_EXTERNAL_DRIVER_PORTS_CHANGED, to: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS, when: "at-external-driver-port-changed == true"}
      - {from: GATE_EXTERNAL_DRIVER_PORTS_CHANGED, to: SHARED_CONTRACT_END,                           when: "at-external-driver-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_EXTERNAL_DRIVER_ADAPTERS, to: GATE_AT_TERMINAL_GREEN}
      - {from: GATE_AT_TERMINAL_GREEN, to: START_SYSTEM_AT_TERMINAL, when: "at-external-terminal-verify-needed == true"}
      - {from: GATE_AT_TERMINAL_GREEN, to: SHARED_CONTRACT_END,      when: "at-external-terminal-verify-needed == false"}
      - {from: START_SYSTEM_AT_TERMINAL, to: VERIFY_TESTS_PASS_ACCEPTANCE_TERMINAL}
      - {from: VERIFY_TESTS_PASS_ACCEPTANCE_TERMINAL, to: SHARED_CONTRACT_END}

  # The full RED acceptance cascade = shared contract + the per-channel System
  # Driver adapter tail. Composes `shared-contract` (above) and then, IFF the
  # acceptance tests touched a system driver port, runs the (channel-unrolled)
  # adapter step. Two callers — write-and-verify-acceptance-tests-fail /
  # -pass — forward `expected-test-result`; the no-arg full run walks this
  # process exactly as it did before the Item 2a seam-extraction.
  #
  # Behaviour-preservation note (the re-gate): the System Driver adapter gate
  # is STRICT — `system-driver-port-changed` is only written to State by the
  # DSL implementer, so it is unset whenever the DSL impl was skipped. The
  # shared-contract slice already short-circuits to its end when
  # `at-dsl-port-changed == false`; this parent therefore RE-READS
  # `at-dsl-port-changed` (a shared-State flag, idempotent pure read) before the
  # adapter gate. dsl == false → straight to WAV_AT_END (the adapter gate is
  # never reached on an unset key, matching pre-seam behaviour); dsl == true →
  # the DSL impl ran, so `at-system-driver-port-changed` IS set and the adapter
  # gate routes normally. The `at-` namespacing (plan 20260606-1525) is what
  # makes this re-read correct: the nested contract excursion writes only
  # `ct-*`, so the AT verdicts the test-code writer / AT DSL impl set survive
  # the excursion untouched and the parent reads the AT-side truth here. The adapter anchor + its gate are kept verbatim so
  # the UnrollSystemDriverAdapterChannels rewrite (channels.go) still finds
  # them (gate → anchor TRUE-branch, gate → WAV_AT_END skip-branch, anchor →
  # WAV_AT_END).
  write-and-verify-acceptance-tests:
    name: "Write and Verify Acceptance Tests"
    start: SHARED_CONTRACT
    nodes:
      - id: SHARED_CONTRACT
        type: call-activity
        process: shared-contract
        name: "Write and Verify Channel-Shared Acceptance Tests"
        params:
          expected-test-result: ${expected-test-result}

      # Re-gate on the flag shared-contract's inner test-code writer set in
      # State: skip the adapter tail entirely when no DSL port changed (the
      # strict adapter gate below would otherwise read an unset key). See the
      # behaviour-preservation note above.
      - id: GATE_DSL_PORT_CHANGED
        type: gateway
        binding: at-dsl-port-changed
        name: "DSL Port Changed?"

      - id: GATE_SYSTEM_DRIVER_PORTS_CHANGED
        type: gateway
        binding: at-system-driver-port-changed
        name: "System Driver Ports Changed?"

      - id: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-and-verify-system-driver-adapters
        name: "Implement and Verify System Driver Adapters"
        params:
          task-name: implement-system-driver-adapters
          expected-test-result: ${expected-test-result}
          test-category: acceptance
          suite: acceptance
          # AT-cascade test-name list (plan 20260608-1231): bind the namespaced
          # `at-test-names` explicitly so the inner implement-test-layer filtered
          # verify (VERIFY_TESTS_FAIL_FILTERED) selects the acceptance methods.
          # Without it the read inherits the (now-namespaced-away) flat
          # `test-names`, yielding an empty selection that a fail-expecting
          # verify accepts as GREEN → false GREEN (the second reported bug).
          test-names: ${at-test-names}
          # Cover-path plumbing scope (plan 20260606-1518): the system-driver
          # adapter layer is the terminal AT-plumbing step, so nothing is
          # pending after it — the green-when-complete verify gate always
          # expects PASS here. Inherits into implement-test-layer.
          verify-pending-on: none

      - id: WAV_AT_END
        type: end-event
        name: "Acceptance Tests Verified"

    sequence-flows:
      - {from: SHARED_CONTRACT, to: GATE_DSL_PORT_CHANGED}
      - {from: GATE_DSL_PORT_CHANGED, to: GATE_SYSTEM_DRIVER_PORTS_CHANGED, when: "at-dsl-port-changed == true"}
      - {from: GATE_DSL_PORT_CHANGED, to: WAV_AT_END,                       when: "at-dsl-port-changed == false"}
      - {from: GATE_SYSTEM_DRIVER_PORTS_CHANGED, to: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS, when: "at-system-driver-port-changed == true"}
      - {from: GATE_SYSTEM_DRIVER_PORTS_CHANGED, to: WAV_AT_END,                                  when: "at-system-driver-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_SYSTEM_DRIVER_ADAPTERS, to: WAV_AT_END}

  # Pure test-code authoring: write tests, compile, verify, commit. No
  # production-side impl. Branches on `expected-test-result` parameter
  # (success → verify-tests-pass; failure → verify-tests-fail). The
  # written AT carries a permanent env-var gate the orchestrator lifts at
  # verify time, so no disable step follows.
  write-and-verify-acceptance-test-code:
    name: "Write and Verify Acceptance Test Code"
    start: WRITE_ACCEPTANCE_TESTS
    nodes:
      - id: WRITE_ACCEPTANCE_TESTS
        type: call-activity
        process: write-acceptance-tests
        name: "Write Acceptance Tests"
        params:
          acceptance-criteria: ${acceptance-criteria}
          expected-test-result: ${expected-test-result}

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests
        name: "Compile Tests"

      # RED writes tests, not system source — start-only (no BUILD_SYSTEM).
      # `system start` is idempotent and lazy-builds the image when missing.
      - id: START_SYSTEM
        type: call-activity
        process: start-system
        name: "Start System"

      # Mode-aware verify gate (plan 20260606-1518). On the change path
      # (verify-mode red/unset) at-verify-expectation returns the pinned
      # expected-test-result verbatim — unchanged routing. On the cover path
      # (verify-mode green-when-complete) it returns success iff no further
      # plumbing is pending (verify-pending-on: dsl here), else failure.
      - id: GATE_EXPECTED_TEST_RESULT
        type: gateway
        binding: at-verify-expectation
        name: "Expected Test Result?"

      - id: VERIFY_TESTS_PASS_ACCEPTANCE
        type: call-activity
        process: verify-tests-pass
        name: "Verify Acceptance Tests Pass"
        params:
          suite: acceptance
          # AT-cascade-namespaced (plan 20260608-1231): the AT writer now lands
          # its list under `at-test-names`, never the bare key, so this leaf
          # read must name it explicitly or strict ExpandParams fails.
          test-names: ${at-test-names}

      - id: VERIFY_TESTS_FAIL_ACCEPTANCE
        type: call-activity
        process: verify-tests-fail
        name: "Verify Acceptance Tests Fail"
        params:
          suite: acceptance
          # AT-cascade-namespaced (plan 20260608-1231): see VERIFY_TESTS_PASS_
          # ACCEPTANCE above — the AT writer lands under `at-test-names`.
          test-names: ${at-test-names}

      - id: COMMIT_TEST_CODE
        type: call-activity
        process: commit
        name: "Commit Test Code"
        params:
          # test-commit tier: persists the test contract.
          category: test-commit
          layer: "ACCEPTANCE TESTS"

      - id: WAV_AT_CODE_END
        type: end-event
        name: "Acceptance Test Code Verified"

      - id: UNKNOWN_EXPECTED_TEST_RESULT
        type: error-end-event
        name: "Unknown Expected Test Result"

    sequence-flows:
      - {from: WRITE_ACCEPTANCE_TESTS, to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,          to: START_SYSTEM}
      - {from: START_SYSTEM,           to: GATE_EXPECTED_TEST_RESULT}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_PASS_ACCEPTANCE, when: "at-verify-expectation == success"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_FAIL_ACCEPTANCE, when: "at-verify-expectation == failure"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: UNKNOWN_EXPECTED_TEST_RESULT}
      - {from: VERIFY_TESTS_PASS_ACCEPTANCE, to: COMMIT_TEST_CODE}
      - {from: VERIFY_TESTS_FAIL_ACCEPTANCE, to: COMMIT_TEST_CODE}
      - {from: COMMIT_TEST_CODE,             to: WAV_AT_CODE_END}

  implement-and-verify-dsl:
    name: "Implement and Verify DSL"
    start: IMPLEMENT_TEST_LAYER
    nodes:
      - id: IMPLEMENT_TEST_LAYER
        type: call-activity
        process: implement-test-layer
        name: "Implement DSL Layer"
        params:
          task-name: implement-dsl
          action: implement-dsl
          expected-test-result: ${expected-test-result}
          test-category: ${test-category}
          suite: ${suite}
          layer: "DSL"

      - id: IMPL_DSL_END
        type: end-event
        name: "DSL Layer Verified"

    sequence-flows:
      - {from: IMPLEMENT_TEST_LAYER, to: IMPL_DSL_END}

  implement-and-verify-system-driver-adapters:
    name: "Implement and Verify System Driver Adapters"
    start: IMPLEMENT_TEST_LAYER
    nodes:
      - id: IMPLEMENT_TEST_LAYER
        type: call-activity
        process: implement-test-layer
        name: "Implement System Driver Adapter Layer"
        params:
          task-name: implement-system-driver-adapters
          action: implement-system-driver-adapters
          expected-test-result: ${expected-test-result}
          test-category: ${test-category}
          suite: ${suite}
          layer: "SYSTEM DRIVER ADAPTERS"

      - id: IMPL_SYS_DRIVER_END
        type: end-event
        name: "System Driver Adapter Layer Verified"

    sequence-flows:
      - {from: IMPLEMENT_TEST_LAYER, to: IMPL_SYS_DRIVER_END}

  # Contract-test variant of the external driver-adapter impl. Mirrors the
  # AT-side cascade but with `test-category: contract` semantics and the
  # contract-real / contract-stub outcome-probe split (plan 20260606-1943).
  # Absorbs the pre-refactor diagram #8 (contract-test-sub-process).
  #
  # Called by `shared-contract`'s `GATE_EXTERNAL_DRIVER_PORTS_CHANGED`
  # true-branch (Q31.a resolved: CT nested under AT). The AT cycle drives;
  # when the DSL impl raises `external-driver-port-changed`, the external-
  # driver gate fires this CT-HIGH as a sub-step between AT-red and AT-green,
  # so the contract test certifies the stub before the AT goes green.
  implement-and-verify-external-system-driver-adapters-contract-tests:
    name: "Implement and Verify External System Driver Adapters Contract Tests"
    start: WRITE_CONTRACT_TESTS
    nodes:
      - id: WRITE_CONTRACT_TESTS
        type: call-activity
        process: write-contract-tests
        name: "Write External System Contract Tests"
        params:
          expected-test-result: success

      - id: GATE_DSL_PORT_CHANGED
        type: gateway
        binding: ct-dsl-port-changed
        name: "DSL Port Changed?"

      # Compile-only DSL/port layer (plan 20260606-2330). The DSL/port layer's
      # real work is "change the port, ensure it compiles, commit" — it does NOT
      # green the contract suite, because the External System Driver adapters
      # that actually green `contract-real` are still throwing-TODO stubs until
      # IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS runs next. So `contract-real`
      # red/green is owned SOLELY by PROBE_CONTRACT_REAL (outcome-driven,
      # post-adapters, plan 20260606-1943). `verify-mode: none` routes the inner
      # GATE_EXPECTED_TEST_RESULT straight to commit, skipping the suite-polarity
      # assertion — this stops `fix-unexpected-failing-tests` from firing on the
      # pre-adapter contract red and front-running the dedicated
      # external-system-driver-adapter-implementer. Overrides the `verify-mode:
      # red` inherited from the shared-contract CT-HIGH wrapper (node params win
      # over inherited, run.go); it flows down into implement-and-verify-dsl →
      # implement-test-layer's verify gate.
      - id: IMPLEMENT_AND_VERIFY_DSL
        type: call-activity
        process: implement-and-verify-dsl
        name: "Implement and Verify DSL"
        params:
          task-name: implement-dsl
          verify-mode: none
          # Inert on the none path (no agent prompt consumes them; the gate
          # skips before reading expected-test-result). Retained so the strict
          # ExpandParams in implement-and-verify-dsl → implement-test-layer still
          # resolves the inner ${expected-test-result}/${suite} references.
          expected-test-result: success
          test-category: contract
          suite: contract-real

      - id: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS
        type: call-activity
        process: implement-external-system-driver-adapters
        name: "Implement External System Driver Adapters"

      # Resolve which external system this cycle targets SOLELY from the
      # external-driver-PORT change — interface methods AND its DTOs (the
      # external-system-driver-port layer root → first path segment = <name>),
      # NOT from the driver-adapter files the step above wrote. Those adapter
      # files are legitimately empty on a DTO-only port change, which used to
      # crash IDENTIFY (#65 view-product-list); the port change is the cycle's
      # trigger and is always present (this cycle's entry gate,
      # GATE_EXTERNAL_DRIVER_PORTS_CHANGED, is port-keyed). The source is the
      # preserved external-driver-port-changed-paths set, stashed by
      # validate-outputs-and-scopes when the AT-cascade DSL phase landed the
      # port-changed verdict (plan 20260613-1835). Stamps external-system-name +
      # real-kind into ctx.State for the gate below; an unrecognized / ambiguous
      # name is a hard stop pointing at onboarding (where real-kind is declared).
      # Identity no longer depends on the adapter-impl phase's output, so the
      # old "must run AFTER the driver-adapter impl" rationale (plan 20260606-1356)
      # no longer applies — the node's position is left unchanged regardless.
      - id: IDENTIFY_EXTERNAL_SYSTEM
        type: service-task
        action: identify-external-system
        name: "Identify External System"

      # GREEN-shape: impl edited system source → rebuild and restart
      # before verifying. `system start` brings up both real and stub.
      - id: BUILD_SYSTEM_AFTER_DRIVER
        type: call-activity
        process: build-system
        name: "Build System"

      - id: START_SYSTEM_AFTER_DRIVER
        type: call-activity
        process: start-system-restart
        name: "Start System"

      # Outcome-driven contract-real (plan 20260606-1943, supersedes the
      # real-kind polarity-prediction of plan 20260606-1356). Red/green of a
      # contract-real test is a runtime property of the external system's
      # current state ("is the plumbing there?"), not statically knowable from
      # real-kind. So we PROBE: run the test and branch on the observed
      # `test-outcome`, asserting no expected polarity.
      #   GREEN              → external system already honors the contract
      #                        (echo simulator, pre-existing plumbing, or a
      #                        vendor that already supports it) → stub side.
      #   RED  + simulator   → we own it → implement the simulator → red→green.
      #   RED  + test-instance → we do NOT own it → halt with an upstream/
      #                        provider contract-gap message; never route to
      #                        the code-fixer (it cannot fix a vendor sandbox).
      # real-kind now decides what to do about a red, not whether to expect one.
      - id: PROBE_CONTRACT_REAL
        type: call-activity
        process: run-tests
        name: "Probe External System Contract Tests Against the Real System"
        params:
          suite: contract-real
          # CT-cascade-namespaced (plan 20260608-1231): write-contract-tests
          # lands its list under `ct-test-names`.
          test-names: ${ct-test-names}

      - id: GATE_CONTRACT_REAL_OUTCOME
        type: gateway
        binding: test-outcome
        name: "Contract-Real Outcome?"

      - id: GATE_CONTRACT_REAL_RED_KIND
        type: gateway
        binding: real-kind
        name: "Real Kind?"

      - id: IMPLEMENT_EXTERNAL_SYSTEM_REAL_SIMULATOR
        type: call-activity
        process: implement-external-system-real-simulator
        name: "Implement External System Real Simulator"

      # GREEN-shape: impl edited simulator source → rebuild and restart.
      - id: BUILD_SYSTEM_AFTER_SIMULATOR
        type: call-activity
        process: build-system
        name: "Build System"

      - id: START_SYSTEM_AFTER_SIMULATOR
        type: call-activity
        process: start-system-restart
        name: "Start System"

      - id: VERIFY_TESTS_PASS_CONTRACT_REAL_AFTER_SIMULATOR
        type: call-activity
        process: verify-tests-pass
        name: "Verify External System Contract Tests Pass Against the Real Simulator"
        params:
          suite: contract-real
          test-names: ${ct-test-names}

      # No preceding impl, but the stub system needs to be up for the
      # probe to actually run. `system start` is idempotent.
      - id: START_SYSTEM_BEFORE_STUB_PROBE
        type: call-activity
        process: start-system
        name: "Start System"

      # Outcome-driven contract-stub (plan 20260606-1943). Same disease as
      # contract-real: the WireMock stub echoes the request DTO, so an additive
      # field arrives GREEN where the old fail-verify expected RED. Stubs are
      # always owned, so there is no real-kind branch — a red simply means we
      # have not authored the stub mapping yet.
      #   GREEN → stub already honors the contract → done.
      #   RED   → implement the stubs → red→green.
      - id: PROBE_CONTRACT_STUB
        type: call-activity
        process: run-tests
        name: "Probe External System Contract Tests Against the Stub"
        params:
          suite: contract-stub
          test-names: ${ct-test-names}

      - id: GATE_CONTRACT_STUB_OUTCOME
        type: gateway
        binding: test-outcome
        name: "Contract-Stub Outcome?"

      - id: IMPLEMENT_EXTERNAL_SYSTEM_STUBS
        type: call-activity
        process: implement-external-system-stubs
        name: "Implement External System Stubs"

      # GREEN-shape: impl edited system source → rebuild and restart
      # before verifying.
      - id: BUILD_SYSTEM_AFTER_STUBS
        type: call-activity
        process: build-system
        name: "Build System"

      - id: START_SYSTEM_AFTER_STUBS
        type: call-activity
        process: start-system-restart
        name: "Start System"

      - id: VERIFY_TESTS_PASS_CONTRACT_STUB
        type: call-activity
        process: verify-tests-pass
        name: "Verify External System Contract Tests Pass Against the Stub"
        params:
          suite: contract-stub
          test-names: ${ct-test-names}

      - id: IMPL_EXT_DRIVER_CT_END
        type: end-event
        name: "External System Driver Contract Tests Verified"

      # Shared infra/unknown halts for both outcome gates (mirror
      # verify-tests-pass). A test-runner infra failure or an unrecognised
      # `test-outcome` is never a contract signal — surface it, don't branch.
      - id: TESTS_INFRA_HALT
        type: error-end-event
        name: "Test Runner Infra Failure"

      - id: UNKNOWN_TESTS_OUTCOME
        type: error-end-event
        name: "Unknown Tests Outcome"

      # Contract-real red on a real instance: the vendor/provider has not yet
      # shipped this contract, so it is not fixable in this repo. Halt for a
      # human rather than burning fix-loop passes on code that cannot fix an
      # upstream sandbox. Name doubles as the diagram BPMN label.
      - id: CONTRACT_REAL_UPSTREAM_GAP_HALT
        type: error-end-event
        name: "Contract-Real Red on a Real Instance — upstream/provider has not yet shipped this contract; not fixable in this repo"

    sequence-flows:
      - {from: WRITE_CONTRACT_TESTS,    to: GATE_DSL_PORT_CHANGED}
      - {from: GATE_DSL_PORT_CHANGED,   to: IMPLEMENT_AND_VERIFY_DSL,                     when: "ct-dsl-port-changed == true"}
      - {from: GATE_DSL_PORT_CHANGED,   to: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS,    when: "ct-dsl-port-changed == false"}
      - {from: IMPLEMENT_AND_VERIFY_DSL,                  to: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_DRIVER_ADAPTERS, to: IDENTIFY_EXTERNAL_SYSTEM}
      - {from: IDENTIFY_EXTERNAL_SYSTEM,                  to: BUILD_SYSTEM_AFTER_DRIVER}
      - {from: BUILD_SYSTEM_AFTER_DRIVER,                 to: START_SYSTEM_AFTER_DRIVER}
      - {from: START_SYSTEM_AFTER_DRIVER,                 to: PROBE_CONTRACT_REAL}
      # Probe, then branch on the observed outcome — no expected polarity.
      - {from: PROBE_CONTRACT_REAL,                       to: GATE_CONTRACT_REAL_OUTCOME}
      # GREEN: external system already honors the contract → straight to stub side.
      - {from: GATE_CONTRACT_REAL_OUTCOME,                to: START_SYSTEM_BEFORE_STUB_PROBE,    when: "test-outcome == pass"}
      # RED: decide what to do about it from real-kind.
      - {from: GATE_CONTRACT_REAL_OUTCOME,                to: GATE_CONTRACT_REAL_RED_KIND,       when: "test-outcome == fail"}
      - {from: GATE_CONTRACT_REAL_OUTCOME,                to: TESTS_INFRA_HALT,                  when: "test-outcome == infra"}
      - {from: GATE_CONTRACT_REAL_OUTCOME,                to: UNKNOWN_TESTS_OUTCOME}
      # simulator: we own it → implement → rebuild/restart → GREEN → stub side.
      - {from: GATE_CONTRACT_REAL_RED_KIND,               to: IMPLEMENT_EXTERNAL_SYSTEM_REAL_SIMULATOR, when: "real-kind == simulator"}
      # test-instance: we do not own it → upstream contract gap, hard halt.
      - {from: GATE_CONTRACT_REAL_RED_KIND,               to: CONTRACT_REAL_UPSTREAM_GAP_HALT,   when: "real-kind == test-instance"}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_REAL_SIMULATOR,  to: BUILD_SYSTEM_AFTER_SIMULATOR}
      - {from: BUILD_SYSTEM_AFTER_SIMULATOR,              to: START_SYSTEM_AFTER_SIMULATOR}
      - {from: START_SYSTEM_AFTER_SIMULATOR,              to: VERIFY_TESTS_PASS_CONTRACT_REAL_AFTER_SIMULATOR}
      - {from: VERIFY_TESTS_PASS_CONTRACT_REAL_AFTER_SIMULATOR, to: START_SYSTEM_BEFORE_STUB_PROBE}
      - {from: START_SYSTEM_BEFORE_STUB_PROBE,            to: PROBE_CONTRACT_STUB}
      # Probe the stub, then branch on the observed outcome.
      - {from: PROBE_CONTRACT_STUB,                       to: GATE_CONTRACT_STUB_OUTCOME}
      # GREEN: stub already honors the contract → done.
      - {from: GATE_CONTRACT_STUB_OUTCOME,                to: IMPL_EXT_DRIVER_CT_END,            when: "test-outcome == pass"}
      # RED: implement the stubs → rebuild/restart → GREEN.
      - {from: GATE_CONTRACT_STUB_OUTCOME,                to: IMPLEMENT_EXTERNAL_SYSTEM_STUBS,   when: "test-outcome == fail"}
      - {from: GATE_CONTRACT_STUB_OUTCOME,                to: TESTS_INFRA_HALT,                  when: "test-outcome == infra"}
      - {from: GATE_CONTRACT_STUB_OUTCOME,                to: UNKNOWN_TESTS_OUTCOME}
      - {from: IMPLEMENT_EXTERNAL_SYSTEM_STUBS,           to: BUILD_SYSTEM_AFTER_STUBS}
      - {from: BUILD_SYSTEM_AFTER_STUBS,                  to: START_SYSTEM_AFTER_STUBS}
      - {from: START_SYSTEM_AFTER_STUBS,                  to: VERIFY_TESTS_PASS_CONTRACT_STUB}
      - {from: VERIFY_TESTS_PASS_CONTRACT_STUB,           to: IMPL_EXT_DRIVER_CT_END}

  # Parameterised system impl: the caller picks the MID agent task by
  # supplying `action`. Two known callers today —
  # `change-system-behavior` passes `implement-system`,
  # `refactor-system-structure` passes `refactor-system`. The templated
  # `process: ${action}` resolves at dispatch time (runtime support
  # added by Item 2 of this plan).
  implement-and-verify-system:
    name: "Implement and Verify System"
    start: RUN_ACTION
    nodes:
      - id: RUN_ACTION
        type: call-activity
        process: ${action}
        name: "Run the Configured Agent"

      - id: BUILD_SYSTEM
        type: call-activity
        process: build-system
        name: "Build the System"

      - id: START_SYSTEM
        type: call-activity
        process: start-system-restart
        name: "Start the System"

      - id: VERIFY_TESTS_PASS
        type: call-activity
        process: verify-tests-pass
        name: "Verify Tests Pass"
        # Scope is caller-bound. Behavioral cycles (`change-system-behavior`)
        # narrow to the RED writing-agent's just-emitted `test-names` under
        # `suite: acceptance` — the GREEN proof that the new AT passes,
        # without paying for a full regression on every story / bug. Structural
        # cycles (`redesign-*`, `refactor-system-structure`) bind both to ""
        # to mean full regression, which is the only meaningful verification
        # that a behavior-preserving change preserved all tests. Strict-mode
        # `ExpandParams` (run.go:334) rejects an unresolved `${suite}` /
        # `${test-names}` at dispatch, so every caller MUST bind both — see
        # the strict-mode rule on `run-tests` (process-flow.yaml:1991).
        params:
          suite: ${suite}
          test-names: ${test-names}

      - id: COMMIT_SYSTEM
        type: call-activity
        process: commit
        name: "Commit System Changes"
        params:
          # prod-commit tier: persists production-code work.
          category: prod-commit
          layer: "SYSTEM"

      - id: IMPL_AND_VERIFY_SYSTEM_END
        type: end-event
        name: "System Implemented and Verified"

    sequence-flows:
      - {from: RUN_ACTION, to: BUILD_SYSTEM}
      - {from: BUILD_SYSTEM,      to: START_SYSTEM}
      - {from: START_SYSTEM,      to: VERIFY_TESTS_PASS}
      - {from: VERIFY_TESTS_PASS, to: COMMIT_SYSTEM}
      - {from: COMMIT_SYSTEM,     to: IMPL_AND_VERIFY_SYSTEM_END}

  refactor-and-verify-tests:
    name: "Refactor and Verify Tests"
    start: REFACTOR_TESTS
    nodes:
      - id: REFACTOR_TESTS
        type: call-activity
        process: refactor-tests
        name: "Refactor Tests"

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests
        name: "Compile Tests"

      # RED writes tests, not system source — start-only (no BUILD_SYSTEM).
      # `system start` is idempotent and lazy-builds the image when missing.
      - id: START_SYSTEM
        type: call-activity
        process: start-system
        name: "Start System"

      - id: VERIFY_TESTS_PASS
        type: call-activity
        process: verify-tests-pass
        name: "Verify Tests Pass"
        # See `implement-and-verify-system` for the rationale — both
        # `suite: ""` and `test-names: ""` must be bound explicitly to
        # prevent ExpandParams' state-fallback from leaking either an
        # outer `${suite}` placeholder or the stale per-cycle `test-names`
        # output from the upstream RED writing agent into the CLI.
        params:
          suite: ""
          test-names: ""

      - id: COMMIT_TESTS
        type: call-activity
        process: commit
        name: "Commit Test Changes"
        params:
          # test-commit tier: persists the refactored test contract.
          category: test-commit
          layer: "TESTS"

      - id: REFACTOR_AND_VERIFY_TESTS_END
        type: end-event
        name: "Tests Refactored and Verified"

    sequence-flows:
      - {from: REFACTOR_TESTS,    to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,     to: START_SYSTEM}
      - {from: START_SYSTEM,      to: VERIFY_TESTS_PASS}
      - {from: VERIFY_TESTS_PASS, to: COMMIT_TESTS}
      - {from: COMMIT_TESTS,      to: REFACTOR_AND_VERIFY_TESTS_END}

  # Shared cascade for any test-layer impl that follows the "agent runs,
  # then compile / verify / commit" rhythm. Called by every
  # `implement-and-verify-*-driver-adapters` and by `implement-and-verify-
  # dsl`. Branches on `expected-test-result` (success → verify-tests-pass;
  # failure → verify-tests-fail). Note that `commit` runs unconditionally —
  # the gateway is on the verify shape, not on whether to commit. WIP
  # acceptance tests carry a permanent env-var gate the orchestrator lifts
  # at verify time, so no enable/disable step is needed between layers.
  implement-test-layer:
    name: "Implement Test Layer"
    start: RUN_ACTION
    nodes:
      - id: RUN_ACTION
        type: call-activity
        process: ${action}
        name: "Run the Configured Agent"

      - id: COMPILE_TESTS
        type: call-activity
        process: compile-tests
        name: "Compile Tests"

      # RED writes tests, not system source — start-only (no BUILD_SYSTEM).
      # `system start` is idempotent and lazy-builds the image when missing.
      - id: START_SYSTEM
        type: call-activity
        process: start-system
        name: "Start System"

      # Mode-aware verify gate (plan 20260606-1518) — shared by the DSL layer
      # (verify-pending-on: drivers) and the system-driver adapter layer
      # (verify-pending-on: none). Change path (verify-mode red/unset) routes on
      # the pinned expected-test-result verbatim; cover path returns success iff
      # this layer's plumbing scope reports nothing pending. Compile-only path
      # (verify-mode: none, plan 20260606-2330) returns `none` and routes
      # straight to COMMIT_LAYER — neither VERIFY_TESTS_* node runs, so the
      # layer's suite polarity is never asserted here (the CT-HIGH DSL/port step
      # defers contract-real red/green to PROBE_CONTRACT_REAL, post-adapters).
      # START_SYSTEM still ran above on the none path — intentional: it is
      # idempotent and warms the system for the downstream adapter-impl + PROBE.
      - id: GATE_EXPECTED_TEST_RESULT
        type: gateway
        binding: at-verify-expectation
        name: "Expected Test Result?"

      - id: VERIFY_TESTS_PASS_FILTERED
        type: call-activity
        process: verify-tests-pass
        name: "Verify Tests Pass"
        params:
          suite: ${suite}
          test-names: ${test-names}

      - id: VERIFY_TESTS_FAIL_FILTERED
        type: call-activity
        process: verify-tests-fail
        name: "Verify Tests Fail"
        params:
          suite: ${suite}
          test-names: ${test-names}

      - id: COMMIT_LAYER
        type: call-activity
        process: commit
        name: "Commit Layer Changes"
        params:
          # test-commit tier: implement-test-layer commits test work.
          category: test-commit
          layer: ${layer}

      - id: IMPLEMENT_TEST_LAYER_END
        type: end-event
        name: "Test Layer Implemented"

      - id: UNKNOWN_EXPECTED_TEST_RESULT
        type: error-end-event
        name: "Unknown Expected Test Result"

    sequence-flows:
      - {from: RUN_ACTION, to: COMPILE_TESTS}
      - {from: COMPILE_TESTS,     to: START_SYSTEM}
      - {from: START_SYSTEM,      to: GATE_EXPECTED_TEST_RESULT}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_PASS_FILTERED, when: "at-verify-expectation == success"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: VERIFY_TESTS_FAIL_FILTERED, when: "at-verify-expectation == failure"}
      # Compile-only layer (plan 20260606-2330): skip both VERIFY_TESTS_* nodes
      # and commit directly. The suite's red/green is asserted elsewhere.
      - {from: GATE_EXPECTED_TEST_RESULT, to: COMMIT_LAYER, when: "at-verify-expectation == none"}
      - {from: GATE_EXPECTED_TEST_RESULT, to: UNKNOWN_EXPECTED_TEST_RESULT}
      - {from: VERIFY_TESTS_PASS_FILTERED, to: COMMIT_LAYER}
      - {from: VERIFY_TESTS_FAIL_FILTERED, to: COMMIT_LAYER}
      - {from: COMMIT_LAYER,               to: IMPLEMENT_TEST_LAYER_END}

  # Run tests under `suite` / `test-names`; on FAIL, dispatch
  # `fix-unexpected-failing-tests`. Caller passes both params (or omits
  # to run all tests).
  verify-tests-pass:
    name: "Verify Tests Pass"
    start: RUN_TESTS
    nodes:
      - id: RUN_TESTS
        type: call-activity
        process: run-tests
        name: "Run Tests"
        params:
          suite: ${suite}
          test-names: ${test-names}

      - id: GATE_TESTS_OUTCOME
        type: gateway
        binding: test-outcome
        name: "Test Outcome?"

      - id: FIX_UNEXPECTED_FAILING_TESTS
        type: call-activity
        process: fix-unexpected-failing-tests
        name: "Fix Unexpected Test Failures"
        # Semantic fix-attempt cap (plan 20260530-1339). After 2 fix passes
        # the tests are still failing — a third opus·high pass rarely
        # resolves a genuine SUT/spec disagreement, so halt for a human
        # before spending it. The FIX_* -> RUN_TESTS back-edge stays; the
        # cap intercepts on the 3rd arrival, before re-dispatch. Layered
        # under the engine-wide maxDispatchesPerProcess backstop.
        max-visits: 2
        on-max-visits: FIX_LOOP_EXHAUSTED

      - id: VERIFY_PASS_END
        type: end-event
        name: "Tests Pass Verified"

      - id: TESTS_INFRA_HALT
        type: error-end-event
        name: "Test Runner Infra Failure"

      - id: UNKNOWN_TESTS_OUTCOME
        type: error-end-event
        name: "Unknown Tests Outcome"

      # Halt target for the fixer-retry cap. The FIX path here is reached
      # via a failing test run, so the last verify output is fresh in
      # ctx.State (verify_failure_output) and the driver surfaces it with the
      # halt — the human reviews it to adjudicate. Name is the concise
      # headline (it doubles as the diagram BPMN label).
      - id: FIX_LOOP_EXHAUSTED
        type: error-end-event
        name: "Fix Loop Exhausted — failing tests still red after 2 fix attempts (review the last test output; adjudicate system code vs. test)"

    sequence-flows:
      - {from: RUN_TESTS,          to: GATE_TESTS_OUTCOME}
      - {from: GATE_TESTS_OUTCOME, to: VERIFY_PASS_END,              when: "test-outcome == pass"}
      - {from: GATE_TESTS_OUTCOME, to: FIX_UNEXPECTED_FAILING_TESTS, when: "test-outcome == fail"}
      - {from: GATE_TESTS_OUTCOME, to: TESTS_INFRA_HALT,             when: "test-outcome == infra"}
      - {from: GATE_TESTS_OUTCOME, to: UNKNOWN_TESTS_OUTCOME}
      - {from: FIX_UNEXPECTED_FAILING_TESTS, to: RUN_TESTS}

  # Inverted: run tests under suite/test-names; on PASS, dispatch
  # `fix-unexpected-passing-tests`.
  verify-tests-fail:
    name: "Verify Tests Fail"
    start: RUN_TESTS
    nodes:
      - id: RUN_TESTS
        type: call-activity
        process: run-tests
        name: "Run Tests"
        params:
          suite: ${suite}
          test-names: ${test-names}

      - id: GATE_TESTS_OUTCOME
        type: gateway
        binding: test-outcome
        name: "Test Outcome?"

      - id: FIX_UNEXPECTED_PASSING_TESTS
        type: call-activity
        process: fix-unexpected-passing-tests
        name: "Fix Unexpectedly Passing Tests"
        # Semantic fix-attempt cap (plan 20260530-1339) — mirror of the
        # verify-tests-pass loop. After 2 fix passes the must-fail tests
        # are still green; halt for a human before a third opus·high pass.
        # Back-edge stays; cap intercepts on the 3rd arrival.
        max-visits: 2
        on-max-visits: FIX_LOOP_EXHAUSTED

      - id: VERIFY_FAIL_END
        type: end-event
        name: "Tests Fail Verified"

      - id: TESTS_INFRA_HALT
        type: error-end-event
        name: "Test Runner Infra Failure"

      - id: UNKNOWN_TESTS_OUTCOME
        type: error-end-event
        name: "Unknown Tests Outcome"

      # Halt target for the fixer-retry cap. ASYMMETRIC with the
      # verify-tests-pass twin: the FIX path here is reached via an
      # unexpectedly PASSING run, on which runCommand Unsets
      # verify_failure_output (a passing run has no failure output). So there
      # is no verify tail to surface — the name is authored self-contained
      # from the attempt count + the must-fail-still-green framing.
      - id: FIX_LOOP_EXHAUSTED
        type: error-end-event
        name: "Fix Loop Exhausted — must-fail tests still green after 2 fix attempts (no failure output exists; adjudicate system behaviour vs. test expectation)"

    sequence-flows:
      - {from: RUN_TESTS,          to: GATE_TESTS_OUTCOME}
      - {from: GATE_TESTS_OUTCOME, to: FIX_UNEXPECTED_PASSING_TESTS, when: "test-outcome == pass"}
      - {from: GATE_TESTS_OUTCOME, to: VERIFY_FAIL_END,              when: "test-outcome == fail"}
      - {from: GATE_TESTS_OUTCOME, to: TESTS_INFRA_HALT,             when: "test-outcome == infra"}
      - {from: GATE_TESTS_OUTCOME, to: UNKNOWN_TESTS_OUTCOME}
      - {from: FIX_UNEXPECTED_PASSING_TESTS, to: RUN_TESTS}

  write-acceptance-tests:
    name: "Write Acceptance Tests"
    start: EXECUTE_AGENT
    # Output contract — declared on the MID so the dispatcher can derive
    # both the GH_OPTIVEM_OUTPUT_KEYS env var (write-time CLI allow-list)
    # and the validate-outputs-and-scopes presence-check from one source.
    # Optional keys are absence-tolerated. scope-exception-* ride the
    # same channel; the scope_exception_requested gate consumes them
    # from ctx.State after the run.
    outputs:
      - key: dsl-port-changed
        type: bool
      - key: test-names
        type: string-list
        optional: true
      - key: scope-exception-files
        type: string-list
        optional: true
      - key: scope-exception-reason
        type: string
        optional: true
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: write-acceptance-tests
          agent: acceptance-test-writer
          # test-agent tier: writing tests is the test-contract step.
          category: test-agent
        read:  [at-test, dsl-port]
        write: [at-test, dsl-port, dsl-core]
        scope-rationale: |
          dsl-core is write-only because the test-writer appends `TODO: DSL`
          stubs there so the project compiles; reading existing dsl-core
          content would leak implementation context into test design.

      - id: WAT_END
        type: end-event
        name: "Acceptance Tests Written"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: WAT_END}

  write-contract-tests:
    name: "Write External System Contract Tests"
    start: EXECUTE_AGENT
    outputs:
      - key: dsl-port-changed
        type: bool
      - key: test-names
        type: string-list
        optional: true
      - key: scope-exception-files
        type: string-list
        optional: true
      - key: scope-exception-reason
        type: string
        optional: true
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: write-contract-tests
          agent: contract-test-writer
          # test-agent tier: writing tests is the test-contract step.
          category: test-agent
        read:  [ct-test, dsl-port]
        write: [ct-test, dsl-port, dsl-core]
        scope-rationale: |
          dsl-core is write-only because the test-writer appends `TODO: DSL`
          stubs there so the project compiles; reading existing dsl-core
          content would leak implementation context into test design.

      - id: WCT_END
        type: end-event
        name: "External System Contract Tests Written"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: WCT_END}

  implement-dsl:
    name: "Implement DSL"
    start: EXECUTE_AGENT
    outputs:
      - key: system-driver-port-changed
        type: bool
      - key: external-driver-port-changed
        type: bool
      - key: scope-exception-files
        type: string-list
        optional: true
      - key: scope-exception-reason
        type: string
        optional: true
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-dsl
          agent: dsl-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        # Adapters are in scope because dsl-implementer adds throwing-TODO
        # stub bodies in the impl classes whenever it adds a new method
        # signature to a port (interfaces hold signatures only).
        # implement-{system,external-system}-driver-adapters then replaces
        # those stubs with real impls in the downstream cascade.
        read:  [dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter]
        write: [dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter]

      - id: IMPL_DSL_END
        type: end-event
        name: "DSL Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_DSL_END}

  # Asymmetric: reads the full system-test layer (the failing AT, its
  # contracts, the DSL it speaks, the driver port/adapter pair and the
  # external-system driver pair the AT may stage) so the agent can see
  # *what* behaviour to implement. Writes system-path plus
  # system-db-migration-path — when the AT asserts persisted state the
  # agent must add a Flyway-style migration alongside the production code
  # so the column exists when the test runs. Other layer changes still
  # require a scope_exception.
  #
  # system-db-migration-path is shared infrastructure: a single
  # Flyway-ordered tree under `system/db/migrations` consumed by every
  # SUT (3 langs × 2 archs) via a Flyway sidecar — sibling of
  # system/monolith/ and system/multitier/, not a child of either.
  # Every architecture/language combo writes into the same migration
  # set; the asymmetry is intentional (schema is architecture- and
  # language-agnostic).
  implement-system:
    name: "Implement System"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-system
          agent: system-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter, system-path, system-db-migration-path]
        write: [system-path, system-db-migration-path]

      - id: IMPL_SYS_END
        type: end-event
        name: "System Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_SYS_END}

  # Reshape variant of implement-system (plan 20260526-1448 Item 10 verb
  # split). Dispatched by redesign-system-structure CYCLE via the
  # parameterised implement-and-verify-system HIGH with
  # `action: update-system`. Reads system-driver-port (must see what must not
  # change) and system-driver-adapter (the absorbing layer) on top of system-path;
  # writes system-path + system-driver-adapter + system-db-migration-path —
  # reshapes that need a schema change (e.g. extracting a column into a
  # join table) carry the migration alongside the code change in the same
  # dispatch (system-driver-port writes still require a scope_exception). See
  # `implement-system` above for the rationale on
  # `system-db-migration-path` being a shared, arch/lang-agnostic layer.
  update-system:
    name: "Update System"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: update-system
          agent: system-updater
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [system-path, system-driver-adapter, system-driver-port, system-db-migration-path]
        write: [system-path, system-driver-adapter, system-db-migration-path]

      - id: UPDATE_SYS_END
        type: end-event
        name: "System Updated"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: UPDATE_SYS_END}

  # Asymmetric: the agent reads system-driver-port to see what to implement but
  # cannot write to it from this task — system-driver-port edits require a
  # scope_exception. The inline "Driver-port guardrail" prose in the prompt
  # body collapses into scope (plan 20260526-1448 Item 3 + Item 11 Case B).
  implement-system-driver-adapters:
    name: "Implement System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-system-driver-adapters
          agent: system-driver-adapter-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [system-driver-port, system-driver-adapter, system-driver-adapter-shared]
        # This node is shared: UnrollSystemDriverAdapterChannels clones it
        # once per channel (binding a `channel` param). The scope checker
        # (validate-outputs-and-scopes) narrows this whole-layer write down
        # to that channel's configured member when a `channel` param is
        # present, so a per-channel dispatch can only write its own folder.
        # A no-`channels:` full run carries no param and keeps the whole layer.
        # system-driver-adapter-shared is the test-transport foundation
        # (driver/adapter/shared); it is NOT narrowed by channel (the
        # narrower rewrites only the exact system-driver-adapter entry), so
        # every per-channel dispatch can extend the shared foundation.
        write: [system-driver-adapter, system-driver-adapter-shared]

      - id: IMPL_SYS_DA_END
        type: end-event
        name: "System Driver Adapters Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_SYS_DA_END}

  # Reshape variant of implement-system-driver-adapters (plan 20260526-1448
  # Item 10 verb split). Dispatched by redesign-system-structure CYCLE.
  # Same asymmetric scope as the implement variant — system-driver-port is
  # read-only here; reshape writes land in system-driver-adapter.
  update-system-driver-adapters:
    name: "Update System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: update-system-driver-adapters
          agent: system-driver-adapter-updater
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [system-driver-port, system-driver-adapter, system-driver-adapter-shared]
        write: [system-driver-adapter, system-driver-adapter-shared]

      - id: UPDATE_SYS_DA_END
        type: end-event
        name: "System Driver Adapters Updated"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: UPDATE_SYS_DA_END}

  # Same asymmetry as implement-system-driver-adapters (external side).
  implement-external-system-driver-adapters:
    name: "Implement External System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-external-system-driver-adapters
          agent: external-system-driver-adapter-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        # system-driver-adapter-shared: an external system with no API can only
        # be driven via Playwright, and the HTTP wrappers under
        # driver/adapter/shared are shared across api + every external adapter,
        # so external adapter implementers read and extend the foundation too.
        read:  [external-system-driver-port, external-system-driver-adapter, system-driver-adapter-shared]
        write: [external-system-driver-adapter, system-driver-adapter-shared]

      - id: IMPL_EXT_DA_END
        type: end-event
        name: "External System Driver Adapters Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_EXT_DA_END}

  # Reshape variant of implement-external-system-driver-adapters (plan
  # 20260526-1448 Item 10 verb split). Dispatched by
  # redesign-external-system-structure CYCLE. Same asymmetric scope as
  # the implement variant — external-system-driver-port is read-only
  # here; reshape writes land in external-system-driver-adapter.
  update-external-system-driver-adapters:
    name: "Update External System Driver Adapters"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: update-external-system-driver-adapters
          agent: external-system-driver-adapter-updater
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [external-system-driver-port, external-system-driver-adapter, system-driver-adapter-shared]
        write: [external-system-driver-adapter, system-driver-adapter-shared]

      - id: UPDATE_EXT_DA_END
        type: end-event
        name: "External System Driver Adapters Updated"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: UPDATE_EXT_DA_END}

  implement-external-system-stubs:
    name: "Implement External System Stubs"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-external-system-stubs
          agent: external-system-stub-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        # External stub clients sit on the shared HTTP/WireMock transport
        # (e.g. TaxStubClient imports shared.client.http / shared.client.wiremock),
        # so the stub implementer reads and may extend the shared foundation.
        read:  [external-system-driver-adapter, system-driver-adapter-shared]
        write: [external-system-driver-adapter, system-driver-adapter-shared]

      - id: IMPL_STUBS_END
        type: end-event
        name: "External System Stubs Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_STUBS_END}

  # Mirror of implement-external-system-stubs for the simulator-backed real
  # side (plan 20260606-1356). Teaches the simulator we author the new
  # contract so contract-real goes GREEN. Same Family B scope key as the stub
  # MID (external-system-driver-adapter — fork #2): the scope mechanism only
  # understands Family B path keys, and a faithful mirror of the stub MID
  # writes there.
  implement-external-system-real-simulator:
    name: "Implement External System Real Simulator"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: implement-external-system-real-simulator
          agent: external-system-real-simulator-implementer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        # Faithful mirror of implement-external-system-stubs: the simulator-backed
        # real side likewise sits on the shared HTTP transport, so it reads and
        # may extend the shared foundation (kept in lockstep with the stub MID).
        read:  [external-system-driver-adapter, system-driver-adapter-shared]
        write: [external-system-driver-adapter, system-driver-adapter-shared]

      - id: IMPL_REAL_SIM_END
        type: end-event
        name: "External System Real Simulator Implemented"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: IMPL_REAL_SIM_END}

  # The fix agent has no a-priori knowledge of which layer is wrong, so
  # the scope is the union of every layer below system-test-path plus
  # system-path itself.
  fix-unexpected-passing-tests:
    name: "Fix Unexpected Passing Tests"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: fix-unexpected-passing-tests
          agent: unexpected-passing-tests-fixer
          # human tier: fix-flow dispatch — signals upstream defect, never bypassable.
          category: human
        read:  [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter, system-path]
        write: [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter, system-path]

      - id: FIX_PASS_END
        type: end-event
        name: "Unexpected Passing Tests Fixed"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: FIX_PASS_END}

  # Same every-layer scope as fix-unexpected-passing-tests (the fix agent
  # doesn't know which layer is wrong).
  fix-unexpected-failing-tests:
    name: "Fix Unexpected Failing Tests"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: fix-unexpected-failing-tests
          agent: unexpected-failing-tests-fixer
          # human tier: fix-flow dispatch — signals upstream defect, never bypassable.
          category: human
        read:  [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter, system-path]
        write: [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter, system-path]

      - id: FIX_FAIL_END
        type: end-event
        name: "Unexpected Failing Tests Fixed"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: FIX_FAIL_END}

  # Test refactor never touches production code — no system-path in scope.
  refactor-tests:
    name: "Refactor Tests"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: refactor-tests
          agent: test-refactorer
          # test-agent tier: edits the test contract.
          category: test-agent
        read:  [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter]
        write: [at-test, ct-test, dsl-port, dsl-core, system-driver-port, system-driver-adapter, external-system-driver-port, external-system-driver-adapter]

      - id: REFACTOR_TESTS_END
        type: end-event
        name: "Tests Refactored"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFACTOR_TESTS_END}

  # Reads system-db-migration-path so the agent can see the current
  # schema (column names, types, NOT NULL constraints) when refactoring
  # the production code that talks to it, but cannot write to it from
  # this phase. Pure refactors don't change schema by definition; a
  # refactor that needs a schema change (e.g. a column rename) is the
  # trigger for a new ticket dispatched via a behavior-change verb
  # (implement-system / update-system), not a write authority widening
  # here.
  refactor-system:
    name: "Refactor System"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: refactor-system
          agent: system-refactorer
          # prod-agent tier: production-code writing agent.
          category: prod-agent
        read:  [system-path, system-db-migration-path]
        write: [system-path]

      - id: REFACTOR_SYS_END
        type: end-event
        name: "System Refactored"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFACTOR_SYS_END}

  # Artifact-only: rewrites the ticket's parsed acceptance criteria in the
  # tracker, never the repo working tree. `scope: none` is the doctrinal
  # exemption from inline read/write (see runtime/shared/scope.md and
  # Engine.IsScopeNone). Plan 20260526-1448 Item 9 moved the SSoT here
  # from the prompt frontmatter.
  refine-acceptance-criteria:
    name: "Refine Acceptance Criteria"
    start: EXECUTE_AGENT
    nodes:
      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          task-name: refine-acceptance-criteria
          agent: acceptance-criteria-refiner
          # human tier: always-engage contract step.
          category: human
        scope: none

      - id: REFINE_AC_END
        type: end-event
        name: "Acceptance Criteria Refined"

    sequence-flows:
      - {from: EXECUTE_AGENT, to: REFINE_AC_END}

  compile-tests:
    name: "Compile Tests"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem test compile"
          # command tier: cheap, no AI cost, no global state mutation.
          category: command

      - id: COMPILE_TESTS_END
        type: end-event
        name: "Tests Compiled"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMPILE_TESTS_END}

  build-system:
    name: "Build System"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem system build"
          # command tier: cheap, no AI cost, no global state mutation.
          category: command

      - id: BUILD_SYS_END
        type: end-event
        name: "System Built"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: BUILD_SYS_END}

  # `start-system` vs `start-system-restart` is a binary semantic split, not
  # a parameterised flag — the BPMN engine has no per-param defaulting, so
  # the "do I restart?" decision lives in the process name.
  #
  # `start-system` — `runner.Up` short-circuits with the "already running,
  # skipping restart" optimisation when the system is healthy
  # (`internal/runner/system.go:131`). Correct for callers that run *before*
  # a system build (RED-side test-write phases, pre-verify safety calls).
  #
  # `start-system-restart` — callers that run *after* `build-system` MUST
  # use this variant to force `runner.Up` to tear down the stale container
  # and bring up the freshly-built image. Without `--restart`, `Up` skips
  # the restart, the new image is never instantiated, and the verify step
  # runs against the stale container — every test then exercises pre-build
  # code and the orchestrator mis-routes the resulting failures to
  # `fix-unexpected-failing-tests`.
  #
  # Current restart-required callers (all dispatch `start-system-restart`):
  #
  #   - `implement-and-verify-system` — `START_SYSTEM` after `BUILD_SYSTEM`.
  #   - `implement-and-verify-external-system-driver-adapters-contract-tests`
  #     — `START_SYSTEM_AFTER_DRIVER` after `BUILD_SYSTEM_AFTER_DRIVER`.
  #   - Same process — `START_SYSTEM_AFTER_SIMULATOR` after `BUILD_SYSTEM_AFTER_SIMULATOR`.
  #   - Same process — `START_SYSTEM_AFTER_STUBS` after `BUILD_SYSTEM_AFTER_STUBS`.
  start-system:
    name: "Start System"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem system start"
          # command tier: cheap, no AI cost, no global state mutation.
          category: command

      - id: START_SYS_END
        type: end-event
        name: "System Started"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: START_SYS_END}

  start-system-restart:
    name: "Start System (Restart)"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem system start --restart"
          # command tier: cheap, no AI cost, no global state mutation.
          category: command

      - id: START_SYS_RESTART_END
        type: end-event
        name: "System Restarted"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: START_SYS_RESTART_END}

  # The message is constructed here, not at each call site: `preResolveIssue`
  # seeds `ticket-id` and `issue-title` into ctx.State at run startup (before
  # any COMMIT_* caller runs), so the same `#<id> <title>` resolves
  # deterministically for every commit inside one ticket's workflow. Using
  # `#` rather than `[` makes the id auto-link to the GitHub issue in
  # commit listings and PR views.
  #
  # `--yes` is required because the orchestrator drives commit non-
  # interactively (the BPMN approval gate lives upstream of this dispatch,
  # not inside `gh optivem commit` itself); `--include-untracked` is
  # required because writer agents create new files that `--yes`
  # alone would refuse to stage.
  commit:
    name: "Commit"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem commit --yes --include-untracked"
          message: "#${ticket-id} ${issue-title} - ${layer}"
          # Threaded from the commit-process caller (prod-commit or
          # test-commit), so the inner execute-command's approve gate
          # resolves at the caller's commit tier, not as `command`.
          category: ${category}

      - id: COMMIT_MID_END
        type: end-event
        name: "Commit Complete"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: COMMIT_MID_END}

  # Exact-name verify params: `suite` pins the test category
  # (`acceptance` / `contract-real` / `contract-stub`) and `test-names`
  # carries the writer-agent's emitted bare method names, joined as a
  # comma-separated string by `coerceStateValue`'s `[]string` case.
  # Both absent ⇒ run all tests. The underlying `execute-command`
  # appends `--suite=…` / `--test=…` flags to the `gh optivem test run`
  # CLI, which owns the actual filter parsing.
  #
  # Strict-mode rule: every caller MUST resolve `suite` and `test-names`
  # — either by binding them explicitly at the call site (use `""` to
  # mean "all"), or by ensuring an upstream writing-agent stashed them
  # in state before the call. Omitting both is no longer accepted: the
  # `ExpandParams` strict check rejects unresolved `${suite}` /
  # `${test-names}` at dispatch with a precise error rather than letting
  # the literal leak into the rendered CLI as `--suite='${suite}'`.
  run-tests:
    name: "Run Tests"
    start: EXECUTE_COMMAND
    nodes:
      - id: EXECUTE_COMMAND
        type: call-activity
        process: execute-command
        name: "Dispatch the Command"
        params:
          command: "gh optivem test run"
          suite: ${suite}
          test-names: ${test-names}
          # command tier: cheap, no AI cost, no global state mutation.
          category: command
          # Disable the inner execute-command FIX branch. The callers
          # (`verify-tests-pass`, `verify-tests-fail`) route on
          # `test-outcome` and dispatch their own specialised fix
          # processes (fix-unexpected-failing-tests /
          # fix-unexpected-passing-tests). Leaving execute-command's
          # FIX enabled would intercept every non-zero exit before the
          # outer `test-outcome` gate ever evaluated — including the
          # expected-failure case in verify-tests-fail, which would
          # mis-route to FIX instead of VERIFY_FAIL_END.
          fix-on-failure: "false"

      - id: RUN_TESTS_END
        type: end-event
        name: "Tests Run"

    sequence-flows:
      - {from: EXECUTE_COMMAND, to: RUN_TESTS_END}

  # Confirms approval; writes outcome to `approval-outcome` state for the
  # caller to read. Q3 = A (exit-only; caller owns NO branch).
  #
  # Both branches terminate via plain `end-event` rather than
  # `error-end-event` — the latter would propagate as a Go error all the
  # way up through every parent process, which is too coarse for a
  # human-driven NO ("I'd rather not run this fix") that the operator
  # wants to surface as a graceful abort, not a stack-traced failure.
  #
  # `wrapCallActivity` (statemachine/run.go) push/pops Params but leaves
  # State shared with the caller, so `approval-outcome` flows back to the
  # caller's scope. Every caller (`fix`, `execute-agent`, `execute-command`)
  # therefore follows its `APPROVE_PRE` call-activity with a
  # `GATE_APPROVED_PRE` gateway on `approval-outcome` that routes the
  # rejected branch to a dedicated `*_REJECTED_END` end-event. Without
  # that caller-side gate the unconditional out-edge would silently fall
  # through to the next node — the exact bug that motivated this
  # arrangement (rejecting `fix` still ran the inner agent).
  #
  # `execute-agent`'s APPROVE_POST is the one exception to the "rejection
  # is a soft-skip" pattern: it gates on `approval-outcome` like every
  # other approve site but routes the rejected branch to an
  # `error-end-event` rather than a plain end-event, so the entire run
  # halts. Rationale lives at the gate (search for
  # `EXECUTE_AGENT_OUTPUT_REJECTED_END`): POST rejection means "the
  # agent's output is broken, don't accept it," and letting the caller
  # continue would propagate broken artifacts through every downstream
  # phase.
  approve:
    name: "Approve"
    start: ASK_HUMAN
    nodes:
      - id: ASK_HUMAN
        type: user-task
        agent: human
        name: "${question}"

      - id: GATE_APPROVED
        type: gateway
        binding: approval-outcome
        name: "Approval Outcome?"

      - id: APPROVE_OK_END
        type: end-event
        name: "Approved"

      - id: APPROVE_REJECT_END
        type: end-event
        name: "Rejected"

    sequence-flows:
      - {from: ASK_HUMAN,     to: GATE_APPROVED}
      - {from: GATE_APPROVED, to: APPROVE_OK_END,     when: "approval-outcome == approved"}
      - {from: GATE_APPROVED, to: APPROVE_REJECT_END, when: "approval-outcome == rejected"}

  # Wraps an agent run with approval + per-phase snapshot + validation +
  # optional fix recovery + post-approval. Callers pass two fields:
  #   - `task-name` (verb) — the unit of work; used for scope lookup,
  #     originating-task-name fix-recovery plumbing, and trace output.
  #   - `agent` (noun)     — the actor that performs the task; forwarded
  #     into the templated `agent: ${agent}` on RUN_AGENT. Agent definition
  #     path is `agent + ".md"` under runtime/agents/atdd/.
  #
  # SNAPSHOT_WORKING_TREE runs between approval and dispatch so the
  # post-RUN validator can attribute working-tree edits to *this* agent's
  # run, not to whichever upstream phase happens to still have uncommitted
  # edits in the tree. Without this snapshot, every phase after the first
  # would inherit the previous phases' diffs as its own baseline and
  # falsely report scope violations against files the current agent
  # never touched (plan 20260526-1430).
  #
  # Validation step asserts (1) every required output key declared on the
  # writing-agent MID's `outputs:` list is present in ctx.State (the
  # agent emits values via `gh optivem output write KEY=VAL`, which the
  # dispatcher appends to a per-dispatch JSONL file and the validator
  # flattens), (2) `scopes` constraints are
  # satisfied (this phase's working-tree delta is within allowed paths,
  # diffed against the SNAPSHOT_WORKING_TREE fingerprint). When
  # validation fails AND `fix-on-failure == true`, dispatch `fix` with
  # the failure payload; on `fix-on-failure == false` (the recursive
  # call site from `fix` itself) skip remediation and let POST approval
  # see the broken state. The fix recovery re-enters execute-agent, so
  # the fix agent gets its own snapshot step automatically.
  execute-agent:
    name: "Execute Agent"
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        name: "Request Approval"
        params:
          question: "Do you approve agent ${task-name} to execute?"
          # Threaded from the writing-agent MID caller
          # (prod-agent / test-agent / human).
          category: ${category}

      - id: GATE_APPROVED_PRE
        type: gateway
        binding: approval-outcome
        name: "Approval Outcome?"

      - id: SNAPSHOT_WORKING_TREE
        type: service-task
        action: snapshot-working-tree
        name: "Snapshot working tree (per-phase baseline)"

      - id: RUN_AGENT
        type: user-task
        agent: ${agent}
        name: "Run agent ${agent} (task: ${task-name})"

      - id: VALIDATE_OUTPUTS_AND_SCOPES
        type: service-task
        action: validate-outputs-and-scopes
        name: "Validate outputs & scopes"

      # Layer 1 scope-exception escape hatch. Sits between validation and
      # GATE_OUTPUTS_AND_SCOPES_VALID — not on the latter's false-branch —
      # because the envelope is the agent's *explicit* "halt with a scope
      # verdict" signal, independent of whether outputs-and-scopes-valid is
      # false for some unrelated reason. Checking the exception first makes
      # the precedence obvious in the YAML and matches the binding docstring
      # ("skipping DISABLE / Layer 2 / COMMIT"). A FIX fall-through cannot
      # correct a too-narrow scope: FIX loops back to RUN_AGENT against the
      # identical scope:, so the only loop-free, honest option is a halt.
      - id: GATE_SCOPE_EXCEPTION_REQUESTED
        type: gateway
        binding: scope-exception-requested
        name: "Scope Exception Requested?"

      - id: GATE_OUTPUTS_AND_SCOPES_VALID
        type: gateway
        binding: outputs-and-scopes-valid
        name: "Outputs and Scopes Valid?"

      - id: GATE_FIX_ON_FAILURE
        type: gateway
        binding: fix-on-failure-enabled
        name: "Fix on Failure Enabled?"

      - id: FIX
        type: call-activity
        process: fix
        name: "Fix the Failure"
        # Semantic fix-attempt cap (plan 20260530-1604). The FIX -> RUN_AGENT
        # back-edge re-enters RUN_AGENT with NO re-approval (APPROVE_PRE
        # guards first entry only), so under `--auto` each lap re-dispatches
        # the opus·high writing agent unguarded — this cap is the only
        # graceful bound on that token-burn before maxDispatchesPerProcess.
        # After 2 fix passes the output is still invalid; halt for a human
        # to widen scope or adjudicate. Mirrors the verify-loop cap.
        max-visits: 2
        on-max-visits: AGENT_FIX_EXHAUSTED

      - id: APPROVE_POST
        type: call-activity
        process: approve
        name: "Confirm Approval"
        params:
          question: "Approve output from agent ${task-name}?"
          # Threaded from the writing-agent MID caller; same tier as
          # APPROVE_PRE so opting in/out of the dispatch tier toggles
          # both gates symmetrically.
          category: ${category}

      - id: GATE_APPROVED_POST
        type: gateway
        binding: approval-outcome
        name: "Approval Outcome?"

      - id: EXECUTE_AGENT_END
        type: end-event
        name: "Agent Dispatch Complete"

      - id: EXECUTE_AGENT_REJECTED_END
        type: end-event
        name: "Agent Dispatch Rejected"

      # POST rejection is treated as a hard abort (error-end-event), not the
      # soft-skip used for PRE rejection. Rationale: PRE rejection means "I
      # don't want to run this agent right now" — no output was produced, so
      # letting the caller continue is harmless (the downstream phase will
      # fail naturally on the missing artifact). POST rejection means "the
      # agent's output is broken, don't accept it" — letting the caller
      # continue would propagate broken artifacts through every downstream
      # phase. The "too coarse" reasoning in the `approve` doc-block above
      # applies to fix-rejection (a recoverable choice), not to output-
      # rejection (a workflow-halting verdict).
      - id: EXECUTE_AGENT_OUTPUT_REJECTED_END
        type: error-end-event
        name: "Agent Output Rejected"

      # Scope-exception halt (Layer 1). Distinct from OUTPUT_REJECTED above:
      # that terminal means "operator rejected broken output"; this one means
      # "agent refused to write outside scope — the BPMN was authored with a
      # too-narrow scope:, a human must widen it." Modelled as an
      # error-end-event (deliberate halt, not a soft skip); the caller phase
      # decides what to do with the verdict. This MID's contract is "I
      # refused to write outside scope, here's the envelope."
      - id: STOP_SCOPE_VIOLATION
        type: error-end-event
        name: "Scope Violation — Agent Refused"

      # Halt target for the fixer-retry cap (plan 20260530-1604). Reached on
      # the 3rd FIX arrival, before re-dispatch — the agent's output is
      # still invalid after 2 fix passes, so the BPMN scope is likely too
      # narrow or the disagreement needs human adjudication. Distinct from
      # STOP_SCOPE_VIOLATION (agent voluntarily refused) and
      # EXECUTE_AGENT_OUTPUT_REJECTED_END (operator rejected output): this
      # is the automated-recovery-exhausted verdict.
      - id: AGENT_FIX_EXHAUSTED
        type: error-end-event
        name: "Agent Fix Exhausted — ${task-name} output still invalid after 2 fix attempts (widen scope or adjudicate)"

    sequence-flows:
      - {from: APPROVE_PRE,                   to: GATE_APPROVED_PRE}
      - {from: GATE_APPROVED_PRE,             to: SNAPSHOT_WORKING_TREE,       when: "approval-outcome == approved"}
      - {from: GATE_APPROVED_PRE,             to: EXECUTE_AGENT_REJECTED_END,  when: "approval-outcome == rejected"}
      - {from: SNAPSHOT_WORKING_TREE,         to: RUN_AGENT}
      - {from: RUN_AGENT,                     to: VALIDATE_OUTPUTS_AND_SCOPES}
      - {from: VALIDATE_OUTPUTS_AND_SCOPES,   to: GATE_SCOPE_EXCEPTION_REQUESTED}
      - {from: GATE_SCOPE_EXCEPTION_REQUESTED, to: STOP_SCOPE_VIOLATION,           when: "scope-exception-requested == true"}
      - {from: GATE_SCOPE_EXCEPTION_REQUESTED, to: GATE_OUTPUTS_AND_SCOPES_VALID,  when: "scope-exception-requested == false"}
      - {from: GATE_OUTPUTS_AND_SCOPES_VALID, to: APPROVE_POST,        when: "outputs-and-scopes-valid == true"}
      - {from: GATE_OUTPUTS_AND_SCOPES_VALID, to: GATE_FIX_ON_FAILURE, when: "outputs-and-scopes-valid == false"}
      - {from: GATE_FIX_ON_FAILURE,           to: FIX,             when: "fix-on-failure-enabled == true"}
      - {from: GATE_FIX_ON_FAILURE,           to: APPROVE_POST,         when: "fix-on-failure-enabled == false"}
      - {from: FIX,                      to: RUN_AGENT}
      - {from: APPROVE_POST,                  to: GATE_APPROVED_POST}
      - {from: GATE_APPROVED_POST,            to: EXECUTE_AGENT_END,                  when: "approval-outcome == approved"}
      - {from: GATE_APPROVED_POST,            to: EXECUTE_AGENT_OUTPUT_REJECTED_END,  when: "approval-outcome == rejected"}

  # PRE approval only (Q2 = C asymmetric — commands have machine-checkable
  # success). On command failure, gate on `fix-on-failure` (mirrors the
  # execute-agent primitive): when true (default) dispatch `fix` (the
  # `command-failed` kind) without passing `scopes`/`outputs` — commands
  # don't have them; when false, exit cleanly with `command-succeeded=false`
  # so the caller can route on its own semantics. Only `run-tests` sets it
  # to false — verify-tests-pass / verify-tests-fail own failure routing
  # on `test-outcome` and would otherwise be pre-empted by the inner FIX
  # branch (the BPMN bug observed when an expected acceptance-test
  # failure mis-routed to FIX instead of VERIFY_FAIL_END).
  execute-command:
    name: "Execute Command"
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        name: "Request Approval"
        params:
          question: "Do you approve running command ${command} ?"
          # Threaded from the execute-command caller (most commands pin
          # `command`; the commit MID re-pins `prod-commit` / `test-commit`
          # from its own caller via its EXECUTE_COMMAND `params:` block).
          category: ${category}

      - id: GATE_APPROVED_PRE
        type: gateway
        binding: approval-outcome
        name: "Approval Outcome?"

      - id: RUN_COMMAND
        type: service-task
        action: run-command
        name: "Run command ${command}"

      - id: GATE_COMMAND_SUCCEEDED
        type: gateway
        binding: command-succeeded
        name: "Command Succeeded?"

      - id: GATE_FIX_ON_FAILURE
        type: gateway
        binding: fix-on-failure-enabled
        name: "Fix on Failure Enabled?"

      - id: FIX
        type: call-activity
        process: fix
        name: "Fix the Failure"
        # Semantic fix-attempt cap (plan 20260530-1604), mirroring the
        # verify-loop cap (verify-tests-{pass,fail}). The FIX -> RUN_COMMAND
        # back-edge stays; the cap intercepts on the 3rd arrival, before
        # re-dispatch, so a deterministic command (compile/test) that the
        # fixer cannot resolve in-scope halts for a human instead of
        # spinning. Layered under the engine-wide maxDispatchesPerProcess
        # backstop.
        max-visits: 2
        on-max-visits: COMMAND_FIX_EXHAUSTED

      - id: EXECUTE_COMMAND_END
        type: end-event
        name: "Command Dispatch Complete"

      - id: EXECUTE_COMMAND_REJECTED_END
        type: end-event
        name: "Command Dispatch Rejected"

      # Halt target for the fixer-retry cap (plan 20260530-1604). Reached on
      # the 3rd FIX arrival, before re-dispatch — the command has failed
      # under 2 fix passes, so the fault is almost certainly out of the
      # fixer's scope (the rehearsal-71 Lombok/compile signature). Name is
      # the concise headline (doubles as the diagram BPMN label).
      - id: COMMAND_FIX_EXHAUSTED
        type: error-end-event
        name: "Command Fix Exhausted — ${command} still failing after 2 fix attempts (likely out of fixer scope)"

    sequence-flows:
      - {from: APPROVE_PRE,            to: GATE_APPROVED_PRE}
      - {from: GATE_APPROVED_PRE,      to: RUN_COMMAND,                   when: "approval-outcome == approved"}
      - {from: GATE_APPROVED_PRE,      to: EXECUTE_COMMAND_REJECTED_END,  when: "approval-outcome == rejected"}
      - {from: RUN_COMMAND,            to: GATE_COMMAND_SUCCEEDED}
      - {from: GATE_COMMAND_SUCCEEDED, to: EXECUTE_COMMAND_END,  when: "command-succeeded == true"}
      - {from: GATE_COMMAND_SUCCEEDED, to: GATE_FIX_ON_FAILURE,  when: "command-succeeded == false"}
      - {from: GATE_FIX_ON_FAILURE,    to: FIX,                  when: "fix-on-failure-enabled == true"}
      - {from: GATE_FIX_ON_FAILURE,    to: EXECUTE_COMMAND_END,  when: "fix-on-failure-enabled == false"}
      - {from: FIX,                    to: RUN_COMMAND}

  # Q-late-5 (β-convention) routing: the fix-* task-name is derived as
  # `"fix-" + failure.kind` and passed into the inner `execute-agent`. No
  # routing table here — the runtime constructs the task-name dispatch-
  # time. The inner `execute-agent` receives `fix-on-failure: false` so
  # validation failure in the fix attempt does NOT recurse into another
  # fix (single attempt, terminates regardless of inner outcome).
  fix:
    name: "Fix"
    start: APPROVE_PRE
    nodes:
      - id: APPROVE_PRE
        type: call-activity
        process: approve
        name: "Request Approval"
        params:
          question: "Do you approve fix to attempt remediation for ${failure-kind} ?"
          # human tier: fix is the operator-engages point for "something
          # broke, here's the proposed remediation" — never bypassable
          # under the ladder model.
          category: human

      - id: GATE_APPROVED_PRE
        type: gateway
        binding: approval-outcome
        name: "Approval Outcome?"

      - id: EXECUTE_AGENT
        type: call-activity
        process: execute-agent
        name: "Dispatch the Agent"
        params:
          # task-name derived from failure.kind (Q-late-5 β-convention:
          # "fix-" + failure.kind). The `${failure-kind}` placeholder
          # resolves at dispatch time via ExpandParams's state-fallback
          # path (statemachine/run.go): the binding upstream — runCommand
          # or validateOutputsAndScopes — writes `failure-kind` into
          # ctx.State, and the substitution reads it through the
          # params-then-state scope chain without a call-site passthrough.
          # See the closed set of kinds documented in the
          # `fix-*` agent inventory note near the top of this file.
          task-name: "fix-${failure-kind}"
          agent: "${failure-kind}-fixer"
          # human tier: fix-flow dispatch — distinct from APPROVE_PRE's
          # remediation prompt above; the inner agent's PRE/POST also gate
          # at human via execute-agent's threading.
          category: human
          fix-on-failure: "false"
          # originating-task-name carries the OUTER MID's task-name (e.g.
          # "write-acceptance-tests") through the fix dispatch so the inner
          # validate-outputs-and-scopes (and the dispatcher's ${scope_block}
          # resolution) can look up scope + outputs via
          # engine.Scope / engine.Outputs(originating-task-name) — the
          # writing-agent MID's output contract lives on the MID itself,
          # so the inner validator resolves it from the engine instead of
          # a params passthrough. fix-${failure-kind} has no MID node of
          # its own and would miss otherwise.
          #
          # ${task-name} resolves against the parent params chain. The
          # immediate parent is either `execute-agent` (agent-output
          # failure path) or `execute-command` (command-failure path); in
          # both cases the writer-wrapper that owns the surrounding
          # subprocess declares `task-name: <writer-MID>` at its
          # call-site (see e.g. write-and-verify-acceptance-tests'
          # children), and wrapCallActivity merges parent params into
          # children, so the originating-MID identity is in Params when
          # this line evaluates. The expansion happens before task-name
          # is shadowed by the fix-* override on the line above.
          originating-task-name: ${task-name}

      - id: FIX_END
        type: end-event
        name: "Fix Complete"

      # D2/D3 (plan 20260530-1604): fix-reject is a HARD HALT, not a soft
      # skip. Modelled as error-end-event so it propagates up through the
      # FIX call-activity in BOTH execute-command and execute-agent (they
      # share this one `fix` process), giving the operator a clean exit and
      # making `--auto` halt immediately on EOF-auto-reject — zero retry
      # burn. This is the DELIBERATE exception to the documented
      # "PRE-rejection = soft skip" philosophy (see execute-agent's
      # EXECUTE_AGENT_REJECTED_END): that philosophy holds when a rejected
      # writing agent lets downstream fail naturally on the missing
      # artifact, but `fix`'s downstream is a RE-RUN of the step that just
      # failed — so reject must halt, not loop. Routes/halts like
      # STOP_SCOPE_VIOLATION.
      - id: FIX_REJECTED_END
        type: error-end-event
        name: "Fix Declined — Run Halted"

    sequence-flows:
      - {from: APPROVE_PRE,      to: GATE_APPROVED_PRE}
      - {from: GATE_APPROVED_PRE, to: EXECUTE_AGENT,      when: "approval-outcome == approved"}
      - {from: GATE_APPROVED_PRE, to: FIX_REJECTED_END,   when: "approval-outcome == rejected"}
      - {from: EXECUTE_AGENT,    to: FIX_END}
